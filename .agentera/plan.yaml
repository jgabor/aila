  title: 'Milestone 37: Model And Autonomy Command Family'
what: Deliver ROADMAP.md Milestone 37 by adding stable TUI paths for /model, /model --utility, and /auto, backed by app-owned
  session selection state, deterministic provider readiness display data, selection/focus behavior, fixtures, semantic snapshots,
  PTY smoke where interactive, and no provider execution changes.
why: M8-M9 established config display and loading, M24 added provider readiness/fake model diagnostics, and M35-M36 established
  app-owned command surfaces. M37 should let users see and change the active model, utility model, and autonomy labels in
  the current session without turning Aila into a model marketplace or config editor.
constraints: 'Execute only Milestone 37. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may render app-injected model/autonomy selection state and update focus/selection over inert rows, but it must not read
  config files, write config files, call providers, inspect credentials, mutate permissions, run git, or own runtime/model
  prompts. Use closed policy routes and app-owned session selection handlers. Treat /auto as current-session scope per README.
  Treat /model and /model --utility as current-session active labels for this slice; do not persist config or add interactive
  config editing. Keep editor, compaction, shell prefixes, source indexing, provider-backed execution, model marketplace/catalog
  APIs, plugins, MCP servers, workflow DSLs, generic command registries, hosted control planes, and M37A+ behavior out of
  scope. Use behavior-based test names; do not introduce new TestM<number> symbols. Do not push.'
