  title: Milestone 26 Write Permission Classes
what: Deliver ROADMAP.md Milestone 26 by making write-shaped permission classes testable before mutation tools are live. The
  slice must map generic proposals onto edit, write, and mutating shell classes, enforce off/read/write/yolo autonomy decisions,
  and record automatic plus manual decision evidence without executing file mutations.
why: M25 made risky proposals visible and message-only. M26 gives those proposals real policy semantics so later edit/write
  tools can reuse tested autonomy decisions instead of inventing permission behavior at mutation time.
constraints: Execute only Milestone 26. Preserve statechart-MVU and explicit effects. Permission code may classify and record
  decisions, but no approval or autonomy path may execute filesystem, shell, git, state-store, or mutation IO. Do not add
  edit/write tool executors, temp-workspace mutation, recheck execution, durable approval persistence, mutation history, undo/replay,
  provider fallback, context compaction, source indexing, plugins, MCP servers, workflow DSLs, model marketplaces, hosted
  control plane behavior, or Milestone 27+ scope. Do not push.
