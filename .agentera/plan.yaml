scope:
  included:
    - Narrow `fetch` request/result contracts with URL, method, source metadata, response status, content type, bounded preview, truncation, omitted-byte markers, duration metadata, and typed errors.
    - URL validation that permits only explicit HTTP and HTTPS remote reads and rejects empty, relative, file, shell-shaped, credential-bearing, unsupported-scheme, and malformed URLs.
    - A fakeable network execution boundary with deterministic timeout, cancellation, response-size, status, and body handling for tests without live external network access.
    - Runtime/app integration that proposes, classifies, executes, records, and returns `fetch` results as typed messages or effects without importing provider/model clients into the fetch path.
    - Permission/autonomy classification proving `fetch` is a read-only network operation and does not reuse mutation, bash, provider, edit, or write paths.
    - TUI running, success, and failure fetch presentation with URL, status, content type, bounded preview or error detail, omitted content markers, and semantic metadata from injected state only.
    - Fetch success and fetch failure fixtures with plain, ANSI, and semantic snapshots; PTY smoke only if M21 exposes a visible interactive fetch command.
  excluded:
    - Provider/model networking, model fallback, credential management, authentication flows, retries for provider calls, source indexing, context compaction, stale checks, ranking, scraping frameworks, or Markdown conversion beyond bounded text previewing required by this slice.
    - Edit, write, mutation history, approval persistence, undo/redo, replay, shell mutation, arbitrary bash expansion, workflow phase mutation, plugins, MCP servers, workflow DSLs, marketplaces, hosted control planes, or Milestone 22+ behavior.
  deferred:
    - Full read-only permission-model enforcement and decision recording for Milestone 22.
    - Mutation-capable tools, approval persistence, mutation history, undo/replay, context compaction, stale checks, and source indexing until later roadmap slices.
design: >-
  Add a small `internal/tools` fetch contract beside read/search/bash rather than
  a generic network framework. Validation normalizes and bounds a single
  HTTP(S) read request. Execution accepts an injected fetch transport or client
  interface so tests can fake status, headers, body chunks, network failures,
  timeouts, and cancellations without live network. Runtime owns typed fetch
  proposals, effects, active state, completed results, and summaries without
  importing `internal/tools` or doing network IO. App dispatch owns permission
  classification, guarded execution, and mapping tool results into runtime
  messages. TUI renders injected fetch state and semantic metadata; it does not
  parse URLs, contact the network, or infer provider/model behavior.
