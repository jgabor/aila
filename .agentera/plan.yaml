scope:
  included:
  - Add a deterministic build capability contract/output over one active plan item with attempted step, tool/permission/history/state
    boundary descriptors, blockers/caveats, changed paths, final summary, and one exit payload.
  - Wire build through existing runtime capability proposal/effect/completion and app-owned execution so the bounded step
    uses existing tool, permission, mutation history, and state persistence paths instead of direct capability IO.
  - Expose build display state in the TUI with active plan item, tool state, approval evidence, changes, blockers, caveats,
    final summary, and valid successor recommendation evidence.
  - Keep existing build-active, queued-message, approval-pending, diff-view, tool-running, and tool-failed fixtures current
    and cover 80x24, 120x32, and 160x45 active plan/tool/approval states.
  - Add behavior-named capability/runtime/app/TUI/PTY coverage proving one planned task executes through real safety and visibility
    paths, then holds without audit or multi-step orchestration.
  excluded:
  - Audit findings, optimize/document/design/orchestrate capability behavior, provider-driven autonomous multi-step execution,
    broad capability slash/keybinding parity, direct workflow phase mutation, direct file IO inside capability code, plugins,
    MCP, workflow DSLs, generic graph engines, hosted control planes, M49+ behavior, and push operations.
  deferred:
  - Provider-backed build loops, multi-step plan execution, automatic task selection beyond the first bounded item, audit
    feedback routing, retry orchestration, progress/todo/changelog authoring, richer plan editing, and full capability command
    alias activation.
design: Keep build small and host-owned. internal/capability defines BuildCapability request metadata and typed BuildOutput,
  but concrete world-touching work is represented by boundary descriptors and executed through app/runtime/tool effects. internal/runtime
  reuses CapabilityProposed/CapabilityEffect/CapabilityCompleted and existing approval/mutation/tool state. internal/app selects
  one active plan item from app-owned PlanView or a deterministic temp-workspace request, dispatches exactly one bounded write
  or tool step through the existing permission and mutation/history paths, records the result, then builds a BuildView for
  display. internal/tui renders injected BuildView state plus existing approval/tool/diff/history evidence; it never selects
  work, executes tools, approves mutations, or changes workflow phase.
overall_acceptance:
- Capability tests prove build emits exactly one payload with one active plan item, attempted step, changed paths or blockers,
  caveats, final summary, source/artifact refs, boundary descriptors, and a valid BUILD/AUDIT successor recommendation without
  direct phase mutation.
- Runtime/app tests prove build proposals route through typed capability effects and that app-owned bounded execution uses
  existing tool, permission, mutation history, and state persistence paths, including approval-required and denial/blocker
  branches.
- TUI render and semantic snapshots show active plan item, tool state, approvals, changed paths, blockers, caveats, final
  summary, display-only state, and transition_claimed=false at required sizes while keeping existing required fixtures current.
- PTY smoke proves a bounded fake or temp-workspace build task executes one planned step through real safety and visibility
  paths and then returns to a held/idle observable state.
- Targeted, package, full Mage, Agentera, diff, home-path, and added func TestM<number> hygiene validation pass before ROADMAP.md
  is updated.
surprises:
- PTY validation showed /build evidence could land below the retained plan; TUI content now renders fresh BuildView evidence
  before retained PlanView evidence while preserving plan state.
