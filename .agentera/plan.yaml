  title: Milestone 22 Permission Model For Read-Only Work
what: Deliver ROADMAP.md Milestone 22 by making Aila's read-only autonomy decisions explicit, recorded, and visible before mutation-capable tools arrive. Aila must enforce `off` versus `read` for the existing read-only operation classes, preserve exact decision metadata on tool results, and expose current autonomy, decision source, and at least one blocked read-only decision through deterministic TUI state.
why: M18 through M21 established read, find, grep, safe bash inspection, and fetch as explicit read-only effects. M22 turns the permission seam from hidden dispatch checks into recorded product state so later write/edit/mutation slices can build on an observable autonomy contract instead of retrofitting decision evidence.
constraints: 'Execute only Milestone 22. Preserve statechart-MVU: deterministic updates may receive typed decision metadata but must not perform IO, approve work, or mutate workflow phase. Enforce `off` and `read` for existing read-only operation classes and record decisions for read-only operations in runtime/app/TUI-visible result state. Keep approval prompts, write classes, mutation approval persistence, edit/write tools, undo/replay, context compaction, stale checks, source indexing, provider fallback, plugin, MCP, workflow DSL, marketplace, hosted control plane, and Milestone 23+ behavior out of scope. Do not push.'
