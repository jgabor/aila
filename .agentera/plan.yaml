scope:
  included:
  - Add typed background compaction provenance so manual and background compaction are distinguishable in runtime, app, and
    TUI state.
  - Add an idle-only background compaction proposal/effect path that preserves source refs and exact critical details while
    leaving primary runtime status, transcript, active operation, workflow phase, files, git state, project artifacts, permissions,
    and final judgment untouched.
  - Reuse the existing context Compact implementation for deterministic compaction instead of adding provider/model calls
    or a second compaction algorithm.
  - Expose background compaction as app-injected CompactView and semantic data with mode/source evidence while keeping manual
    /compact user-initiated and separate.
  - Extend compact-running and compact-result fixtures or add equivalent background compact fixtures so plain, ANSI, and semantic
    snapshots distinguish manual from background compaction.
  - Add tests proving background compaction is denied while runtime, operation, approval, or queued input prevents idle work,
    and proving source refs survive compaction.
  excluded:
  - Timers, goroutines, autonomous loops, provider/model compaction, summary refresh, stale-context policy changes, automatic
    context rewriting beyond deterministic compaction output, durable background compaction persistence policy, file writes,
    git mutations, project artifact writes, permission approval, workflow phase mutation, final judgment, plugins, MCP, workflow
    DSLs, generic graph engines, hosted control planes, and M45+ behavior.
  deferred:
  - Scheduler cadence, continuous timer policy, summary refresh, provider-assisted compaction, durable background compaction
    persistence, and automatic action based on background compaction results.
design: Add background compaction as a separate runtime/app path over the existing CompactContextRequest/CompactContextResult
  data. A background proposal reuses the idle-only utility gating rules and dispatches deterministic compaction only when
  the primary runtime can yield. Manual /compact keeps its current command/transcript/active-operation behavior. Background
  completion updates visible compact/context data without changing the primary workflow phase or transcript. TUI receives
  injected mode/source data and renders manual and background compaction distinctly.
overall_acceptance:
- Runtime tests prove background compaction starts only when primary runtime is idle and is blocked while active work, approval,
  or queued input exists.
- Runtime/app tests prove background compaction preserves source refs and exact critical details while not mutating primary
  runtime status, transcript, workflow phase, files, git state, project artifacts, permissions, or final judgment.
- Manual /compact tests remain green and prove manual source/mode remains separate from background compaction.
- TUI render and semantic snapshots distinguish manual compaction from background compaction in compact-running and completed/flagged
  states.
- PTY smoke runs only if interactive visible terminal behavior changes; otherwise the skip reason is documented in progress
  and final closeout.
- No timer loop, provider/model call, summary refresh, stale-context policy expansion, plugin, MCP, workflow DSL, generic
  graph engine, hosted control plane, or M45+ behavior is added.
- Targeted, package, full Mage, Agentera, diff, home-path, and TestM<number> hygiene validation pass before ROADMAP.md is
  updated.
