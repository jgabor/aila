header:
  level: full
  created: 2026-05-16
  status: completed
  reviewed: 2026-05-16
  critic_issues: "planned as M17-only; M18+ deferred"
  title: Milestone 17 History View For Fake Events
what: >-
  Deliver ROADMAP.md:750-773 Milestone 17 by recording inspectable fake prompt,
  response, command, and runtime events through `internal/history` records backed
  by the Aila state store, then surfacing those records in a read-only TUI history
  view.
why: >-
  M16 proved Aila can preserve current fake session memory across process starts.
  The next trust boundary is making prior fake activity inspectable through the
  same store path future real model/tool runs will use, before adding real tools,
  undo, replay, context compaction, or model/provider history.
constraints: >-
  Execute only Milestone 17. Preserve the statechart-MVU rule that updates decide
  and effects do. History persistence must be requested through explicit
  app-owned commands/effects or guarded state/history calls; deterministic
  runtime updates and TUI rendering must not perform filesystem IO. Keep history
  read-only in this milestone. Keep the TUI presentation-only and path-safe. Do
  not add undo/redo, mutation records, edit/write history, real tool or model
  history, event replay, session restore/selection, context compaction, stale
  checks, read/find/grep/bash tools, provider fallback, permission policy changes,
  plugins, MCP, workflow DSL behavior, or Milestone 18+ behavior. Do not push. Do
  not commit M17 work unless the user separately requests it.
previous_plan_archived: .agentera/archive/plan-2026-05-16-m16.yaml
source_anchors:
  - ROADMAP.md:750-773
  - ARCHITECTURE.md:529-607
  - ARCHITECTURE.md:916-923
  - ARCHITECTURE.md:858-868
  - README.md:290-309
  - docs/tui-testing.md:61-79
  - docs/workflow-architecture.md:337-384
  - docs/notes/PROMPT.md
verification_commands:
  - go test ./internal/history ./internal/state ./internal/app ./internal/tui ./cmd/aila -count=1
  - mage check
scope:
  included:
    - A narrow fake history event contract for prompt, response, command, and runtime events.
    - State/store-backed append and read behavior for the current fake event log with provenance, bounds, and recovery diagnostics.
    - App-owned recording of fake prompt, response, command, and runtime status events through explicit command/result paths.
    - A read-only history view reachable through the command surface when introduced by this milestone.
    - TUI history navigation, selection, and focus behavior over injected history display data.
    - History-view render and semantic evidence with stable fake run/event identifiers, event kinds, and selected item metadata.
    - Bounded PTY smoke for opening history if terminal navigation changes.
  excluded:
    - Undo/redo, edit/write mutation history, mutation records, approval persistence, file edit records, or destructive recovery.
    - Real model/provider/tool history, shell command history, read/find/grep/bash tools, or tool execution.
    - Event replay, session restore, session selection/history browser beyond read-only fake activity inspection, context compaction, stale checks, or context-builder behavior.
    - Dynamic plugins, MCP servers, workflow DSLs, model marketplaces, hosted control planes, or Milestone 18+ behavior.
  deferred:
    - Workspace read tool for Milestone 18.
    - Find and grep tools for Milestone 19.
    - Safe bash inspection for Milestone 20.
    - Undo, mutation history, and replay until the fake event history seam is validated.
design: >-
  Treat M17 history as an append-only, read-only fake activity log, not replay or
  undo. `internal/history` owns event schema, event shaping, and read model
  contracts. `internal/state` owns path-safe store integration, file ownership,
  atomic writes, and recovery diagnostics. App code decides when fake events are
  recorded and converts read results into TUI view state. The TUI receives
  injected history display and semantic fields only; it may navigate, select, and
  focus entries but must not read `.aila/` or mutate workflow phase.
tasks:
  - number: 1
    name: Define fake history event contract
    depends_on: []
    status: completed
    acceptance:
      - GIVEN M17 history events are inspected WHEN tests validate the contract THEN prompt, response, command, and runtime event kinds have stable IDs, run/session identifiers, source/provenance, bounded display text, and schema version fields.
      - GIVEN unsafe or escaped history paths are requested WHEN validation runs THEN history/state rejects them instead of returning hardcoded, HOME, XDG, Agentera, or escaped filesystem paths.
      - GIVEN package boundary tests inspect the contract WHEN validation runs THEN M17 history does not introduce undo/redo, mutation records, real model/tool history, event replay, context compaction, read/find/grep/bash tools, plugins, or MCP behavior.
      - GIVEN fake event records contain terminal controls or secret-like text WHEN normalized for display/semantic output THEN the contract preserves bounded redacted text without leaking control sequences or credentials.
    evidence:
      - >-
        Added `internal/history` fake event contract with closed prompt, response, command, and runtime event
        kinds plus schema version, event id, run id, session id, source, provenance, and bounded display text
        validation.
      - >-
        Added state-owned fake history path description and validation for `.aila/history/fake-events.jsonl`,
        derived from the workspace `.aila` store and rejecting HOME, XDG, Agentera, escaped, and traversal
        paths without implementing append/read persistence.
      - >-
        Added package boundary guards proving Task 1 did not introduce undo/redo, mutation records, real
        model/tool history, event replay, context compaction, read/find/grep/bash tools, plugins, MCP, or M18+
        behavior.
      - >-
        Inspektera found C1 terminal controls were not stripped before redaction; retry 1 fixed
        `U+0080`-`U+009F` stripping and added regressions for raw C1 controls and C1 controls embedded inside
        token syntax such as `to\u009bken=abc123`.
      - >-
        Verified with `mage fmt`, `go test ./internal/history ./internal/state -run 'History|Event|Boundary'
        -count=1`, `go test ./internal/history ./internal/state -count=1`, `git diff --check --
        .agentera/plan.yaml .agentera/progress.yaml .agentera/archive/plan-2026-05-16-m16.yaml
        internal/history internal/state/history_path.go internal/state/history_path_test.go`, and Inspektera
        PASS with no findings.
  - number: 2
    name: Append and read fake history through the state store
    depends_on: [1]
    status: completed
    acceptance:
      - GIVEN no fake history log exists WHEN history is read THEN state/history reports empty history without treating it as a failure.
      - GIVEN valid fake history events exist WHEN append and read run THEN records round-trip in stable order through `.aila/` store ownership with schema-versioned, bounded, redacted data.
      - GIVEN corrupt, partial, oversized, version-mismatched, or symlink-escaped history data exists WHEN read or append runs THEN a typed recovery diagnostic is returned without overwriting existing history or unrelated store data.
      - GIVEN a fake history append is requested WHEN validation inspects the filesystem THEN writes are path-safe, append-only or atomic as appropriate, and leave no partial final content or temporary files behind.
    evidence:
      - >-
        Added state-owned fake history read/append APIs for `.aila/history/fake-events.jsonl`; missing history
        returns empty state without a diagnostic or failure.
      - >-
        Valid Task 1 fake events round-trip in JSONL order through the workspace `.aila` store with schema
        validation, bounded/redacted display data, and stable event ordering.
      - >-
        Corrupt JSONL, partial final records, oversized logs, version mismatches, and symlink/path escapes return
        typed `state.history` recovery diagnostics without overwriting existing history or unrelated store data.
      - >-
        Inspektera found direct final-file append could leave partial content on short writes; retry 1 replaced
        `O_APPEND` with bounded in-memory JSONL rebuild plus atomic temp-and-rename writing and regression coverage
        for failed atomic writes preserving final content and cleaning temp files.
      - >-
        Verified with `mage fmt`, `go test ./internal/history ./internal/state -run 'History|Event|Boundary'
        -count=1`, `go test ./internal/history ./internal/state -count=1`, `git diff --check --
        .agentera/plan.yaml .agentera/progress.yaml .agentera/archive/plan-2026-05-16-m16.yaml
        internal/history internal/state internal/diagnostic/diagnostic.go`, and Inspektera PASS with no findings.
  - number: 3
    name: Record fake app activity as explicit history effects
    depends_on: [2]
    status: completed
    acceptance:
      - GIVEN fake prompt and response activity occurs WHEN history persistence is needed THEN app emits an explicit history persistence command/result rather than writing from deterministic runtime update or TUI code.
      - GIVEN command surfaces and runtime status changes occur WHEN history recording runs THEN prompt, response, command, and runtime event records capture the visible fake activity that exists at this point.
      - GIVEN history persistence fails WHEN app handles the result THEN a bounded passive diagnostic is surfaced without workflow phase mutation or destructive recovery execution.
      - GIVEN existing prompt, queue, interrupt, status, help, quit, snapshot persistence, and continue paths run WHEN history recording exists THEN their behavior remains stable except for intentional history metadata.
    evidence:
      - >-
        Added app-owned `HistoryPersistenceCommand` and `HistoryPersistenceResult` wiring so fake history writes
        are emitted and executed through the app controller instead of deterministic runtime update or TUI code.
      - >-
        Prompt submissions, fake responses, queued prompts, command surfaces, and runtime status/result changes
        are recorded through the Task 1 event contract and Task 2 state append API, limited to currently visible
        fake activity.
      - >-
        History persistence failures surface bounded passive `state.history` diagnostics without workflow phase
        mutation or destructive recovery execution.
      - >-
        Regression tests preserve prompt, queue, interrupt, status/help/quit, snapshot persistence, shutdown, TUI,
        and continue paths except for intentional history metadata/effects.
      - >-
        Verified with `go test ./internal/app ./internal/history ./internal/state -count=1`, `go test
        ./internal/tui ./cmd/aila -count=1`, `go test ./internal/app -run
        'History|SessionController|Continue|Shutdown' -count=1`, `git diff --check -- .agentera/plan.yaml
        .agentera/progress.yaml .agentera/archive/plan-2026-05-16-m16.yaml internal/app internal/history
        internal/state internal/diagnostic/diagnostic.go`, and Inspektera PASS with no findings.
