scope:
  included:
  - Document the production agent-mode path and boundaries needed for real TUI chat execution.
  - Add regression coverage for production runner selection, config and credential resolution, fixed built-in tool wiring,
    runtime agent message handling, prompt pollution, completion routing, and the PTY timeout.
  - Replace unconditional production FakeBuildRunner construction with a config/credential-backed GoAgentRunner factory while
    preserving injectable fake runners for tests and deterministic fixtures.
  - Route agent assistant deltas, tool requests, completion, and failure through deterministic runtime messages/effects.
  - Ensure submitAgentPrompt does not emit FakePromptEffect in agent mode and does feed AgentTurnCompleted through runtime.
  - Repair or intentionally bound/skip TestResearchCommandFoldsContextWithoutArtifactPTYSmoke so mage check completes.
  excluded:
  - Human execution of M57 dogfooding, live dogfood walkthrough claims, pushes, plugin hosts, MCP servers, dynamic tool loading,
    model marketplaces, hosted control planes, workflow DSLs, and TUI-owned execution or phase transitions.
  deferred:
  - Human M57 dogfood task, visual review unless layout or interaction changes require it, richer provider UX beyond the minimum
    actionable diagnostics needed for real runner construction, and any product decision to broaden Aila beyond fixed built-ins.
design: Keep the final wiring narrow. internal/app owns production runner construction and prompt orchestration. internal/agent
  adapts config, credentials, go-agent, and fixed Aila tool definitions. internal/runtime owns typed lifecycle state transitions
  for agent deltas, tool requests, completion, and failure without performing IO. Existing effects, permission, tools, history,
  state, and TUI projection paths remain the route for execution and visibility. internal/tui remains a display/input layer.
tasks:
- number: 1
  name: Document production agent-mode intent and boundaries
  depends_on: []
  status: complete
  acceptance:
  - 'GIVEN the source docs are updated WHEN implementation starts THEN the intended production path is explicit: TUI chat to app/runtime, real go-agent runner, fixed built-in tools, runtime lifecycle updates, TUI projection.'
  - GIVEN fake runner behavior is described WHEN docs are reviewed THEN fake runners are limited to tests, fixtures, or explicit
    deterministic development paths rather than unconditional production construction.
  - GIVEN scope boundaries are reviewed WHEN the docs are inspected THEN plugin, MCP, dynamic tool, marketplace, hosted control
    plane, and M57 dogfood execution remain excluded.
  validation:
  - Documentation diff records the real agent-mode flow and exclusions.
  - mage check passes after implementation.
  evidence:
  - README.md documents production chat turns using configured providers, bounded diagnostics instead of silent fake fallback,
    deterministic fake runners only for tests/fixtures/development smoke paths, and fixed model-visible tool definitions flowing
    through app/runtime boundaries.
  - mage check passed.
- number: 2
  name: Specify production runner selection and config resolution regressions
  depends_on:
  - 1
  status: complete
  acceptance:
  - GIVEN current production app construction WHEN tests exercise the factory path THEN they fail against the unconditional
    FakeBuildRunner behavior in internal/app/shutdown.go.
  - GIVEN valid config and credentials WHEN production runner construction runs THEN tests expect a real GoAgentRunner with
    the configured provider/model and fixed built-in tool definitions.
  - GIVEN missing or invalid credentials WHEN production runner construction runs THEN tests expect bounded actionable diagnostics
    and no silent fake fallback.
  - GIVEN test or fixture mode is selected WHEN construction runs THEN fake runner injection remains possible and explicit.
  validation:
  - go test ./internal/app ./internal/agent -count=1
  - Evidence includes failing tests before implementation and passing tests after implementation.
  evidence:
  - internal/app/agent_factory_test.go covers real GoAgentRunner construction for custom and OpenCode Go OpenAI-compatible configs,
    missing-credential diagnostics without fake fallback, unsupported adapter diagnostics without fake fallback, and explicit fake
    runner selection.
  - go test ./internal/app ./internal/agent -count=1 passed.
- number: 3
  name: Specify runtime agent lifecycle regressions
  depends_on:
  - 1
  status: complete
  acceptance:
  - GIVEN AgentAssistantDelta is applied through runtime.Update WHEN a stream emits assistant text THEN runtime state records
    or updates assistant output deterministically.
  - GIVEN AgentToolRequested is applied through runtime.Update WHEN the model requests a tool THEN runtime records typed tool
    request state or emits explicit effects without performing IO in Update.
  - GIVEN AgentTurnCompleted is applied through runtime.Update WHEN streaming completes THEN runtime status returns to idle
    or the expected non-running state.
  - GIVEN AgentTurnFailed is applied through runtime.Update WHEN streaming fails THEN runtime status exits running state and
    records failure visibility.
  validation:
  - go test ./internal/runtime -count=1
  - Evidence includes missing-handler failures before implementation and passing lifecycle tests after implementation.
  evidence:
  - internal/runtime already had deterministic AgentAssistantDelta, AgentToolRequested, AgentTurnCompleted, and AgentTurnFailed
    handlers and regression tests; new AgentPromptSubmitted coverage proves agent-mode start emits AgentPromptEffect instead of
    FakePromptEffect and queues while active.
  - go test ./internal/runtime -count=1 passed.
- number: 4
  name: Specify prompt submission regressions against fake transcript pollution
  depends_on:
  - 1
  - 3
  status: complete
  acceptance:
  - GIVEN agent mode prompt submission WHEN submitAgentPrompt starts a turn THEN it does not emit FakePromptEffect through
    runtime.Update(PromptSubmitted{}).
  - GIVEN assistant output appears in agent mode WHEN the transcript is inspected THEN it originates from agent events rather
    than fake prompt generation.
  - GIVEN fake/test mode prompt submission WHEN deterministic fixtures run THEN fake prompt behavior remains available only
    through the intended explicit fake path.
  validation:
  - go test ./internal/tui ./internal/app ./internal/runtime -count=1
  - Evidence includes a regression test that fails with current fake transcript pollution and passes after the fix.
  evidence:
  - internal/app/agent_prompt.go now starts agent turns through runtime.AgentPromptSubmitted and runtime.AgentPromptEffect, not
    runtime.PromptSubmitted/FakePromptEffect.
  - internal/app/prompt_test.go asserts agent-mode transcripts do not contain Fake Aila response text and that completion reaches
    runtime.
  - go test ./internal/tui ./internal/app ./internal/runtime -count=1 passed.
- number: 5
  name: Implement production GoAgentRunner factory and fixed tool wiring
  depends_on:
  - 1
  - 2
  status: complete
  acceptance:
  - GIVEN production app construction runs WHEN config and credentials are valid THEN internal/app no longer unconditionally
    constructs agent.FakeBuildRunner and instead constructs a real GoAgentRunner.
  - GIVEN config and credentials are missing or invalid WHEN construction runs THEN the user receives clear bounded diagnostics
    and no silent fake fallback is used.
  - GIVEN the real runner is created WHEN go-agent requires tool definitions THEN Aila passes only fixed built-in tools through
    the adapter.
  - GIVEN tests and fixtures need deterministic behavior WHEN they construct input runners THEN fake runners remain injectable
    or explicitly gated.
  validation:
  - go test ./internal/app ./internal/agent ./internal/tools -count=1
  - mage check
  evidence:
  - internal/app/agent_factory.go constructs real GoAgentRunner for supported OpenAI-compatible config and credentials, defaults
    opencode-go to https://opencode.ai/zen/go/v1, returns bounded UnavailableRunner diagnostics for missing credentials, unsupported
    adapters, and unwired device-code providers, and defines fixed read/write go-agent tools.
  - internal/app/shutdown.go no longer unconditionally constructs agent.FakeBuildRunner; fake build runner requires AILA_AGENT_RUNNER=fake.
  - go test ./internal/app ./internal/agent ./internal/tools -count=1 and mage check passed.
- number: 6
  name: Implement runtime handling for agent stream tool completion and failure messages
  depends_on:
  - 3
  - 5
  status: complete
  acceptance:
  - GIVEN AgentAssistantDelta messages arrive WHEN runtime.Update handles them THEN assistant stream state is visible without
    direct runner or TUI mutation.
  - GIVEN AgentToolRequested messages arrive WHEN runtime.Update handles them THEN tool execution remains represented as typed
    effects or state subject to existing permission and effect dispatch paths.
  - GIVEN AgentTurnCompleted arrives WHEN runtime.Update handles it THEN status reliably exits running state and returns idle
    where appropriate.
  - GIVEN AgentTurnFailed arrives WHEN runtime.Update handles it THEN failure is visible and status exits running state.
  - GIVEN runtime.Update is reviewed WHEN implementation is complete THEN it remains deterministic and does not perform filesystem,
    shell, network, model, persistence, or tool IO.
  validation:
  - go test ./internal/runtime ./internal/agent -count=1
  - mage check
  evidence:
  - runtime.Update lifecycle handlers stayed IO-free and deterministic; AgentPromptEffect only requests provider-backed handling
    outside Update.
  - internal/agent.UnavailableRunner reports setup failures as provider events without fake output, and GoAgentRunner remains
    the real go-agent adapter.
  - go test ./internal/runtime ./internal/agent -count=1 and mage check passed.
- number: 7
  name: Route TUI app prompt submission through real agent lifecycle
  depends_on:
  - 3
  - 4
  - 5
  - 6
  status: complete
  acceptance:
  - GIVEN a user submits chat in the TUI in agent mode WHEN the app starts a turn THEN the prompt reaches the real runner path
    instead of FakePromptEffect.
  - GIVEN the model streams assistant output or requests tools WHEN events are adapted THEN the app feeds typed agent messages
