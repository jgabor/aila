scope:
  included:
  - Make the ordinary interactive prompt path use a write-capable bounded fake BUILD agent that can still answer read-only
    prompts but can request a guarded write for small file-creation prompts.
  - Convert agent-requested writes into app-owned approval proposals with path, expected effect, diff preview, default deny,
    and no mutation before an approval decision.
  - Execute approved writes through the existing runtime WriteToolEffect, app dispatch, mutation tool validation, autonomy
    decision evidence, mutation history persistence, and current-session snapshot path; denial must not mutate.
  - Keep active/final assistant output, approval, mutation result, changed path evidence, diff/history inspection, queued
    input, interrupts, paste input, resize, and quit behavior visible and presentation-only.
  - Refresh or add fixtures, semantic snapshots, render snapshots, update/keybinding tests, and PTY smokes required by the
    M34 validation gate.
  excluded:
  - Real provider credential setup, provider-backed arbitrary code generation, multi-file generation, mutating shell command
    execution, new model selection behavior, source indexing, session replay, context compaction, plugin/MCP/dynamic workflow
    behavior, hosted control planes, and M35+ inspection-command expansion.
  deferred:
  - Richer asynchronous streaming, manual approval overriding lower autonomy levels, real provider tool continuation after
    approval, multi-step coding checks, source indexing, stale-context validation, and broader inspection command families.
design: Reuse the M33 agent prompt runner and the existing mutation/approval seams. A write-capable fake agent emits read
  and write tool requests for deterministic interactive smoke. The app maps a write tool request to an approval proposal and
  stores the corresponding mutation request outside the TUI. Approval denial clears the proposal without mutation. Approval
  approval dispatches the existing WriteToolEffect through app-owned tool/permission code, then surfaces the resulting mutation
  and history metadata through existing view models. The TUI continues to emit only prompt, shortcut, interrupt, resize, paste,
  and approval-decision messages.
overall_acceptance:
- A normal interactive read-only prompt still produces read-only BUILD output and does not show mutation or approval surfaces.
- A normal interactive small file-creation prompt shows a write approval proposal with diff preview and does not create the
  target before approval.
- Approval creates the requested workspace file through the existing write effect, exposes mutation decision/result evidence,
  records mutation history with undo metadata, and leaves the final summary visible.
- Denial leaves the workspace unchanged and shows the decision.
- Diff and history inspection can show the approved interactive write; queue, interrupt, paste, resize, and quit smokes remain
  clean and bounded.
- Required render and semantic snapshots cover active build, approval, diff, history, tool-running, tool-failed, queued input,
  and final summary at the milestone-required sizes, or document a narrower already-existing fixture size when the scenario
  is unchanged by M34.
