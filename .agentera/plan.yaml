  status: complete
  completed: '2026-05-18'
  evidence:
  - internal/runtime/runtime.go adds CapabilityOutputDelta and CapabilityDraft so model assistant deltas emitted during active capability runs are recorded separately from normal assistant_delta transcript entries, and existing active-work queuing still prevents concurrent capability starts.
  - internal/app/capability_agent.go now returns a single CapabilityCompleted terminal message per model-backed run after streaming capability deltas, typed JSON parsing, or unstructured summary fallback.
  - internal/app/capability_agent.go maps missing runner setup, stream setup failures, stream error events, malformed structured output, and context cancellation into bounded flagged or stuck ExitPayload values with NextAction recovery guidance.
  - internal/app/capability_agent.go dispatches capability model read/find/grep/bash/fetch tool requests through app-owned runtime effects and existing permission/effect dispatch, preserving capability-owned IO prohibition.
  verified: mage fmt passed; go test ./internal/app ./internal/runtime ./internal/capability -run 'TestCapabilityRunner|TestUpdateRoutesBriefCapabilityThroughEffectBoundary' -count=1 passed; go test ./internal/app ./internal/runtime ./internal/capability -count=1 passed.
  acceptance:
  - GIVEN the runner emits assistant deltas WHEN a capability is active THEN Aila streams or records them as capability output without corrupting the normal chat transcript or starting concurrent capability runs.
  - GIVEN the runner completes normally WHEN output is parsed or summarized THEN exactly one capability completion message records the final typed exit payload.
  - GIVEN provider setup fails, the stream errors, output is malformed, or context cancellation occurs WHEN the capability run settles THEN the user sees a bounded flagged/stuck/cancelled capability result with recovery guidance.
  - GIVEN a capability model run requests tools WHEN tool execution is allowed for that phase THEN requests still pass through existing permission, history, and effect dispatch rather than capability-owned IO.
