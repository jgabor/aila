  title: 'Milestone 50A: Discuss Capability'
what: Deliver ROADMAP.md Milestone 50A by implementing the discuss capability so Aila can deliberate on consequential decisions,
  persist the resulting decision artifact, and surface waiting, output, and recorded-decision evidence without bypassing workflow
  authority.
why: M50 shaped vision before planning. M50A adds the next DELIBERATE-phase capability so consequential choices can be captured
  as durable app-owned decision evidence before plan, build, or renewed vision work.
constraints: Execute only Milestone 50A. Preserve statechart-MVU and explicit effect boundaries. Discuss may recommend only
  FSM-valid DELIBERATE successors such as PLAN, BUILD, or ENVISION; it must not directly mutate workflow phase. Persist decision
  artifacts through the state.Store logical artifact path, not direct writes outside the store. Keep research, profile, optimization,
  build execution, orchestration, provider-backed strategy synthesis, plugins, MCP, workflow DSLs, generic graph engines,
  hosted control planes, M51+ behavior, and pushes out of scope. Use behavior-based test names; do not introduce new TestM<number>
  symbols.
