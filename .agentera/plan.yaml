  critic_issues: >-
    M37A must implement only the prompt input UX family: editor command, file-reference picker/insertion,
    and multiline paste display while preserving exact prompt text. The TUI may own keystroke/focus/display state, but it
    must not open editors, walk files, mutate files, persist sessions, call providers, assemble model context, execute shell
    commands, or own workflow transitions. File-reference discovery must use app-owned read-only discovery effects. Do not
    add shell prefixes, compaction, provider context assembly, generic command registries, plugins, MCP, workflow DSLs,
    hosted control-plane behavior, or M38+ scope.
  title: 'Milestone 37A: Prompt Input UX Family'
what: Deliver ROADMAP.md Milestone 37A by adding the README-promised prompt input affordances for /editor and ctrl+x e,
  @ file references, and multiline paste summaries through typed input messages, app-owned handlers, deterministic TUI
  fixtures, semantic snapshots, PTY smoke, and no hidden TUI side effects.
why: M35-M37 established closed command routing, app-owned command surfaces, and session-scoped model/autonomy selection.
  M37A makes the prompt box itself usable for real coding-agent input while preserving the architecture boundary that only
  app/runtime/tool layers perform editor IO, project discovery, persistence, provider context assembly, and shell execution.
constraints: 'Execute only Milestone 37A. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may update local prompt display, file-reference focus/selection, and paste summaries, but it must emit app-owned messages
  or callbacks for editor opening and project file discovery. Do not let TUI read or write files, launch editors, inspect git,
  persist sessions, call providers, assemble model prompts, execute shell commands, or mutate workflow phase. Use closed policy
  routes for /editor and ctrl+x e. Use existing read-only search/find/tool boundaries for file-reference discovery. Preserve
  exact pasted text in prompt/session state while rendering a bounded [Pasted lines +X] summary for long pastes. Keep /compact,
  shell prefixes, provider context assembly, source indexing beyond bounded file discovery, plugins, MCP, workflow DSLs,
  generic registries, hosted control planes, and M38+ behavior out of scope. Use behavior-based test names; do not introduce
  new TestM<number> symbols. Do not push.'
