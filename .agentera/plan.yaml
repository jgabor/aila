  - GIVEN canonical validation runs WHEN this task is complete THEN mage check completes successfully.
  validation:
  - go test ./cmd/aila -run TestResearchCommandFoldsContextWithoutArtifactPTYSmoke -count=1
  - go test ./cmd/aila -count=1
  - mage check
  evidence:
  - TestResearchCommandFoldsContextWithoutArtifactPTYSmoke passed in 8.690s.
  - cmd/aila orchestration PTY cleanup was repaired by draining remaining terminal output before /quit, matching neighboring
    capability smoke tests and avoiding PTY output backpressure.
  - go test ./cmd/aila -count=1 passed in 401.596s; mage check passed with cmd/aila in 406.391s.
overall_acceptance:
- A production TUI user can submit a chat prompt that reaches the real GoAgentRunner path when config and credentials are valid.
- Production app construction no longer always uses agent.FakeBuildRunner.
- Production config and credential resolution are wired into runner construction and fail with actionable diagnostics when invalid.
- The real runner receives Aila's fixed built-in tool definitions as needed, without plugins, MCP, or dynamic tool loading.
- runtime.Update handles AgentAssistantDelta, AgentToolRequested, AgentTurnCompleted, and AgentTurnFailed deterministically.
- submitAgentPrompt no longer emits FakePromptEffect in agent mode, and assistant transcript output comes from agent events.
- Streaming completion feeds AgentTurnCompleted through runtime and returns status idle where appropriate.
- TestResearchCommandFoldsContextWithoutArtifactPTYSmoke no longer times out, and mage check passes.
- The work prepares Aila for a later human M57 dogfood walkthrough but does not claim or execute that milestone.
surprises:
- The first two Planera subagent attempts stalled because they tried to delegate planning; the final draft was produced with an
  explicit no-subagent/no-delegation constraint.
- The current M56 plan was complete and has been archived before replacement to preserve closeout evidence.
- go-agent's exact tool registration API may require adapter changes; keep those changes narrow and inside internal/agent and
  fixed internal/tools contracts.
- The PTY timeout may reveal a broader event-loop lifecycle issue; fix the lifecycle if so rather than weakening the smoke test.
- Current runtime agent lifecycle handlers already existed; the missing runtime piece was a non-fake agent prompt start effect.
- The orchestrate PTY smoke had the same terminal-output backpressure pattern as neighboring capability PTY tests and needed
  bounded output draining before sending /quit.
