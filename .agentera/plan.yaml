  depends_on: []
  status: complete
  completed: '2026-05-18'
  evidence:
  - internal/capability/contract.go defines typed model-backed execution contracts, bounded request context preservation, explicit model-call boundary data, and typed waiting/stuck missing-context reasons for fixed built-ins.
  - internal/capability/contract_test.go covers registry contract coverage, context preservation, typed waiting, and typed stuck paths without live provider access.
  - internal/runtime/runtime_test.go covers runtime capability proposal emission as an explicit CapabilityEffect carrying inert model-call execution data while runtime.Update remains IO-free.
  verified: mage fmt passed; go test ./internal/capability ./internal/runtime passed.
  acceptance:
  - GIVEN the fixed capability registry in `internal/capability/contract.go` WHEN the capability execution contract is documented in tests or types THEN every built-in capability has a model-backed execution path or a typed waiting/stuck reason for missing required context.
  - GIVEN runtime receives a capability proposal WHEN it emits work to be interpreted THEN the model call remains represented as an explicit effect and `runtime.Update` performs no provider, filesystem, artifact, shell, git, or network IO.
  - GIVEN a capability request includes phase, input, source refs, and metadata WHEN the runner seam prepares execution THEN those inputs are preserved in a bounded request context rather than dropped or reinterpreted by the TUI.
  - GIVEN the existing deterministic capability structs remain in use WHEN the new contract is introduced THEN tests can still assert typed exit payload shape without requiring live provider access.
