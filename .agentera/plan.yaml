header:
  level: full
  created: '2026-05-18'
  status: complete
  title: 'Fix Aila dogfood blockers for real TUI agent execution'
  reviewed: '2026-05-18'
  completed: '2026-05-18'
  critic_issues: Aila cannot yet dogfood itself because the production TUI chat path still reaches fake agent behavior,
    runtime lacks real agent lifecycle handling, production config and credentials are not connected to GoAgentRunner,
    fake prompt effects pollute agent-mode transcripts, completion does not reliably return runtime status to idle, and
    a PTY smoke-test timeout blocks mage check.
  previous_plan_archived: .agentera/archive/plan-2026-05-17-m56.yaml
what: Prepare Aila for human M57 dogfooding by fixing the six blockers that prevent a production TUI user from typing
  in chat, reaching a real model runner, executing fixed built-in tools through the existing permission/effect paths,
  and seeing completion return to idle with mage check passing.
why: M56 completed orchestration and the roadmap now points to human-only M57. Before a human can dogfood Aila on Aila,
  the existing agent, runtime, app, tool, and TUI seams must be wired end-to-end for real model execution instead of fake
  transcript behavior.
constraints: Do not execute M57 dogfooding. Preserve statechart-MVU and explicit effect boundaries. Keep runtime.Update
  deterministic and IO-free. Keep TUI presentation-only. Use Aila's fixed built-in tools only; do not add plugins, MCP,
  dynamic tools, provider marketplaces, workflow DSLs, hosted control planes, or broader framework scope. Fake runners
  may remain for tests and deterministic fixtures but must not be the unconditional production path. Do not push.
