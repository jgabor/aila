what: Deliver ROADMAP.md Milestone 23 by defining an internal agent event boundary and mapping fake provider-style streams into typed Aila runtime messages. Assistant deltas, tool requests, errors, and completion must be deterministic and testable before any real provider execution is introduced.
why: M22 made read-only tool permission decisions observable. M23 prepares the model/provider seam by proving event mapping independently from go-agent, credentials, live providers, and real turn execution so M24 can wire the real runner behind a tested adapter contract.
constraints: 'Execute only Milestone 23. Preserve statechart-MVU: provider-style events may be adapted into typed runtime messages, but no real provider calls, go-agent runner execution, credential flows, tool execution, approval prompts, write classes, context compaction, stale checks, source indexing, plugins, MCP, workflow DSL, marketplace, hosted control plane, or Milestone 24+ behavior may be added. Runtime remains deterministic and TUI consumes injected presentation fields only. Do not push.'
