header:
  level: full
  created: '2026-05-17'
  status: complete
  reviewed: '2026-05-17'
  critic_issues: M48 must connect plan items to one bounded build step through existing runtime/effect, tool, permission,
    history, state, and TUI visibility paths. It must execute exactly one planned task or step and then hold, preserve surprises
    and caveats, keep audit/optimization/document/design/orchestration/provider marketplace/plugins/MCP/workflow DSL/generic
    graph/hosted control-plane behavior out of scope, and use behavior-based test names instead of TestM<number> names.
  title: 'Milestone 48: Build Capability'
what: Deliver ROADMAP.md Milestone 48 by implementing the build capability so Aila can take one active plan item, execute
  one bounded fake or temp-workspace build step through the existing safety and visibility paths, preserve changes/blockers/caveats/final
  summary, and then hold.
why: M47 created scoped work without executing it. M48 should consume that plan-shaped state and prove the first build step
  uses Aila-owned runtime effects, tool and permission gates, mutation history, state persistence, and TUI evidence instead
  of bypassing the product architecture.
constraints: Execute only Milestone 48. Preserve statechart-MVU and explicit effect boundaries. Build may recommend a valid
  BUILD or AUDIT successor through one exit payload and the FSM validator, but it must not directly mutate workflow phase.
  Build execution must use existing runtime message/effect, tool, permission, history, and state paths; no direct capability-side
  file IO. Execute one bounded task or step, then hold. Preserve surprises, caveats, blockers, changed paths, approval evidence,
  tool state, and final summary visibly. Keep audit findings, optimization, document/design/orchestrate behavior, provider/model
  autonomous loops beyond a deterministic fake/temp-workspace step, broad capability command parity, plugins, MCP, workflow
  DSLs, generic graph engines, hosted control planes, M49+ behavior, and pushes out of scope. Use behavior-based test names;
  do not introduce new TestM<number> symbols.
