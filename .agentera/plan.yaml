scope:
  included:
  - Add deterministic discuss capability request metadata and typed output for question, context, decision options, selected
    decision, reasoning, confidence, blockers or needed input, artifact refs, source refs, and one exit payload.
  - Validate discuss successor recommendations through the existing workflow FSM so DELIBERATE can route only to valid successors
    and never direct-mutates phase.
  - Extend the state artifact catalog and app wiring so completed discussion output is persisted through the state store as
    an app-owned logical decisions artifact.
  - Expose discuss display state in the TUI with phase, active capability, decision options, selected decision, needed input,
    blockers, artifact status/path, source refs, successor validation, display-only state, and transition_claimed=false.
  - Add or update discussion output, waiting-for-input, and recorded-decision fixtures plus behavior-named capability/runtime/state/app/policy/TUI/PTY
    coverage when interactive /discuss behavior is added.
  excluded:
  - Research, profile, optimization, build execution, orchestration, provider-backed strategy generation, automatic plan/build
    execution, broad capability parity, direct workflow phase mutation, plugins, MCP, workflow DSLs, generic graph engines,
    hosted control planes, M51+ behavior, and push operations.
  deferred:
  - Inspirera research source gathering, profilera decision-pattern analysis, optimera objectives, provider-backed deliberation,
    multi-cycle decision-to-plan orchestration, Agentera .agentera/decisions.yaml synchronization, and full natural-language
    command alias activation.
design: Keep discuss deterministic and host-owned. internal/capability defines DiscussCapability and DiscussOutput over app-supplied
  decision evidence; it emits waiting when no decision question is available and complete or flagged when it can record a
  choice. internal/runtime reuses CapabilityProposed, CapabilityEffect, and CapabilityCompleted. internal/state adds a logical
  decisions artifact owned by the app. internal/app invokes discuss from the exact /discuss surface, persists the produced
  document through state.Store, maps the payload into tui.DiscussView, and records runtime/session evidence. internal/tui
  renders injected DiscussView state and semantic JSON only; it never reads files, writes artifacts, judges transitions, or
  changes workflow phase.
overall_acceptance:
- Capability tests prove discuss emits exactly one payload with deterministic question, context, options, selected decision,
  reasoning, confidence, blockers or needed input, artifact/source refs, boundary descriptors, and valid DELIBERATE successor
  recommendations without direct phase mutation.
- State/app tests prove decision artifacts are resolved and written through state.Store as OwnerApp, and that /discuss routes
  through typed capability effects without provider calls, tool execution, direct filesystem writes outside the store, or
  workflow phase mutation.
- Policy/workflow checks prove /discuss command routing is closed and any discuss follow-up recommendation accepts only valid
  DELIBERATE successors through the existing FSM validation path.
- TUI render and semantic snapshots show phase, active capability, decision options, selected decision, needed input, blockers,
  decision artifact path/status, source refs, successor validation, display_only=true, and transition_claimed=false in discussion
  output, waiting-for-input, and recorded-decision fixtures where visible.
- PTY smoke proves the selected interactive /discuss behavior shows discussion evidence and, for complete output, persists
  the decision artifact in an isolated temp workspace without mutating unrelated files or git state.
- Targeted, package, full Mage, Agentera, diff, home-path, and added func TestM<number> hygiene validation pass before ROADMAP.md
  is updated.
