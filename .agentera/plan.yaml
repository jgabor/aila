scope:
  included:
  - Add a closed `/review` and shortcut route that shares the same policy/app/TUI command path as the existing inspection
    commands.
  - Replace the `/status` placeholder with app-owned current runtime, store, memory, diagnostic, command, queue, and attention
    evidence available today.
  - Build `/review` as a read-only app-owned inspection summary from current diff, history, runtime, diagnostics, and memory
    state; make limitations explicit without invoking a provider review.
  - Preserve and tighten `/history` and `/diff` behavior so they continue to read through existing app-owned history/diff
    readers and display current state depth.
  - Refresh fixtures, semantic snapshots, render snapshots, route/keybinding tests, and PTY smoke for status, review, history,
    and diff navigation.
  excluded:
  - Model switching, autonomy switching, editor integration, compaction, provider-backed code review, arbitrary shell command
    surfaces, source indexing, session browsing, command palettes, generic command registries, plugins, MCP, workflow DSLs,
    hosted control planes, and M36+ session command behavior.
  deferred:
  - Richer provider-assisted reviews, source index summaries, session list/restore UX, compacted-context inspection, model/autonomy/editor
    commands, and expanded command discoverability.
design: Keep command routing closed in `internal/policy`, and keep all inspection data assembly in `internal/app`. The TUI
  receives inert `ViewState` data through existing injection helpers plus a narrow review/status display helper if needed.
  `/history` continues to use the fake history store reader; `/diff` continues to use the safe app diff reader; `/status`
  becomes a current-state view instead of a deterministic placeholder; `/review` summarizes current diff/history/runtime/diagnostic
  evidence read by the app. The TUI remains a renderer and input collector only.
overall_acceptance:
- '`/status` and `ctrl+x s` show current runtime, project-store, memory/run, diagnostics, queue, footer, and command evidence
  without the old placeholder/deferred marker.'
- '`/review` and its shortcut route are closed policy recommendations and show a read-only current-change review summary from
  app-owned diff/history/runtime state, including explicit attention or empty-state evidence.'
- '`/history` and `ctrl+x h` still browse stored events, mutations, undo metadata, and empty history through the existing
  state reader.'
- '`/diff` and `ctrl+x d` still inspect staged, unstaged, and untracked current changes through the existing read-only diff
  path.'
- Status, review, history, and diff surfaces have render and semantic snapshots, and command/keybinding tests prove slash/shortcut
  parity.
- Representative PTY smoke navigates across inspection views and exits cleanly without mutation, provider review, compaction,
  model/autonomy/editor behavior, or session-command expansion.
