  title: Milestone 21 Fetch Tool
what: >-
  Deliver ROADMAP.md Milestone 21 by adding `fetch` as a fixed, read-only
  network boundary. Aila must fetch remote content through an explicit,
  bounded, fakeable tool effect with clear network error reporting while keeping
  provider/model networking separate and preserving statechart-MVU and
  presentation-only TUI boundaries.
why: >-
  M18 through M20 established local read, discovery, content search, and safe
  shell inspection as explicit read-only effects. M21 adds the separate network
  read primitive needed for remote context without coupling user-requested fetch
  to model/provider clients, fallback behavior, source indexing, or future
  context compaction.
constraints: >-
  Execute only Milestone 21. Preserve statechart-MVU: deterministic updates may
  propose and receive typed fetch results, but network IO must remain in guarded
  app/tool effects. Keep provider and model networking completely separate from
  fetch. Make network behavior fakeable in tests; tests must not require live
  external network access. Bound response bytes and previews, expose omitted
  content markers, classify fetch as read-only where existing autonomy policy
  permits read operations, and surface clear validation, HTTP, timeout,
  cancellation, content, and execution errors. Do not add edit/write, mutation
  history, approval persistence, undo/replay, context compaction, stale checks,
  source indexing, generic HTTP client framework, provider fallback, plugin, MCP,
  workflow DSL, marketplace, hosted control plane, or Milestone 22+ behavior. Do
  not push.
