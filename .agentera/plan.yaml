  critic_issues: M44 must add only idle-only background context compaction. It must preserve the existing manual /compact
    path, source refs, exact critical details, explicit runtime/app effect boundaries, and TUI presentation-only behavior
    while avoiding workflow phase changes, file writes, git mutations, hidden artifact writes, permission approvals, provider/model
    calls, summary refresh, stale-context policy expansion, plugins, MCP, workflow DSLs, generic graph engines, hosted control
    planes, and M45+ behavior.
  title: 'Milestone 44: Utility Continuous Compaction'
what: Deliver ROADMAP.md Milestone 44 by adding a deterministic idle-only background compaction path that preserves source
  refs and exact critical details while remaining visibly distinct from manual /compact.
why: M40 proved manual context compaction and M41-M43 proved idle-only utility work. M44 uses those seams so Aila can compact
  background context without hidden workflow or file mutation and without replacing the user-invoked /compact command.
constraints: 'Execute only Milestone 44. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may render app-injected background compaction state and semantic evidence, but it must not schedule compaction, inspect
  files, mutate state, call providers, persist project artifacts, change permissions, compact context itself, or change workflow
  phase. Background compaction must run only when the primary runtime is idle and no active operation, approval, or queued
  user input exists. Keep manual /compact separate and user-initiated. Preserve source refs and exact critical details. Do
  not write files, mutate git state, write project artifacts, approve permissions, transition workflow phase, make final judgments,
  refresh summaries, rewrite context policy, call providers/models, add plugins, add MCP, add workflow DSLs, add generic graph
  engines, add hosted control-plane assumptions, or add M45+ behavior. Use behavior-based test names; do not introduce new
  TestM<number> symbols. Do not push.'
