  title: Milestone 35 Inspection Command Family
what: Deliver ROADMAP.md Milestone 35 by making `/status`, `/review`, `/history`, and `/diff` useful inspection surfaces at
  Aila's current runtime and state depth, with slash/shortcut parity, render and semantic snapshots, representative PTY navigation,
  and no expansion into unrelated command families.
why: M28-M34 already provide app-owned diff, history, mutation, approval, run memory, and interactive build evidence. M35
  should make the inspection commands coherently expose that evidence so users can see what Aila did, what changed, and what
  needs attention without needing provider-backed review or later session/model/autonomy features.
constraints: 'Execute only Milestone 35. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may render app-injected status, review, history, diff, runtime, diagnostic, memory, and command-route state, but it must
  not read files, run git, choose review findings, inspect history, persist state, mutate files, or own runtime/model prompts.
  Use closed policy routes and app-owned readers/builders for inspection data. Keep model switching, autonomy switching, editor
  integration, compaction, provider-backed review, arbitrary shell, source indexing, session browsing, plugins, MCP servers,
  workflow DSLs, generic command registries, hosted control planes, and M36+ session-command expansion out of scope. Use behavior-based
  test names; do not introduce new `TestM<number>` symbols. Do not push.'
