scope:
  included:
  - Add closed /editor and ctrl+x e routes in internal/policy without adding /compact, shell prefixes, or a generic command registry.
  - Add app-owned editor command handling that opens the current prompt through an injected editor runner, applies edited text
    back to prompt state through typed messages, and supports result/cancel/failure states without TUI IO.
  - Add app-owned file-reference discovery using bounded read-only project discovery effects and TUI-only picker focus/selection
    over injected file-reference rows.
  - Add prompt state that separates exact prompt text from display text so multiline pastes render a bounded [Pasted lines +X]
    summary while preserving exact submitted text and session state.
  - Add editor-open, file-reference-picker, file-reference-inserted, and pasted-lines fixtures with render and semantic snapshots,
    plus update/keybinding tests for editor, @ focus, insertion, paste formatting, prompt restoration, and slash/shortcut parity.
  - Close the milestone with targeted tests, full mage check, ROADMAP status, Agentera progress, and one meaningful local commit.
  excluded:
  - /compact, ctrl+x k, ! or !! shell prefixes, provider context assembly, source indexing beyond bounded read-only file discovery,
    config editing, provider calls, file reads for prompt context, file writes, shell execution, plugins, MCP, workflow DSLs,
    generic command registries, hosted control planes, and M38+ behavior.
  deferred:
  - Context-window budgeting, provider prompt source-reference assembly, compact command behavior, summarized shell command behavior,
    richer fuzzy file search, multi-file context expansion, and persistent prompt draft storage.
design: Keep policy routing closed. Add a narrow app-owned prompt input handler beside the existing session controller so /editor
  and ctrl+x e can request an editor operation without TUI IO, and so @ file discovery can reuse the existing read-only find
  tool path. Extend TUI ViewState with typed prompt input metadata for exact text, display text, paste summaries, editor status,
  and file-reference picker rows. The TUI updates keystrokes, focus, and selected rows locally, but editor opening and project
  discovery are app-owned callbacks. Submitting the prompt sends exact text, not the display summary. File-reference insertion
  adds exact relative links to prompt state without reading file contents.
overall_acceptance:
- /editor and ctrl+x e share one closed route and app-owned handler; opening an editor reads the current prompt, applies edited
  text back to prompt state, and exposes result/cancel/failure state without TUI launching the editor itself.
- Typing @ opens a file-reference picker populated by app-owned read-only project discovery; selection inserts an exact relative
  file link into the prompt, and Escape cancels focus without changing exact prompt text.
- Pasting more than two lines displays [Pasted lines +X] in the input while preserving the exact pasted text for submission,
  prompt restoration, semantic evidence, and session state.
- Editor-open, file-reference-picker, file-reference-inserted, and pasted-lines fixtures have deterministic plain, ANSI, and
  semantic snapshots that expose displayed prompt text, inserted file refs, paste summary, and preserved exact-text reference.
- Update/keybinding tests prove TUI input remains presentation-only and emits app-owned messages/callbacks for editor and file
  discovery, with no filesystem, shell, git, provider, workflow, or persistence IO in TUI update paths.
- Representative PTY smoke uses a fake $EDITOR, selects an @ file reference, pastes multiline text, resizes, and quits cleanly
  without /compact, shell prefixes, provider calls, file mutation, plugins, MCP, workflow DSL, hosted control-plane, or M38+ behavior.
