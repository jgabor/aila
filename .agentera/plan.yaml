header:
  level: full
  created: '2026-05-17'
  status: complete
  reviewed: '2026-05-17'
  critic_issues: M46 must implement only the brief capability as a status/orientation path. It must emit exactly
    one exit payload, use runtime/store/context boundary descriptors instead of direct artifact or phase ownership,
    preserve TUI presentation-only behavior, keep planning/build/audit/orchestration capabilities out of scope,
    validate interactive display through existing status behavior, use behavior-based test names, and avoid new
    TestM<number> symbols.
  title: 'Milestone 46: Brief Capability'
what: Deliver ROADMAP.md Milestone 46 by adding the smallest real brief capability over current runtime state, store/history/context/health
  evidence where available, runtime dispatch wiring, visible TUI brief output, semantic source references, and validation
  proving the capability emits one payload without mutating workflow phase.
why: M45A established capability contracts and policy routing boundaries. M46 should prove those boundaries with
  one useful built-in capability that orients the user without opening the door to planning, building, auditing,
  orchestration, provider calls, or direct state mutation.
constraints: 'Execute only Milestone 46. Preserve statechart-MVU and explicit effect boundaries. Keep brief cross-cutting
  and non-transitioning: it may summarize current phase, runtime status, project store/history/context/health evidence,
  known gaps, source refs, and suggested next action, but it must not recommend or perform a workflow phase transition.
  Capability access to runtime, state, history, context, and health must be represented through typed runtime/store/context
  boundary descriptors and app-supplied evidence, not direct file reads or state-store imports from internal/capability.
  Keep plan, build, audit, orchestration, provider/model execution, mutation tools, permission approval, plugins,
  MCP, workflow DSLs, dynamic tools, generic graph engines, hosted control planes, and M47+ behavior out of scope.
  Use behavior-based test names; do not introduce new TestM<number> symbols. Do not push.'
