header:
  level: full
  created: '2026-05-17'
  status: complete
  reviewed: '2026-05-17'
  critic_issues: M45A must define contracts and selectors only. It must keep concrete capability behavior out of scope, keep
    policy recommendation-only, preserve workflow FSM ownership of phase changes, force model/tool/permission/artifact access
    through runtime messages/effects and store/resolver boundaries, prove exactly one capability exit payload, add visible
    policy-routing fixture evidence, use behavior-based test names, avoid plugins, MCP, workflow DSLs, generic graph engines,
    hosted control planes, and avoid any new TestM<number> symbols.
  title: 'Milestone 45A: Capability Contract And Policy Boundary'
what: Deliver ROADMAP.md Milestone 45A by defining the fixed built-in capability contract, policy routing selectors, typed
  recommendation payloads, visible policy-routing evidence, and tests that prove capabilities and policy stay behind runtime,
  state, permission, and workflow authority boundaries.
why: M45 completed the utility boundary. Before concrete capabilities are implemented, M45A establishes the contracts that
  prevent later slices from inventing ad-hoc interfaces or bypassing runtime, policy, permission, state, or workflow ownership.
constraints: Execute only Milestone 45A. Preserve statechart-MVU and explicit effect boundaries. Keep internal/policy recommendation-only
  and unable to mutate workflow phase. Keep internal/capability as fixed built-in contracts and boundary descriptors, not
  concrete brief/plan/build/audit behavior. Capabilities may request model calls, tool execution, permission checks, artifact
  access, context access, and state writes only through runtime messages/effects and store/resolver boundary descriptors.
  Each invocation must emit exactly one exit payload. Workflow FSM validates any recommended successor. TUI may render app-injected
  policy-routing evidence and semantic snapshots, but it must not route commands, call providers, inspect files, mutate artifacts,
  request permissions, run tools, or transition workflow phase. Do not add plugins, MCP, workflow DSLs, dynamic tools, provider
  marketplaces, generic graph engines, hosted control planes, or M45B+ behavior. Use behavior-based test names; do not introduce
  new TestM<number> symbols. Do not push.
