overall_acceptance:
  - GIVEN fake prompt, response, command, and runtime activity exists WHEN history persistence runs THEN `.aila/` contains a durable fake history source through explicit app/state/history boundaries.
  - GIVEN Aila history is opened WHEN fake history exists THEN the user can inspect prior fake activity through read-only TUI state rather than hardcoded fixtures or filesystem reads from the TUI.
  - GIVEN fake history data is missing, corrupt, oversized, version-mismatched, or path-unsafe WHEN Aila reads it THEN diagnostics are bounded, path-safe, and non-destructive.
  - GIVEN milestone validation runs WHEN documented gates complete THEN history state tests, app recording tests, TUI history-view snapshots, navigation tests, PTY history smoke, targeted tests, and mage check support closeout.
surprises:
  - The roadmap says `/history` may be introduced here only if it belongs to the history view slice; the plan therefore keeps the command read-only and prohibits undo, replay, session restore, real tool/model history, and M18+ tools.
