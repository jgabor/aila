header:
  level: full
  created: '2026-05-17'
  status: complete
  reviewed: '2026-05-17'
  critic_issues: M45 must add only idle-only summary refresh for weak summaries. It must preserve source refs and exact critical
    details, surface low-confidence caveats, reuse the existing UtilityJob runtime/app path, keep the TUI presentation-only,
    and avoid hidden final judgment, file writes, git mutations, project artifact writes, permission approvals, workflow phase
    changes, provider/model calls, context compaction expansion, stale-context policy changes, plugins, MCP, workflow DSLs,
    generic graph engines, hosted control planes, and M45A+ behavior.
  title: 'Milestone 45: Utility Summary Refresh'
what: Deliver ROADMAP.md Milestone 45 by adding a deterministic idle-only utility summary-refresh job that identifies weak
  summaries, refreshes them with preserved source refs and exact details, and exposes confidence caveats without becoming
  hidden final judgment.
why: M42-M44 proved the idle-only utility path for context prep, stale checks, and background compaction. M45 adds the next
  bounded utility capability so summaries can improve while foreground capabilities remain responsible for decisions.
constraints: 'Execute only Milestone 45. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may render app-injected summary-refresh state and semantic evidence, but it must not schedule refresh work, inspect files,
  mutate state, call providers, persist project artifacts, change permissions, refresh summaries itself, or change workflow
  phase. Summary refresh must run only through the existing UtilityJob proposal/effect/result path while the primary runtime
  can yield. Preserve source refs and exact critical details. Surface caveats when confidence is low. Do not write files,
  mutate git state, write project artifacts, approve permissions, transition workflow phase, make final judgments, compact
  context, expand stale-context policy, call providers/models, add plugins, add MCP, add workflow DSLs, add generic graph
  engines, add hosted control-plane assumptions, or add M45A+ behavior. Use behavior-based test names; do not introduce new
  TestM<number> symbols. Do not push.'
