scope:
  included:
  - Add closed /model, /model --utility, /auto, ctrl+x m, and ctrl+x a routes in internal/policy without adding a generic
    command registry.
  - Add app-owned session selection handlers that open model and autonomy selection surfaces, apply selected active primary/utility/autonomy
    values to current session state, and keep config files unchanged in this slice.
  - Use deterministic provider readiness/model diagnostic data to show available, degraded, and unavailable model choices
    without provider execution or credential probing.
  - Add presentation-only TUI model/autonomy selection surfaces with inert navigation/focus and app-owned apply callbacks
    for selected rows.
  - Refresh help text, route/keybinding tests, model-switch and autonomy-switch fixtures, semantic snapshots, render snapshots,
    and PTY smoke for selection and quit where interactive.
  - Close the milestone with targeted tests, full mage check, ROADMAP status, Agentera progress, and one meaningful local
    commit.
  excluded:
  - Persistent config editing, provider execution path changes, live credential checks, provider/model marketplace APIs, arbitrary
    model catalogs, editor integration, compaction, shell prefixes, source indexing, command palettes, generic command registries,
    plugins, MCP, workflow DSLs, hosted control planes, and M37A+ prompt-input behavior.
  deferred:
  - Persistent model configuration UI, richer model search/filtering, live provider authentication, provider-backed model
    switching in real agent turns, context-window budgeting, editor/file-reference/paste affordances, compaction commands,
    and shell prefixes.
design: Keep command routing closed in internal/policy. Add narrow app-owned selection builders in internal/app that derive
  current values from loaded display config/session state and model readiness rows from internal/agent deterministic diagnostics.
  The TUI renders typed model/autonomy selection views, owns only cursor movement and focus state, and calls the app-owned
  route callback with a closed selection recommendation when Enter applies a row. Applying /auto updates controller.autonomyLevel
  and the runtime dispatch autonomy for subsequent tool decisions; applying /model updates active session display labels and
  fake agent provider/model metadata only. No config file write, provider call, credential check, or marketplace/catalog abstraction
  is introduced.
overall_acceptance:
- /model and ctrl+x m open a primary-model selection surface sourced from app-owned current config/session state and deterministic
  provider readiness data.
- /model --utility opens the utility-model selection surface and applies the selected utility label to the current session
  without changing the primary model.
- /auto and ctrl+x a open autonomy choices off/read/write/yolo, and applying a choice updates current session autonomy plus
  subsequent app-owned permission dispatch decisions.
- Model/autonomy selection rows expose selected/current value, provider, model, family/class/status, credential source or
  readiness detail where available, focus, and app-owned/display-only markers without leaking config paths or credentials.
- model-switch and autonomy-switch fixtures have deterministic render and semantic coverage for selection and active-value
  states, and command/keybinding tests prove slash/shortcut parity.
- Representative PTY smoke switches model/autonomy values in an isolated temp config workspace and exits cleanly without provider
  execution, config persistence, editor/compaction/shell-prefix behavior, plugins, MCP, workflow DSL, hosted control-plane,
  or M37A+ behavior.
