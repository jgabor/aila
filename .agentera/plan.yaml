overall_acceptance:
- GIVEN read-only operations are dispatched WHEN autonomy is `read`, `write`, or `yolo` THEN they are allowed automatically and the decision is recorded in result metadata.
- GIVEN read-only operations are dispatched WHEN autonomy is `off` THEN they are blocked without executor IO and the denied decision is recorded as approval-required without adding approval prompts.
- GIVEN decision state reaches TUI snapshots WHEN rendered THEN current autonomy, decision source, blocked/allowed state, operation metadata, and reason are visible and machine-readable.
- GIVEN milestone validation runs WHEN documented gates complete THEN permission tests, runtime/app decision metadata tests, autonomy/blocked-decision fixtures, optional PTY smoke decision, targeted tests, full `go test ./internal/...`, and `mage check` support closeout.
surprises:
- Existing permission code already enforces off/read for read-only operations; M22's value is making the decisions recorded and observable, not adding approval UX or mutation policy.
