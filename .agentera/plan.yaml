header:
  level: full
  created: 2026-05-16
  status: active
  reviewed: 2026-05-16
  critic_issues: "7 found, 6 addressed, 1 reframed"
  title: Milestone 16 Session Snapshot Resume
what: >-
  Deliver ROADMAP.md:708-728 Milestone 16 by saving the current fake session to
  `.aila/` and resuming it through `continue`, `--continue`, and `-c` without
  hardcoded TUI memory. Aila should persist and restore visible fake chat, queued
  input, diagnostics, blockers, concerns, and status context that exist at this
  point through a narrow state/app boundary.
why: >-
  M15 gave Aila durable project state and M15A made failure modes explicit. The
  next trust boundary is proving Aila can remember a fake session across process
  starts before event replay, history browsing, context compaction, real tool
  history, or model run history exist.
constraints: >-
  Execute only Milestone 16 after the M15A closeout commit. Preserve the
  statechart-MVU rule that updates decide and effects do. Session persistence
  must be requested through explicit app-owned persistence commands/effects and
  recorded results; deterministic runtime updates and TUI rendering must not
  perform filesystem IO. Keep the TUI presentation-only and path-safe. Do not add
  event replay, session selection/history browsing, context compaction, stale
  checks, real provider/tool history, approval persistence, mutation history,
  undo execution, provider fallback, permission policy changes, plugins, MCP,
  workflow DSL behavior, or Milestone 17+ behavior. Do not push. Do not commit
  M16 work unless the user separately requests it.
previous_plan_archived: .agentera/archive/plan-2026-05-16-m15a.yaml
source_anchors:
  - ROADMAP.md:708-728
  - ARCHITECTURE.md:529-607
  - ARCHITECTURE.md:916-923
  - README.md:35-48
  - README.md:123-127
  - docs/tui-testing.md:60-79
  - docs/workflow-architecture.md:343-384
  - docs/notes/PROMPT.md
verification_commands:
  - go test ./internal/state ./internal/app ./internal/tui ./cmd/aila -count=1
  - mage check
scope:
  included:
    - Current fake session snapshot contract under `.aila/sessions/current.json`.
    - Safe read/write behavior for the current snapshot with schema/version checks,
      bounds, redaction, and no-overwrite recovery diagnostics.
    - App-owned persistence requests/results for fake prompt, queue, interrupt,
      cancellation, diagnostic, and visible status state.
    - >-
      `aila continue`, `aila --continue`, and `aila -c` interactive resume from the
      current fake session snapshot.
    - >-
      `idle-with-memory` render and semantic evidence for resumed memory, queued input,
      diagnostics, blockers, concerns, and visible chat state where present.
    - Bounded terminal/process smoke proving resume uses stored state in a temp
      workspace without HOME or source-tree project-state pollution.
  excluded:
    - Event replay, append-only event logs, history browsing, session selection UI,
      resumable run history, context compaction, stale checks, or context-builder
      behavior.
    - Real model/provider/tool history, shell/tool execution history, approval
      persistence, edit records, mutation history, undo execution, provider
      fallback, provider selection changes, or permission policy changes.
    - Dynamic plugins, MCP servers, workflow DSLs, model marketplaces, hosted
      control planes, or Milestone 17+ behavior.
  deferred:
    - Event logs and history view for Milestone 17.
    - Context compaction and stale-source behavior for later context milestones.
    - Real provider/tool/session replay after fake snapshots prove the state seam.
design: >-
  Treat `.aila/sessions/current.json` as the M16 "latest" contract: one current
  fake session snapshot, not a session index or history browser. The snapshot is
  the durable source for current fake runtime/display memory: schema version,
  session id, status source/detail, active flag, runtime status/result, transcript
  turns, queued entries, diagnostics, blockers, and concerns. State owns snapshot
  file layout, schema validation, bounds, redaction, atomic writes, and recovery
  diagnostics. App/runtime code decides when snapshot persistence is requested and
  consumes typed persistence results; TUI receives injected resumed display and
  semantic fields only. Recovery states remain recommendations and never execute
  destructive repair.
tasks:
  - number: 1
    name: Define current session snapshot contract
    depends_on: []
    status: completed
    acceptance:
      - GIVEN a workspace path WHEN the current session snapshot location is described THEN `.aila/sessions/current.json` is derived through internal/state, with provenance, and not from HOME, XDG, Agentera, or TUI state.
      - GIVEN the M16 snapshot schema is inspected WHEN tests validate it THEN it includes schema version, session id, runtime status/source/detail/result, active flag, transcript turns, queued entries, diagnostics, blockers, concerns, and bounded string fields needed by current UI state.
      - GIVEN unsafe or escaped session paths are requested WHEN validation runs THEN state rejects them instead of returning hardcoded or escaped filesystem paths.
      - GIVEN package boundary tests inspect the contract WHEN validation runs THEN session snapshots do not introduce event replay, context compaction, history browsing, provider/tool history, undo, TUI filesystem ownership, plugins, or MCP behavior.
    evidence:
      - >-
        Added `internal/state/session_snapshot.go` with the pure current snapshot path/provenance
        contract, schema types, schema version, runtime status/source/detail/result fields,
        active flag, transcript turns, queued entries, diagnostics, blockers, concerns, and bounded
        string validation.
      - >-
        Added state tests proving workspace-derived `.aila/sessions/current.json`, independence from
        HOME/XDG/Agentera/TUI state, required schema JSON fields, unsupported-version and oversized
        string rejection, exact path validation, and escaped/re-entering traversal rejection.
      - >-
        Extended state boundary tests against runtime/presentation ownership and deferred M17+ or
        out-of-scope behaviors, including event replay, context compaction, history browsing,
        provider/tool history, undo, plugins, MCP, and workflow DSL behavior.
      - >-
        Inspektera first found a traversal-normalization gap, the validator was fixed to reject
        parent traversal before cleaning, and re-audit returned PASS with no findings.
      - >-
        Verified with `mage fmt`, `go test ./internal/state -run 'Session|Snapshot|Boundary'
        -count=1`, `go test ./internal/state -count=1`, and `git diff --check -- internal/state
        .agentera/progress.yaml .agentera/plan.yaml .agentera/archive/plan-2026-05-16-m15a.yaml`.
  - number: 2
    name: Read and write current snapshot safely
    depends_on: [1]
    status: completed
    acceptance:
      - GIVEN no current snapshot exists WHEN it is read THEN state reports no memory without treating it as a failure.
      - GIVEN a valid current snapshot exists WHEN it is read and written THEN visible fake session fields round-trip through bounded, redacted, schema-versioned data.
      - GIVEN corrupt, partial, oversized, or version-mismatched snapshot data exists WHEN it is read THEN state returns a typed recovery diagnostic without overwriting `current.json` or unrelated store data.
      - GIVEN a snapshot write is requested WHEN validation inspects the filesystem THEN the write is owned, atomic, path-safe, and leaves no partial final content or temporary file behind.
      - GIVEN state tests run WHEN validation completes THEN missing, valid, corrupt JSON, partial, oversized, version-mismatch, redaction, atomic write, and no-overwrite cases each have regression-sensitive coverage.
    evidence:
      - >-
        Added state-owned `Store.ReadCurrentSessionSnapshot` and `Store.WriteCurrentSessionSnapshot`
        APIs for `.aila/sessions/current.json`; missing files return typed no-memory state, valid
        snapshots load as schema-versioned current memory, and invalid reads return passive recovery
        diagnostics without overwriting existing data.
      - >-
        Snapshot writes validate the store-derived path, redact secret-like visible fields before
        persistence, reject invalid/oversized contracts before replacing existing content, create only
        the needed `sessions` directory, and use the existing atomic replace helper without leaving
        temp files.
      - >-
        Tests cover missing snapshots, valid redacted round-trip behavior, corrupt JSON, top-level and
        nested partial/null data, unknown fields, version mismatch, oversized files/contracts,
        no-overwrite behavior, atomic final content, and temp cleanup.
      - >-
        Inspektera first found a symlinked `.aila/sessions` ownership gap; read/write now reject
        symlinked store/session components and final snapshot symlinks before filesystem IO can escape
        the project store, with regression coverage.
      - >-
        Verified with `mage fmt`, `go test ./internal/state -run 'Session|Snapshot|Boundary'
        -count=1`, `go test ./internal/state -count=1`, `git diff --check -- internal/state
        .agentera/progress.yaml .agentera/plan.yaml .agentera/archive/plan-2026-05-16-m15a.yaml`,
        and Inspektera re-audit PASS.
  - number: 3
    name: Persist fake session snapshots through explicit effects
    depends_on: [2]
    status: pending
    acceptance:
      - GIVEN fake runtime/app state changes WHEN snapshot persistence is needed THEN app emits an explicit persistence command or effect and receives a typed result message rather than writing from deterministic update or TUI code.
      - GIVEN fake prompt/response, queued input, interrupting/canceled state, diagnostics, blockers, concerns, and visible status context exist WHEN persistence runs THEN the current snapshot captures the visible data that exists at this point.
      - GIVEN snapshot persistence fails WHEN app handles the result THEN a bounded diagnostic is surfaced without direct workflow phase mutation or destructive recovery execution.
      - GIVEN existing prompt, queue, interrupt, diagnostics, status, help, and quit paths run WHEN persistence support exists THEN their behavior remains stable except for intentional snapshot metadata.
  - number: 4
    name: Resume current snapshot through continue startup
    depends_on: [2]
    status: pending
    acceptance:
      - GIVEN a valid current snapshot exists WHEN `aila continue`, `aila --continue`, or `aila -c` runs THEN Aila starts the interactive TUI with resumed fake memory loaded through app-owned startup wiring.
      - GIVEN no current snapshot exists WHEN continue startup runs THEN Aila falls back to normal idle startup without a raw failure or hardcoded memory.
      - GIVEN the current snapshot is invalid WHEN continue startup runs THEN Aila surfaces a path-safe recovery diagnostic without overwriting the snapshot.
      - GIVEN resume state reaches the TUI WHEN tests inspect package boundaries THEN the TUI consumes injected display and semantic fields only and does not import or call internal/state.
      - GIVEN continue support exists WHEN validation checks scope THEN no session index, history browser, event replay, context compaction, or Milestone 17 behavior is introduced.
  - number: 5
    name: Render idle-with-memory evidence
    depends_on: [3, 4]
    status: pending
    acceptance:
      - GIVEN resumed memory is injected into the TUI WHEN the `idle-with-memory` fixture renders THEN resumed chat, queued messages, diagnostics, blockers, concerns, and status context that exist are visible without hardcoded TUI state.
      - GIVEN semantic snapshots are inspected WHEN resumed memory is present THEN memory source, session id, resumed transcript turns, queued count, blockers, concerns, and diagnostics are machine-readable and path-safe.
      - GIVEN snapshot data contains terminal escape or secret-like text WHEN render and semantic evidence is produced THEN output is bounded and redacted without leaking control sequences or credentials.
      - GIVEN queue, interrupt, store-status, and diagnostic fixtures render WHEN memory support exists THEN their existing evidence remains stable except for intentional memory metadata.
  - number: 6
    name: Prove terminal resume smoke
    depends_on: [4, 5]
    status: pending
    acceptance:
      - GIVEN a temp workspace records a fake session snapshot WHEN a bounded terminal/process smoke restarts with `continue` or `--continue` THEN resumed memory is visible and comes from `.aila/sessions/current.json`.
      - GIVEN terminal output is inspected WHEN resume completes THEN session id, resumed transcript, queued input, blockers or concerns where present, and diagnostics are visible without leaking temp workspace, HOME, `.aila`, config, or credential paths.
      - GIVEN cleanup completes WHEN the smoke exits THEN only expected temp workspace project state and config files exist, with no HOME `.aila`, source-tree `.aila`, or unrelated durable state created or modified.
      - GIVEN no current snapshot exists WHEN non-interactive or interactive continue smoke runs THEN Aila remains bounded and exits or idles through the documented no-memory path.
  - number: 7
    name: Plan-level freshness checkpoint
    depends_on: [1, 2, 3, 4, 5, 6]
    status: pending
    acceptance:
      - GIVEN Milestone 16 implementation and validation are complete WHEN targeted tests and mage check run THEN they pass without bypassing configured gates.
      - GIVEN validation passes WHEN ROADMAP.md is updated THEN the Milestone 16 Slice Completion Template records session snapshot state tests, continue/resume tests, idle-with-memory fixtures and snapshots, PTY resume smoke, validation, and architecture checklist evidence.
      - GIVEN closeout metadata is needed WHEN Agentera artifacts are updated THEN progress and plan status are synchronized with the implementation outcome and no M16 commit is created unless separately requested.
      - GIVEN the final response is produced WHEN the user reviews it THEN it includes the completed Slice Completion Template required by docs/notes/PROMPT.md.
overall_acceptance:
  - GIVEN fake session activity exists WHEN persistence runs THEN `.aila/sessions/current.json` becomes the durable source of current fake memory through an explicit app/state boundary.
  - GIVEN Aila is started with continue WHEN a current snapshot exists THEN visible chat, queued input, diagnostics, blockers, and concerns that exist are resumed from store data rather than hardcoded TUI state.
  - GIVEN snapshot data is missing, corrupt, oversized, or version-mismatched WHEN Aila reads it THEN diagnostics are bounded, path-safe, and non-destructive.
  - GIVEN milestone validation runs WHEN documented gates complete THEN state tests, app/continue tests, TUI idle-with-memory snapshots, PTY resume smoke, targeted tests, and mage check support closeout.
surprises:
  - The adversarial review clarified that `current.json` must be explicitly defined as the M16 "latest" contract, snapshot persistence must be an explicit effect/result path rather than app-side incidental IO, and blocker/concern fields must be limited to current visible display data instead of inventing workflow behavior.
