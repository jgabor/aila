scope:
  included:
  - Add closed `/new`, `/clear`, and `/continue` slash routes in `internal/policy`, with `ctrl+x n` opening the new-session
    route and `ctrl+x c` opening the continue route per README. Direct Ctrl-C remains the interrupt path.
  - 'Add app-owned session lifecycle handlers: `/new` resets visible session state and persists a fresh current snapshot,
    `/clear` clears visible state and removes the current snapshot when present, and `/continue` reads/restores the current
    snapshot through the state store.'
  - Add a presentation-only TUI session surface for fresh, cleared, loaded, no-memory, and recovery states, including inert
    selection/focus over app-injected session rows.
  - Refresh help text, route/keybinding tests, session fixtures, semantic snapshots, render snapshots, and PTY smoke for new,
    clear, continue, session selection, focus, and quit.
  - Close the milestone with targeted tests, full `mage check`, ROADMAP status, Agentera progress, and one meaningful local
    commit.
  excluded:
  - Undo/redo changes, model switching, autonomy switching, editor integration, compaction, provider-backed review, arbitrary
    shell command surfaces, source indexing, multi-session indexing beyond the existing current-session store contract, command
    palettes, generic command registries, plugins, MCP, workflow DSLs, hosted control planes, and M37+ command behavior.
  deferred:
  - Full multi-session listing and restore UI, named session IDs beyond the current snapshot contract, compaction-aware continuation,
    richer source index summaries, model/autonomy/editor commands, and expanded command discovery.
design: Keep command routing closed in `internal/policy`. Add store-owned clear semantics beside the existing current-session
  read/write contract. Keep app-owned lifecycle functions in `internal/app`, where `/new`, `/clear`, and `/continue` may call
  state store operations and inject a bounded session view into TUI state. The TUI only renders that inert view and updates
  local focus/selection; it never reads, deletes, writes, or discovers session files. Because README.md:296-297 already assigns
  `ctrl+x c` to `/continue`, M36 moves the chord to continue while preserving direct Ctrl-C as interrupt.
overall_acceptance:
- '`/new` and `ctrl+x n` start a fresh visible session, preserve app display/config/store labels, reset prompt/transcript/runtime/memory
  surfaces, and persist a fresh current-session snapshot through app-owned state code.'
- '`/clear` clears visible session state, removes current-session memory through an app-owned state operation when present,
  and reports cleared/no-memory status without deleting project store or history artifacts.'
- '`/continue` and `ctrl+x c` restore the existing current-session snapshot through the state store, show the selected current
  session in a focused session surface, and expose visible memory status without leaking `.aila` paths.'
- Direct Ctrl-C remains the interrupt shortcut; `ctrl+x c` no longer interrupts because it is the documented continue shortcut
  in this command family.
- Fresh, resumed, cleared, no-memory, and recovery states have deterministic render and semantic coverage, and command/keybinding
  tests prove supported slash/shortcut parity.
- Representative PTY smoke navigates new, continue, clear, and quit over an isolated temp workspace without undo/redo, model/autonomy/editor,
  compaction, plugins, MCP, workflow DSL, hosted control-plane, or M37+ behavior.
