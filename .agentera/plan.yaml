scope:
  included:
  - Closed policy command route for /diff and ctrl+x d that matches existing slash/shortcut parity rules.
  - App-owned read-only diff acquisition for current workspace changes, with injectable fakes for deterministic tests and
    bounded failure/empty states.
  - TUI DiffView presentation state with exact file paths, file statuses, hunks, additions, removals, selected line/file,
    focus, and exit/navigation state.
  - diff-view fixture plus plain/ANSI/semantic snapshots covering narrow and wide layouts, additions/removals, paths, selected
    line, and display-only semantics.
  - PTY smoke that opens and exits the diff view in a temp workspace with a controlled current diff if interactive navigation
    is added.
  excluded:
  - Undo, mutation history browser, durable diff/history records, provider review of diffs, file mutation, git mutation, permission
    changes, state replay, context compaction, stale checks, source indexing, plugins, MCP servers, workflow DSLs, model marketplaces,
    hosted control planes, or Milestone 29+ behavior.
  deferred:
  - Durable mutation history and undo metadata, richer recorded diff storage, review workflows, and provider-assisted diff
    analysis.
design: Mirror the history-view shape for presentation and navigation, but source diff data from app-owned read-only state.
  Policy owns the closed /diff route, app owns current-diff acquisition and mapping, and TUI owns only rendering, focus, selected-line
  movement, and exit input. Use deterministic fixtures as the primary contract and a bounded temp-git PTY smoke for real terminal
  open/exit behavior.
tasks:
- number: 1
  name: Add closed diff route and app-owned diff source seam
  depends_on: []
  status: completed
  acceptance:
  - GIVEN /diff or ctrl+x d is entered WHEN policy and TUI route it THEN both inputs produce the same closed diff command
    route without exposing deferred commands.
  - GIVEN the app opens diff view WHEN a current workspace diff exists THEN diff data is acquired outside the TUI and mapped
    into display-only view state.
  - GIVEN diff acquisition fails or no changes exist WHEN /diff opens THEN the view shows bounded empty/error state without
    mutating files, git state, runtime, or workflow phase.
  evidence:
  - internal/policy command tests prove /diff and ctrl+x d map to the same closed diff route.
  - internal/app diff tests prove the controller opens diff through an injected app-owned source without runtime, workflow,
    snapshot, or fake-history persistence mutation.
  - storeCurrentDiffRead uses the existing safe bash boundary with git diff --cached --color=never -U0 plus git diff --color=never -U0 and bounded failure/empty states;
    temp-git tests prove staged and unstaged workspace changes map into DiffView state.
