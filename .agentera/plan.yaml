scope:
  included:
  - Define fixed built-in capability names, request metadata, boundary request descriptors, registry metadata, exit signals,
    exit payloads, and a single-exit invocation helper in internal/capability.
  - Define internal/policy capability selectors for explicit slash routes, high-confidence natural-language routes, low-confidence
    waiting recommendations, and successor validation recommendations without mutating workflow phase.
  - Represent active capability candidate, confidence, needed input, source refs, requested effects, and successor validation
    as typed values that can flow through app/TUI state.
  - Add policy-routing render and semantic fixture evidence for explicit command route, natural-language route, low-confidence
    waiting state, and invalid successor rejection where visible.
  - Add capability contract, policy boundary, and TUI semantic tests that prove exactly one exit payload, effect-only boundary
    descriptors, no forbidden imports, and no workflow phase mutation.
  excluded:
  - Concrete brief, vision, discuss, research, plan, build, optimize, document, design, audit, profile, or orchestrate behavior;
    provider/model execution; real tool execution; permission approval; artifact persistence; workflow phase mutation; command/keybinding
    additions for capability slash routes; plugins; MCP; workflow DSLs; dynamic tools; generic graph engines; hosted control
    planes; and M45B+ behavior.
  deferred:
  - Concrete capability bodies, slash-command activation for capability shortcuts, command/keybinding parity for introduced
    capability routes, provider-backed capability loops, state-store persistence of capability runs, and richer policy learning/scoring.
design: Add small typed contracts instead of concrete behavior. internal/capability owns stable capability names, request/source/boundary
  descriptors, a fixed registry, exit signals, exit payload validation, and an invocation helper that returns an error on
  second emit. internal/policy owns pure capability recommendations from command/natural-language/waiting/successor inputs
  and uses workflow.ValidateProtocolSuccessor only to report valid or rejected successors. TUI receives app-injected PolicyRouteView
  data and renders semantic evidence without scheduling, executing, or transitioning anything.
overall_acceptance:
- Capability contract tests prove the fixed registry, request boundary descriptors for model/tool/permission/artifact/context/state
  operations, exactly-one exit payload behavior, waiting/stuck payload rules, and forbidden import boundaries.
- Policy tests prove explicit slash route, high-confidence natural-language route, low-confidence waiting route, valid successor
  recommendation, and invalid successor rejection are pure recommendations and leave current workflow phase unchanged.
- TUI plain, ANSI, and semantic policy-routing fixtures expose active capability candidate, confidence, needed input, source
  refs, requested effect descriptors, successor validation, and no phase transition claim before FSM validation.
- No concrete capability behavior, provider/model call, tool execution, permission approval, artifact persistence, workflow
  transition, plugin, MCP, workflow DSL, generic graph engine, hosted control plane, or M45B+ behavior is added.
- Targeted, package, full Mage, Agentera, diff, home-path, and TestM<number> hygiene validation pass before ROADMAP.md is
  updated.
surprises:
- PTY smoke was skipped for M45A because policy-routing state is fixture/app-injected evidence only and no interactive terminal
  command behavior changed.
