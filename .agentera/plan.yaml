overall_acceptance:
  - GIVEN fetch requests are proposed WHEN validation and execution run THEN only bounded HTTP(S) network reads are accepted and no provider/model client or mutation path is involved.
  - GIVEN fetch executes through app/tool effects WHEN results return THEN URL, result status, HTTP status, content type, bounded preview, omitted content markers, and typed network errors are preserved.
  - GIVEN fetch operations flow through runtime/app/TUI WHEN state changes THEN IO remains outside deterministic updates and presentation consumes injected state only.
  - GIVEN failures or denied autonomy occur WHEN dispatch handles them THEN typed bounded failures are surfaced without hidden retries, provider fallback, destructive recovery, or workflow phase mutation.
  - GIVEN milestone validation runs WHEN documented gates complete THEN fetch contract/executor tests, fake network tests, permission/app/runtime tests, render and semantic snapshots, optional PTY smoke decision, targeted tests, full `go test ./internal/...`, and `mage check` support closeout.
surprises:
  - Fetch must be a product-owned read primitive, not a provider client convenience wrapper. Keep tests fakeable and live-network-free by default.
