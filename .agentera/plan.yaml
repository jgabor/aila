  evidence:
  - Decide now evaluates off/read/write/yolo across read, mutation, and exec classes while rejecting unclassified kinds.
  - TestDecideAutonomyMatrixForWriteShapedOperations proves allow/deny/approval-required behavior for each autonomy level
    and operation class.
- number: 3
  name: Record manual decisions against exact proposals
  depends_on:
  - 1
  - 2
  status: completed
  acceptance:
  - GIVEN an approval, denial, or defer action is recorded for a write-shaped proposal WHEN tests inspect the record THEN
    source, allowed, automatic=false, approval_required, reason, operation fields, and action provenance are copied exactly.
  - GIVEN manual approval records are produced WHEN mutation executors are absent THEN no runtime effects or tool execution
    paths are introduced.
  - GIVEN stale or invalid manual actions are supplied WHEN records are created THEN they remain denied/deferred evidence
    rather than permission to mutate.
  evidence:
