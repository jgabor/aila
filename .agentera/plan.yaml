  title: Milestone 34 Interactive Write Build Loop
what: Deliver ROADMAP.md Milestone 34 by letting ordinary interactive BUILD prompts propose a bounded workspace write, show
  an approval boundary, execute the real write effect only after approval, and keep mutation, diff, history, queue, interrupt,
  resize, paste, and final-summary evidence visible through app-owned state.
why: M33 made the ordinary interactive prompt path useful for read-only agent work. M27-M32 already provide mutation tools,
  approvals, history/undo metadata, non-interactive write memory, and diff/history inspection. M34 should join those existing
  seams into the live TUI loop instead of inventing a new executor.
constraints: 'Execute only Milestone 34. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may render app-injected approval, mutation, diff, history, queued, interrupt, paste, resize, and final-summary state,
  but it must not inspect files, choose tools, decide permissions, mutate files, persist state, or own model prompts. Use
  the existing runtime write effects, app-owned dispatch, permission/autonomy records, approval UI, mutation history, diff
  reader, and PTY harness. Keep real provider credential setup, arbitrary prompt-to-code synthesis, multi-file generation,
  mutating shell commands, source indexing, session replay, plugins, MCP servers, workflow DSLs, hosted control planes, and
  M35+ inspection command expansion out of scope. Use behavior-based test names. Do not push.'
