header:
  level: full
  created: 2026-05-16
  status: active
  reviewed: 2026-05-16
  critic_issues: "planned as M18-only; M19+ and mutation tools deferred"
  title: Milestone 18 Read Tool
what: >-
  Deliver ROADMAP.md:795-815 Milestone 18 by adding Aila's first read-only
  workspace tool through explicit effects. The read tool must return bounded file
  previews with exact workspace paths and line ranges while keeping filesystem IO
  outside deterministic updates.
why: >-
  M17 made prior fake activity inspectable through the project store. The next
  trust boundary is allowing Aila to inspect workspace files safely, with source
  references precise enough for future model/tool history, search, edit, and bash
  milestones to build on.
constraints: >-
  Execute only Milestone 18. Preserve the statechart-MVU rule that updates decide
  and effects do. File reads must run through explicit app/runtime/tool effects,
  not deterministic updates or TUI rendering. Keep the TUI presentation-only and
  driven by injected read result state. Preserve exact paths and line ranges in
  results while bounding previews and errors. Do not add find, grep, bash, fetch,
  edit, write, mutation history, undo/redo, replay, context compaction, stale
  checks, real provider fallback, plugin, MCP, workflow DSL, marketplace, or
  Milestone 19+ behavior. Do not push. Do not commit M18 work unless the user
  explicitly requests it.
previous_plan_archived: .agentera/archive/plan-2026-05-16-m17.yaml
source_anchors:
  - ROADMAP.md:795-815
  - README.md:226-243
  - ARCHITECTURE.md:451-483
  - ARCHITECTURE.md:529-607
  - ARCHITECTURE.md:916-945
  - docs/tui-testing.md:52-81
  - docs/workflow-architecture.md:335-354
  - docs/notes/PROMPT.md:1-39
verification_commands:
  - go test ./internal/tools ./internal/app ./internal/tui ./cmd/aila -count=1
  - mage check
scope:
  included:
    - A narrow read tool request/result contract with path, range, preview, truncation, and error metadata.
    - Path-safe, read-only file execution outside deterministic updates with bounded byte/line behavior.
    - App/runtime integration that proposes, classifies, executes, records, and returns read results as typed messages or effects.
    - TUI running/completed read result display state that preserves exact file paths and line references.
    - Read result fixture, semantic snapshot, render snapshot, and tool-running fixture evidence where missing.
    - Targeted tests for bounds, missing files, directories, unsafe paths, binary/oversized content, and no workspace mutation.
    - PTY smoke only if this milestone exposes a visible interactive command path for read.
  excluded:
    - Find, grep, bash, fetch, edit, write, shell command history, mutation history, approval persistence, undo/redo, or replay.
    - Context compaction, stale checks, source index building, real provider/model fallback, multi-tool orchestration, or search ranking.
    - Dynamic plugins, MCP servers, workflow DSLs, model marketplaces, hosted control planes, or Milestone 19+ behavior.
  deferred:
    - Find and grep tools for Milestone 19.
    - Safe bash inspection for Milestone 20.
    - Fetch, edit/write mutation tools, approval persistence, undo, replay, context compaction, and stale checks until their roadmap slices.
design: >-
  Treat read as the first primitive read-only tool seam, not a generic tool
  framework. `internal/tools` owns the read contract, validation, safe filesystem
  execution, and deterministic result shaping. App/runtime code owns explicit
  effect emission and result handling. Policy/permission code classifies the
  operation as read-only without opening mutation paths. The TUI renders injected
  running and completed read result data only; it must not import tool/state
  executors or read workspace files itself.
tasks:
  - number: 1
    name: Define bounded read tool contract
    depends_on: []
    status: completed
    acceptance:
      - GIVEN read requests are validated WHEN tests inspect the contract THEN path, optional start line, optional line limit, max preview bytes, and caller-visible source metadata have explicit typed fields and defaults.
      - GIVEN unsafe, empty, absolute-outside-workspace, traversal, HOME, XDG, Agentera, `.aila`, or directory-like paths are requested WHEN validation runs THEN the contract rejects them with bounded path-safe errors.
      - GIVEN read results are shaped WHEN tests inspect success and failure values THEN exact workspace-relative path, absolute resolved path provenance where appropriate, requested/effective line ranges, preview text, truncation markers, and error kind are explicit and bounded.
      - GIVEN package boundary tests inspect the new contract WHEN validation runs THEN M18 does not introduce find, grep, bash, fetch, edit, write, mutation history, undo/redo, replay, context compaction, plugin, MCP, or Milestone 19+ behavior.
    evidence:
      - >-
        Added `internal/tools` read contract types for request path, optional start line, optional line limit,
        max preview bytes, caller-visible source metadata, validated request defaults, line ranges, truncation,
        error kinds, and read results.
      - >-
        Added lexical validation that rejects empty paths, traversal, absolute paths outside the workspace, HOME/XDG
        paths, `.agentera`, `.aila`, directory-like paths, invalid ranges, and non-absolute workspace roots with
        bounded path-safe errors.
      - >-
        Added deterministic `NewReadSuccess` and `NewReadFailure` result shaping that preserves workspace-relative
        paths, resolved-path provenance, requested/effective ranges, bounded preview text, truncation markers, and
        error kind without performing filesystem IO.
      - >-
        Inspektera passed with no findings after `go test ./internal/tools -count=1` and `git diff --check --
        .agentera/plan.yaml .agentera/progress.yaml .agentera/archive/plan-2026-05-16-m17.yaml internal/tools`.
  - number: 2
    name: Execute safe file reads outside updates
    depends_on: [1]
    status: pending
    acceptance:
      - GIVEN a valid text file and bounded range WHEN the read executor runs THEN it returns stable line-numbered preview content with exact effective line ranges and no workspace mutation.
      - GIVEN missing files, directories, permission errors, symlink escapes, binary content, oversized files, oversized lines, invalid ranges, or context cancellation occur WHEN execution runs THEN typed bounded errors or truncation metadata are returned without panics or partial mutations.
      - GIVEN deterministic update packages are inspected WHEN the executor exists THEN filesystem IO remains in the tool/effect handler path and not in runtime update or TUI rendering code.
      - GIVEN repeated reads run WHEN validation inspects state THEN no `.aila`, HOME, config, Agentera, git, or unrelated durable state is created or modified.
    evidence: []
  - number: 3
    name: Wire read effects through app and policy
    depends_on: [2]
    status: pending
    acceptance:
      - GIVEN a read tool proposal is produced WHEN app/runtime handling runs THEN Aila emits an explicit read command/effect and receives a typed read result message instead of reading files inside deterministic updates.
      - GIVEN autonomy policy classifies the read operation WHEN validation runs THEN read is treated as safe read-only and does not reuse mutation approval, edit/write, bash, fetch, find, or grep paths.
      - GIVEN read execution fails WHEN the result is handled THEN a bounded diagnostic/result is surfaced without workflow phase mutation, destructive recovery, or hidden retries.
      - GIVEN existing prompt, queue, interrupt, history, snapshot, command, help, quit, and diagnostic paths run WHEN read wiring exists THEN their behavior remains stable except for intentional read metadata.
    evidence: []
  - number: 4
    name: Render running and completed read results
    depends_on: [3]
    status: pending
    acceptance:
      - GIVEN an injected running read operation exists WHEN the TUI renders THEN tool-running evidence clearly shows the path/range being read and does not look completed.
      - GIVEN an injected completed read result exists WHEN the TUI renders THEN exact path, requested/effective line range, preview lines, truncation/error metadata, and read-only status are visible without filesystem reads from the TUI.
      - GIVEN semantic snapshots are inspected WHEN read state is present THEN machine-readable fields preserve tool name, status, path, range, line references, truncation, and error kind.
      - GIVEN read data contains terminal controls, credential-like text, HOME/config paths, `.aila`, or workspace paths outside the intended source reference WHEN render and semantic evidence is produced THEN output is bounded and redacted without losing the intentional read target reference.
    evidence: []
  - number: 5
    name: Prove read fixtures and optional PTY smoke
    depends_on: [4]
    status: pending
    acceptance:
      - GIVEN the read result fixture renders WHEN snapshots are updated THEN plain, ANSI, and semantic outputs are checked in with exact path and line references.
      - GIVEN a tool-running fixture was missing before M18 WHEN this task completes THEN it is added with deterministic plain, ANSI, and semantic evidence; otherwise existing running-tool evidence is updated only as needed.
      - GIVEN a visible interactive command path invokes read WHEN terminal smoke runs THEN bounded PTY output shows running/completed read state and exact path/line references without leaking HOME, `.aila`, config, credential, or temp workspace internals.
      - GIVEN no visible interactive command path invokes read in M18 WHEN closeout evidence is prepared THEN PTY smoke is explicitly documented as skipped by the roadmap gate rather than silently omitted.
    evidence: []
  - number: 6
    name: Plan-level freshness checkpoint
    depends_on: [1, 2, 3, 4, 5]
    status: pending
    acceptance:
      - GIVEN Milestone 18 implementation and validation are complete WHEN targeted tests and `mage check` run THEN they pass without bypassing configured gates.
      - GIVEN validation passes WHEN ROADMAP.md is updated THEN the Milestone 18 Slice Completion Template records read tool tests, app/effect wiring tests, TUI fixtures/snapshots, optional PTY smoke decision, validation, and architecture checklist evidence.
      - GIVEN closeout metadata is needed WHEN Agentera artifacts are updated THEN progress and plan status are synchronized with the implementation outcome and no commit is created unless separately requested.
      - GIVEN the final response is produced WHEN the user reviews it THEN it includes the completed Slice Completion Template required by docs/notes/PROMPT.md.
    evidence: []
overall_acceptance:
  - GIVEN a valid workspace file is read WHEN the read tool executes THEN Aila returns bounded content with exact path and line-range references without mutating the workspace.
  - GIVEN invalid, unsafe, binary, oversized, missing, directory, permission-denied, or canceled reads occur WHEN results are surfaced THEN errors are typed, bounded, path-safe, and non-destructive.
  - GIVEN read operations are proposed and completed WHEN app/runtime/TUI paths handle them THEN IO remains outside deterministic updates and the TUI consumes injected display/semantic state only.
  - GIVEN milestone validation runs WHEN documented gates complete THEN tool bounds tests, app/effect tests, render and semantic snapshots, tool-running evidence, optional PTY smoke decision, targeted tests, and mage check support closeout.
surprises:
  - The read tool is the first real workspace tool seam, so this plan keeps the contract narrow and explicitly rejects turning M18 into a generic plugin/tool framework or implementing M19 search tools early.
