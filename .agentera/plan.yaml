  title: Milestone 29 Mutation History And Undo Metadata
what: Deliver ROADMAP.md Milestone 29 by recording edit/write mutation history, approval decisions, command/source metadata, results, and undo
  metadata where supported, then exposing those records in the existing history view.
why: M27 made edit/write mutations possible and M28 made diffs inspectable. M29 makes mutations auditable and prepares safe recovery work before
  M30 adds undo/redo commands.
constraints: 'Execute only Milestone 29. Preserve statechart-MVU and explicit effect boundaries. Keep TUI presentation-only: it may render app-injected
  mutation history and undo metadata, but it must not read history files, mutate files, decide permissions, or execute undo. Keep actual /undo
  and /redo commands, redo state, mutation execution changes beyond history recording, provider review, context compaction, stale checks, source
  indexing, plugins, MCP servers, workflow DSLs, model marketplaces, hosted control plane behavior, and Milestone 30+ behavior out of scope. Use
  behavior-based test names rather than milestone-numbered names. Do not push.'
