scope:
  included:
  - Add deterministic brief capability behavior in internal/capability using the existing capability contract, exactly-one
    invocation guard, and typed boundary descriptors for runtime state, store artifacts, context, and health evidence.
  - Add runtime/app wiring that proposes and completes brief through typed runtime messages/effects while app/store
    code supplies bounded current state, history, context, and health evidence where available.
  - Render brief output in the TUI as app-injected display state with current phase, runtime status, known gaps,
    suggested next action, source refs, and requested boundary descriptors.
  - Update existing interactive status behavior so PTY smoke can display brief without introducing broad command/keybinding
    parity work.
  - Add behavior-named capability, runtime, app, TUI fixture/semantic, and PTY coverage proving one exit payload,
    no phase mutation, runtime/store boundary use, and visible orientation output.
  excluded:
  - Plan, build, audit, orchestration, research, profile, design, document, optimize, discuss, or vision capability
    behavior; provider/model execution; real tool execution; permission approval; mutation tools; workflow phase
    transition; new generic command framework; plugins; MCP; workflow DSLs; dynamic tools; generic graph engines;
    hosted control planes; and M47+ behavior.
  deferred:
  - Slash-command activation for every capability alias, provider-backed capability loops, durable persistence of
    capability runs beyond existing session/history surfaces, richer policy scoring, and Plan capability behavior.
design: Keep brief small and deterministic. internal/capability owns BriefCapability, a request metadata contract,
  boundary descriptors, summary/gap/next-action composition, and one ExitPayload. internal/runtime owns CapabilityProposed,
  CapabilityEffect, CapabilityCompleted, ActiveCapability, and LastCapability so capability execution crosses the
  same update/effect boundary as tools and utilities. internal/app builds a brief request from current ViewState,
  runtime model, project store status, optional fake-history read state, context/footer data, and visible diagnostics,
  then invokes brief while opening /status. internal/tui renders only app-injected BriefView data and semantic snapshots;
  it never reads state, runs capability logic, executes tools, approves permissions, or mutates workflow phase.
overall_acceptance:
- Brief capability tests prove the capability emits exactly one complete exit payload, includes current phase/runtime/status
  orientation, reports known gaps for missing history/context/health evidence, exposes a suggested next action,
  and leaves RecommendedSuccessor empty.
- Contract/boundary tests prove brief describes runtime state, store artifact/history, context, and health access
  through typed boundary descriptors and internal/capability does not import runtime, state, app, tools, permission,
  provider, shell, or network execution packages.
- Runtime/app tests prove brief travels through typed update/effect/completion messages, app supplies bounded state/history/context/health
  evidence through existing store/read seams, and opening status does not mutate workflow phase.
- TUI fixtures and semantic snapshots show brief output, current phase, known gaps, suggested next action, source
  references, boundary requests, transition_claimed=false, and display-only semantics.
- PTY smoke displays brief through the existing interactive status path, or any skipped PTY scenario is documented
  with a reason tied to unchanged interactive behavior.
- Targeted, package, full Mage, Agentera, diff, home-path, and TestM<number> hygiene validation pass before ROADMAP.md
  is updated.
