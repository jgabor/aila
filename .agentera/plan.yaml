header:
  level: full
  created: '2026-05-18'
  status: complete
  reviewed: '2026-05-18'
  critic_issues: '4 found, 4 addressed, 0 dismissed'
  revised: Scoped the work to model-backed built-in capability execution anchored at internal/runtime/runtime.go:510 without adding dynamic capabilities, plugin loading, durable session restore, or capability-owned tool IO.
  title: 'Plan: Wire agent.Runner into capability adapters'

what: >
  Replace deterministic-template capability execution in internal/capability/brief.go:55 `RunBuiltIn` with model-backed execution through Aila's existing internal/agent/runner.go:13 `agent.Runner` boundary so built-in capability runs can construct capability-specific prompts, include project context and relevant artifacts, stream model output, and return typed capability exit payloads. The plan covers all fixed built-in capabilities, with the first execution slice proving the four highest-impact capabilities: plan, build, audit, and brief.
why: >
  Aila's primitive chat loop can now run real model turns, but capability invocations still return deterministic placeholders. That keeps the workflow statechart from producing useful planning, implementation, audit, or briefing output. Wiring capabilities through the same runner seam makes the fixed Agentera-inspired workflow usable while preserving Aila's explicit-effect architecture.
constraints: >
  Preserve the fixed-product boundary: no runtime plugins, user-defined capabilities, MCP, workflow DSL, dynamic tools, hosted control plane, or model marketplace. Keep `runtime.Update` deterministic and IO-free; model calls must occur behind effect/app-owned boundaries. Keep the TUI presentation-only. Capabilities may describe needed boundary access and emit typed exits, but must not directly read files, execute tools, mutate artifacts, mutate workflow phase, or bypass permission/history/undo paths. Reuse the existing configured provider/model and `agent.Runner` abstraction; do not add user-facing config for per-capability models, prompt templates, or rollout flags. Do not restore or modify `.agentera/session.yaml`. Do not push.
design: >
  Treat capability model execution as a runtime/app effect interpretation, not as direct IO inside deterministic state updates. A shared capability runner seam anchored at internal/runtime/runtime.go:510 `CapabilityEffect`, internal/app/prompt.go:270 `dispatchEffects`, and internal/agent/runner.go:13 `Runner.Stream` should assemble each fixed capability's instructions, request text, workflow phase, source refs, project context, and artifact summaries into an `agent.RunRequest`, stream provider events through the same supervised event mapping used by interactive turns, and normalize terminal results into one `capability.ExitPayload`. The existing deterministic capability outputs remain useful as typed fallback scaffolding for waiting, stuck, and test cases, but successful model-backed runs should produce real capability documents, summaries, concerns, artifact refs, and recommended successors. The first proof slice must make plan, build, audit, and brief model-backed because they unblock the current workflow loop; the remaining fixed capabilities then use the same contract rather than bespoke adapters.
overall_acceptance: >
  When any fixed built-in capability is invoked, Aila can execute it through an injected `agent.Runner` using capability instructions, project context, source refs, and relevant artifacts without doing IO inside `runtime.Update` or the capability data model. The plan, build, audit, and brief capabilities produce model-backed streamed output and typed exit payloads that remain valid for the workflow FSM. The remaining fixed capabilities are wired through the same model-backed path or explicitly return typed waiting/stuck payloads for missing required context instead of deterministic success templates. Provider errors, cancellation, malformed model output, and missing context are surfaced as bounded capability exits. Focused tests cover prompt construction, runner injection, streaming, exit normalization, no direct capability IO, and regression of deterministic update/effect boundaries; `mage fmt` and `mage check` are the final gate.
surprises: []
previous_plan_archived: .agentera/archive/plan-2026-05-18-agent-turn-completion-lifecycle.yaml

scope:
  included:
  - Define the shared model-backed capability execution contract for all fixed built-in capabilities in `internal/capability/contract.go` and the runtime capability effect path.
  - Build capability-specific prompt/context assembly from existing workflow phase, request input, source refs, project context, and relevant artifacts.
  - Prove the contract with plan, build, audit, and brief before broadening to the remaining fixed capabilities.
  - Stream runner events back as capability output and normalize terminal states into real typed exit payloads.
  - Preserve deterministic runtime updates, explicit effects, permission boundaries, and the TUI presentation boundary.
  - Add regression coverage for runner injection, prompt content, event streaming, exit payloads, failure/cancellation, and no direct capability IO.
  excluded:
  - Runtime plugins, user-defined capabilities, MCP servers, workflow DSLs, dynamic tool catalogs, hosted control planes, per-capability user configuration, provider/model marketplace behavior, durable session restore, `.agentera/session.yaml` restoration, and direct file/tool/model IO from `runtime.Update` or capability value types.
  deferred:
  - Phase-appropriate tool narrowing beyond the current tool registry contract.
  - Native go-agent `SessionStore` ownership for capability conversation history.
  - Utility-worker scheduling and background capability suggestions.

