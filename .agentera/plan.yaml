scope:
  included:
  - Extend the bounded fake history event contract with mutation records and undo metadata while keeping prompt, response, command, and runtime
    events compatible.
  - Persist edit/write mutation history from the app-owned mutation result path, including approval ID when present, tool/command source, changed
    paths, result status, versions, and safe undo metadata where supported.
  - Extend the history-view TUI presentation and semantic snapshots to show mutation records, approval ID, changed paths, result status, and undo
    availability without executing recovery.
  - Add state/history/app tests proving mutation records can be appended, read, inspected, bounded, and redacted.
  - Add or update deterministic fixture snapshots and PTY history navigation smoke if terminal-visible history behavior changes.
  excluded:
  - Actual undo execution, redo execution, /undo or /redo route implementation, recovery file mutation, provider review, durable diff storage
    beyond mutation history metadata, context compaction, stale checks, source indexing, plugins, MCP servers, workflow DSLs, model marketplaces,
    hosted control planes, and Milestone 30+ behavior.
  deferred:
  - Applying undo/redo commands, storing richer previous content for edit/write reversal, review workflows, and provider-assisted recovery suggestions.
design: 'Keep history IO in internal/state and event shaping in internal/history. The app converts completed/denied/failed mutation results into
  structured history events through the existing explicit persistence command. The TUI receives display-only HistoryItem metadata and renders/serializes
  it alongside existing history rows; it never reads .aila/history, decides permissions, or executes undo. Undo metadata is descriptive and bounded
  for M29: create/delete recovery can be marked available when enough information exists, while unsupported recovery cases remain inspectable
  with a reason.'
overall_acceptance:
- Mutation history events validate through the closed history contract and continue to round-trip through .aila/history/fake-events.jsonl without
  breaking older event kinds.
- App-owned mutation dispatch persists structured records with approval ID, changed paths, command/source metadata, status/result fields, and
  undo metadata where supported.
- The history view renders mutation records and selected-record details, including approval ID, changed paths, and undo availability.
- Semantic snapshots expose approval ID, changed paths, and undo availability for mutation history records.
- State/history tests prove mutation records can be appended, read, replay-inspected, bounded, and redacted; PTY history navigation is covered
  if terminal behavior changes.
