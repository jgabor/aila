  - GIVEN streaming completes WHEN the app finishes the turn THEN AgentTurnCompleted is fed through runtime and status returns idle.
  - GIVEN the TUI renders the session WHEN the lifecycle changes THEN it remains presentation-only and does not own tool execution,
    prompt construction, persistence, or workflow phase transitions.
  validation:
  - go test ./internal/tui ./internal/app ./internal/runtime -count=1
  - go test ./internal/... -count=1
  - mage check
  evidence:
  - internal/app/agent_prompt.go feeds adapted agent events through runtime, dispatches read evidence through existing guarded
