scope:
  included:
  - Permission constructors/classification for edit, write, and mutating shell proposals using exact target, command, diff
    preview, expected effect, reversibility, run id, and capability fields.
  - Autonomy decisions for off/read/write/yolo over read, mutation, and exec classes, including automatic decisions and approval-required
    records without execution.
  - Manual approval decision record support that can record approved, denied, and deferred outcomes against exact proposal
    data without executing mutations.
  - TUI fixture/semantic evidence for write/yolo decisions and approval requirement/source/autonomy visibility using injected
    decision metadata.
  - PTY smoke only if terminal-visible autonomy or approval behavior changes; otherwise an explicit skip/regression test.
  excluded:
  - Edit/write tool execution, file mutation, mutating shell execution, temp workspace mutation, recheck-before-execution,
    durable approval persistence, history/undo/replay, live provider calls, provider fallback, context compaction, source
    indexing, plugins, MCP servers, workflow DSLs, model marketplaces, hosted control planes, or Milestone 27+ behavior.
  deferred:
  - Actual edit/write tools in temp workspaces, mutation result messages, recheck immediately before execution, mutation history,
    undo metadata, and durable approval records.
design: Keep permission policy pure and copy-based. Extend ProposedOperation helpers and Decide/RecordDecision semantics so
  write autonomy can allow edit/write/mutating shell classes automatically while read/off require approval and yolo records
  automatic grants. App/TUI continue to consume copied decision metadata only; fake fixtures prove visibility without creating
  mutation effects.
