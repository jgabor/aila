  reviewed: '2026-05-17'
  critic_issues: M36 must add only the session command family, resolve the existing ctrl+x c conflict deliberately, preserve
    state-store ownership, and keep the TUI presentation-only while avoiding undo/redo, model switching, compaction, editor,
    plugins, MCP, workflow DSL, generic command registry, and hosted control-plane behavior.
  title: 'Milestone 36: Session Command Family'
what: Deliver ROADMAP.md Milestone 36 by adding stable TUI paths for `/new`, `/clear`, and `/continue`, backed by app-owned
  session lifecycle effects over the existing current-session snapshot store, with fixtures, semantic snapshots, command/keybinding
  parity, focused session selection behavior, bounded PTY smoke, and no expansion into later command families.
why: M16 introduced current-session snapshot persistence and M31-M35 made stored run memory, history, diff, and inspection
  surfaces visible. M36 should let users start fresh, clear visible session state, and resume the stored current session from
  the TUI itself instead of relying only on CLI startup paths.
constraints: 'Execute only Milestone 36. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may render app-injected session lifecycle state and update focus/selection over inert session rows, but it must not read
  `.aila`, delete snapshots, persist session state, choose resume targets from storage, run git, or own runtime/model prompts.
  Use closed policy routes and app-owned store operations for session lifecycle behavior. Keep undo/redo, model switching,
  autonomy switching, editor integration, compaction, provider-backed review, arbitrary shell command surfaces, source indexing,
  multi-session browsing beyond current store support, plugins, MCP servers, workflow DSLs, generic command registries, hosted
  control planes, and M37+ behavior out of scope. Use behavior-based test names; do not introduce new `TestM<number>` symbols.
  Do not push.'
