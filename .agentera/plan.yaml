  - go test ./internal/tui ./internal/app ./internal/runtime -count=1, go test ./internal/... -count=1, and mage check passed.
- number: 8
  name: Repair bounded PTY smoke validation
  depends_on:
  - 1
  - 7
  status: complete
  acceptance:
  - GIVEN TestResearchCommandFoldsContextWithoutArtifactPTYSmoke is run WHEN the test executes THEN it passes, fails quickly
