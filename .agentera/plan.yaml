  title: Milestone 24 go-agent Read-Only Turn
what: Deliver ROADMAP.md Milestone 24 by wiring a real go-agent-backed runner behind Aila's internal adapter, while keeping fake runner tests as the default verification path. The slice must prove a bounded read-only model/tool turn, typed provider failures, and TUI-visible streaming/tool/error states without giving go-agent ownership of workflow, prompts, permissions, state, or UI.
why: M23 established deterministic provider-style event mapping. M24 makes that adapter executable through a real runner boundary and a fake default runner so Aila can progress from inert fake prompt effects toward read-only agent work while preserving the statechart-MVU and explicit effect architecture.
constraints: 'Execute only Milestone 24. Preserve statechart-MVU: runtime updates remain deterministic, app/internal/agent own runner orchestration, read-only tool requests pass through existing permission/tool effects, and TUI consumes injected display state only. Keep fake runner tests as the default verification path. Do not add write/edit tools, approval UI, mutation history, undo/replay, context compaction, stale checks, source indexing, provider fallback, plugins, MCP servers, workflow DSLs, model marketplaces, hosted control plane behavior, or Milestone 25+ scope. Do not perform live provider calls in automated tests. Do not push.'
