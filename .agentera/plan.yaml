  title: Milestone 28 Diff View
what: Deliver ROADMAP.md Milestone 28 by adding a TUI diff view that makes current or recorded file changes inspectable with
  exact paths, additions, and removals.
why: M27 made edit/write mutation results visible. M28 gives users a review surface for changes before the roadmap adds mutation
  history and undo metadata.
constraints: 'Execute only Milestone 28. Preserve statechart-MVU and explicit effect boundaries. Keep TUI presentation-only:
  it may render diff state and emit navigation/exit input, but it must not run git, read files, mutate files, decide permissions,
  or own history. Keep undo, mutation history, durable diff records, provider review, context compaction, stale checks, source
  indexing, plugins, MCP servers, workflow DSLs, model marketplaces, hosted control plane behavior, and Milestone 29+ behavior
  out of scope. Do not push.'
