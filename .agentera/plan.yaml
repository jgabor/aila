    display-safe fields.
  - GIVEN older prompt/response/command/runtime events are normalized WHEN the contract is expanded THEN those existing event kinds remain valid
    and stable.
  - GIVEN invalid mutation payloads are decoded WHEN required changed-path/result/undo fields are missing or unsafe THEN validation rejects them
    without writing history.
