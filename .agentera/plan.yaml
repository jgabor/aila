scope:
  included:
  - Add a typed summary-refresh utility request/result payload with refreshed/current/low-confidence status, original summary,
    refreshed summary, source ref IDs, exact detail evidence, confidence, caveats, and suggestions.
  - Reuse the existing UtilityJob scheduling, runtime effect, and app display mapping so summary refresh remains idle-only
    and primary-runtime-neutral.
  - Retarget app-owned /status utility state to summary refresh with bounded deterministic summary/detail/source-ref inputs.
  - Add summary-refresh render and semantic support plus a summary-refresh fixture proving refreshed summary, source refs,
    confidence, caveats, and safety evidence.
  - Update app/status and PTY smoke tests because summary-refresh output will be visible interactively.
  excluded:
  - Provider/model-assisted refresh, file writes, git mutations, hidden artifact writes, permission approval, workflow phase
    mutation, final judgment, context compaction expansion, stale-context policy changes, durable refresh persistence policy,
    plugins, MCP, workflow DSLs, generic graph engines, hosted control planes, and M45A+ behavior.
  deferred:
  - Provider-assisted summary quality scoring, durable refreshed-summary storage, automatic foreground adoption of refreshed
    summaries, and capability-policy contracts from M45A.
design: Extend internal/utility with a pure SummaryRefreshInput and SummaryRefresh result. The deterministic job compares
  a bounded original summary against required exact details and source refs supplied in the request. If details are missing,
  it emits a refreshed summary carrying the same source refs; if details are already present, it reports current; if source
  refs or details are insufficient, it reports low confidence with caveats. Runtime continues to gate UtilityJobProposed with
  utility.CanRun. App maps the result into /status utility display data. TUI renders injected summary-refresh data and semantic
  items only.
overall_acceptance:
- Utility tests prove refreshed, current, and low-confidence summary-refresh outputs preserve source refs, exact details,
  caveats, and read-only safety boundaries.
- Runtime/app tests prove summary refresh uses the existing idle-only UtilityJob path and does not mutate primary runtime
  status, transcript, workflow phase, files, git state, project artifacts, permissions, or final judgment.
- /status renders summary-refresh status, refreshed summary, confidence, caveats, source refs, suggestions, evidence, and
  safety output.
- TUI plain, ANSI, and semantic snapshots include a summary-refresh fixture and prove presentation-only output.
- PTY smoke proves the visible /status summary-refresh output when interactive behavior changes.
- No provider/model call, context compaction expansion, stale-context policy expansion, plugin, MCP, workflow DSL, generic
  graph engine, hosted control plane, or M45A+ behavior is added.
- Targeted, package, full Mage, Agentera, diff, home-path, and TestM<number> hygiene validation pass before ROADMAP.md is
  updated.
surprises:
- The PTY smoke needed to wait through the visible utility safety footer after /status so residual status lines did not bleed
  into the following /review capture.
