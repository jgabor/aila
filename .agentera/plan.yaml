    slice isolation.
- number: 2
  name: Enforce autonomy decisions for write classes
  depends_on:
  - 1
  status: completed
  acceptance:
  - GIVEN off/read/write/yolo levels are evaluated against read, edit, write, and mutating shell proposals WHEN permission
    tests run THEN each level allows, denies, or requires approval according to README/ARCHITECTURE autonomy semantics.
  - GIVEN write autonomy sees edit/write/mutating shell proposals WHEN DecideRecord runs THEN allowed automatic decision evidence
