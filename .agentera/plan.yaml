- 'The plan follows DTC: task 1 documents intent, tasks 2-4 specify regressions, tasks 5-8 implement and validate.'
- The plan does not execute the human-only M57 dogfood milestone.
handoff:
  suggested: ⧉ realisera
  rationale: The plan is one focused implementation stream with ordered tests, code changes, and validation. Orkestrera is unnecessary
    unless the user wants multi-cycle coordination across multiple agents.
closeout_summary: Real TUI agent execution wiring is complete for supported OpenAI-compatible configs. Production startup no longer
  silently falls back to FakeBuildRunner, agent-mode prompt start no longer emits FakePromptEffect, fixed read/write tool definitions
  are registered with go-agent, provider setup failures surface as bounded diagnostics, runtime completion returns idle, and the
  PTY smoke timeout/backpressure issue no longer blocks mage check.
