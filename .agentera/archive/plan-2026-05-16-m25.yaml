scope:
  included:
  - Generic runtime proposal data for risky operations with operation kind, target, risk summary, preview content, default
    action, command/path/diff fields, and stable identity.
  - Runtime/TUI messages for approve, deny, and defer decisions that update deterministic state and record the selected action
    without executing mutation effects.
  - Approval-pending TUI fixture, render snapshots, and semantic snapshots showing exact path, command, diff preview, risk/default
    action, and choices.
  - Update/keybinding tests proving approval keys emit approve, deny, and defer messages only, plus PTY smoke for fake approval
    and denial proposals.
  - Roadmap and Agentera closeout after validation passes.
  excluded:
  - Final write permission classes, edit/write tool execution, mutation execution after approval, durable approval persistence,
    history/undo/replay, live provider calls, provider fallback, context compaction, source indexing, plugins, MCP servers,
    workflow DSLs, model marketplaces, hosted control planes, or Milestone 26+ behavior.
  deferred:
  - Write permission classes, mutation tool implementations, recheck-before-mutation execution, approval records in durable
    state, history/undo integration, and real provider-initiated write flows.
design: Add proposal visibility as inert runtime state first. The runtime owns typed pending proposal and decision messages;
  TUI renders that state and maps approval keys to messages. App/PTY fake proposals can inject the state for smoke coverage,
  but approval decisions complete as messages without producing tool, store, shell, git, or mutation effects.
tasks:
- number: 1
  name: Define generic approval proposal and decision state
  depends_on: []
  status: completed
  acceptance:
  - GIVEN a risky operation proposal is represented WHEN runtime tests inspect it THEN operation kind, target, risk summary,
    preview, default action, path, command, diff preview, and identity are explicit typed data.
  - GIVEN proposal data is copied into runtime state WHEN callers mutate their original values THEN pending proposal state
    remains deterministic and isolated.
  - GIVEN package boundaries are inspected WHEN proposal state exists THEN no final write permission classes or mutation executors
    are introduced.
  evidence:
  - internal/runtime/runtime.go defines generic ApprovalProposal, ApprovalAction, and ApprovalDecision state with operation
    kind, target, risk summary, preview, default action, path, command, working directory, expected effect, diff preview,
    identity, and provenance fields.
  - internal/runtime/runtime_test.go proves proposal state is deterministic, copied away from caller slices, and emits no
    effects.
- number: 2
  name: Emit approval decisions as deterministic messages only
  depends_on:
  - 1
  status: completed
  acceptance:
  - GIVEN an approval, denial, or defer decision is received for the pending proposal WHEN runtime update handles it THEN
    state records the decision and clears or marks the pending state without emitting mutation effects.
  - GIVEN a stale or mismatched decision is received WHEN runtime update handles it THEN no mutation effect is emitted and
    state remains safe and observable.
  - GIVEN approval decisions are tested repeatedly WHEN Update is called with the same input THEN model and effects are deterministic.
  evidence:
  - runtime.Update handles approve, deny, and defer decisions as typed messages only, records LastApprovalDecision, clears
    pending state for matching decisions, and emits no mutation effects.
  - internal/runtime/runtime_test.go proves approve/deny/defer decisions are effect-free and stale decisions leave the pending
    proposal safe and observable.
- number: 3
  name: Render approval-pending fixture and snapshots
  depends_on:
