  title: Milestone 25 Approval UI Without Mutation
what: Deliver ROADMAP.md Milestone 25 by making risky operation proposals visible and selectable in the TUI before write execution
  exists. The slice must define generic proposal display data, render approval/denial/defer choices, and emit typed decisions
  as messages without executing mutations.
why: M24 made read-only agent turns executable. Before Aila can add write permission classes or mutation tools, users need
  an unmistakable approval surface that preserves the presentation-only TUI boundary and keeps decisions observable without
  touching files.
constraints: 'Execute only Milestone 25. Preserve statechart-MVU: runtime updates remain deterministic, TUI emits messages
  only, and no approval key may execute filesystem, shell, git, network, state-store, or mutation IO. Represent proposals
  generically without depending on final write permission classes. Do not add edit/write tool execution, mutation history,
  undo/replay, durable approval persistence, final write permission class semantics, provider fallback, context compaction,
  source indexing, plugins, MCP servers, workflow DSLs, model marketplaces, hosted control plane behavior, or Milestone 26+
  scope. Do not push.'
