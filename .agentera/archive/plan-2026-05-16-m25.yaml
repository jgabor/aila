  - GIVEN semantic snapshots are generated WHEN tests inspect them THEN the pending proposal and available decisions are represented
    as agent-readable structured state.
  - GIVEN the fixture render is inspected WHEN tests search for mutation execution markers THEN no direct write, shell, git,
