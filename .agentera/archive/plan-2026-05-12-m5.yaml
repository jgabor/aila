    router scope is eligible for implementation.
  - >-
    GIVEN M5 is complete WHEN a user tests the TUI THEN /status, ctrl+x s, /help,
    /quit, and ctrl+x q have deterministic fake behavior through one closed route
    path without credentials or real agent execution.
  - >-
    GIVEN source docs are checked WHEN M5 closes THEN future command families,
    resize, CLI, config, provider, workflow, model, tool, permission, and
    persistence work remain deferred to later milestones.
surprises:
