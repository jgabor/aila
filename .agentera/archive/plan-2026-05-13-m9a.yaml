header:
  level: full
  created: 2026-05-13
  status: complete
  reviewed: 2026-05-13
  critic_issues: "8 found, addressed"
  title: M9A Provider Gateway And Credential Boundary

what: Add typed provider readiness and bounded model diagnostics before real turns.
why: M9A must explain provider, credential, and model failures safely before runtime execution.
constraints: >-
  No real turns, tools, workflow/session state, project .aila, config UI,
  plugins, MCP, dynamic/generic surfaces, pushes, or remotes. Never print/commit
  secrets. Fakes are default; approved DeepSeek smoke uses OPENAI_API_KEY and
  https://api.deepseek.com only when opt-in.
scope:
  included:
    - llm.base_url, model-ref parsing, provider families, redacted credentials, fake readiness, aila models, fake device-code effects, optional DeepSeek smoke, validation, closeout.
  excluded:
    - Real turns, tools, marketplaces, session/project persistence, and config UI.
design: Narrow app/agent readiness boundary; CLI reports typed state only.

tasks:
  - number: 1
    name: Extend config and model reference contract
    depends_on: []
    status: complete
    acceptance:
      - GIVEN llm.base_url/model refs WHEN config loads THEN base_url is optional/preserved, refs are typed, malformed refs error boundedly, and no secret/project state is touched.
  - number: 2
    name: Define provider readiness domain
    depends_on: ["1"]
    status: complete
    acceptance:
      - GIVEN API-key/custom/device-code providers WHEN fakes classify readiness THEN families, credential source names, metadata, unsupported-provider, and unavailable-model errors are deterministic before turns.
  - number: 3
    name: Add redacted credential lookup boundary
    depends_on: ["2"]
    status: complete
    acceptance:
      - GIVEN env/config credential sources and fake failures WHEN resolved THEN precedence is explicit, OPENAI_API_KEY/OPENCODE_API_KEY are supported, typed errors redact secrets.
  - number: 4
    name: Implement bounded fake-backed aila models
    depends_on: ["2", "3"]
    status: complete
    acceptance:
      - GIVEN aila models with filters/degraded fakes WHEN run THEN deterministic sorted bounded output/status/errors print without network, credentials, turns, or tools.
  - number: 5
    name: Add fake device-code effects
    depends_on: ["2", "3"]
    status: complete
    acceptance:
      - GIVEN fake clients/clocks WHEN device-code start/poll/retry/timeout/refresh/cancel runs THEN typed effect results are deterministic and default checks use no browser/network.
  - number: 6
    name: Add approved optional DeepSeek smoke
    depends_on: ["3", "4"]
    status: complete
    acceptance:
      - GIVEN explicit live-smoke flags and OPENAI_API_KEY from env/.env WHEN using https://api.deepseek.com THEN bounded custom/deepseek readiness runs without printing the key; mage check skips it.
  - number: 7
    name: Validate M9A boundaries
    depends_on: ["1", "2", "3", "4", "5", "6"]
    status: complete
    acceptance:
      - GIVEN targeted tests, approved smoke if enabled, go test ./..., git diff --check, mage check, and source inspection WHEN run THEN gates pass and no deferred behavior/secret leakage appears.
  - number: 8
    name: Synchronize final M9A state
    depends_on: ["7"]
    status: complete
    acceptance:
      - GIVEN validation passes WHEN closing M9A THEN ROADMAP marks M9A complete/M10 next, plan archives/removes, progress records, agentera plan empty, mage check passes, no push.
surprises: []
