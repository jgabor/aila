scope:
  included:
  - Add typed runtime subagent request, budget, evidence-link, result, run, status, spawn-effect, and lifecycle-message shapes.
  - Record supervised child work in runtime model state when spawn/progress/completion/failure/cancellation messages arrive,
    without changing workflow phase or building orchestration policy.
  - Ensure failed, canceled, completed, and active subagents remain observable with parent run, purpose, status, summary,
    and evidence links.
  - Map runtime subagent state into app/TUI view state without letting the TUI own dispatch, permissions, lifecycle changes,
    or workflow transitions.
  - Add a multi-agent active work fixture and semantic/render coverage for parent run, subagent purpose, status, evidence
    links, and visible focus or selection behavior where present.
  - Run targeted runtime/app/TUI tests, full Mage validation, Agentera validation, ROADMAP closeout, and one local commit
    for the milestone.
  excluded:
  - M56 orchestration policy, retry/evaluation loops, plan-status automation, provider-backed child execution, real parallel
    worker scheduling, new slash commands, direct source edits from subagents, direct workflow phase mutation, plugin/MCP
    behavior, dynamic tools, workflow DSLs, generic graph engines, hosted control planes, and push operations.
  deferred:
  - Orchestrate command routing, dispatch strategy, retry budgets, evaluation/audit loops, provider-run child agents, cancellation
    UI commands, multi-pane terminal management, and source incorporation decisions.
design: Keep M55 as a supervised visibility contract. internal/runtime defines SpawnSubagentEffect and typed lifecycle messages,
  records subagent runs in deterministic model state, and keeps active/terminal child records visible. internal/app converts
  runtime subagent records into view models and status/inspection lines. internal/tui renders injected subagent views in a
  multi-agent active work fixture and semantic snapshots. No orchestrate behavior, scheduling policy, provider child loops,
  file edits, permissions, or workflow transitions are added in this slice.
