header:
  level: full
  created: '2026-05-17'
  status: complete
  title: 'Milestone 55: Subagent Spawn And Completion'
  reviewed: '2026-05-17'
  critic_issues: M55 must add subagent supervision as explicit runtime effects and lifecycle messages, not as orchestration
    policy or a hidden actor system. Active child work must remain observable in runtime state and TUI snapshots through progress,
    completion, failure, and cancellation, with behavior-named tests.
  completed: '2026-05-17'
what: Deliver ROADMAP.md Milestone 55 by representing supervised parallel work with explicit subagent spawn effects and lifecycle
  messages, then surfacing that work in the TUI before orchestration is added.
why: Aila needs observable child work before M56 can add orchestration. This slice establishes the runtime and presentation
  contract so failed or canceled subagents cannot disappear and future orchestration can dispatch through a supervised boundary.
constraints: Execute only Milestone 55. Preserve statechart-MVU and explicit effect boundaries. Runtime owns typed subagent
  effects/messages and visibility state; the TUI renders injected subagent views only. Keep orchestration policy, retries,
  evaluation loops, actual provider-backed child execution, new commands, plugin/MCP behavior, dynamic tools, workflow DSLs,
  generic graph engines, hosted control planes, and pushes out of scope. Use behavior-based test names; do not introduce new
  TestM<number> symbols.
