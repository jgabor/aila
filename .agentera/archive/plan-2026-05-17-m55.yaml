- number: 2
  name: Add runtime subagent effect and lifecycle messages
  depends_on:
  - 1
  status: complete
  acceptance:
  - GIVEN a subagent spawn request is proposed WHEN runtime update handles it THEN a SpawnSubagentEffect is emitted with parent
    run, purpose, input, tool constraints, budget, and initial evidence metadata.
  - GIVEN subagent completion, failure, or cancellation is reported WHEN runtime update handles the message THEN the message
    is typed and records the terminal state without invoking orchestration policy.
  - GIVEN subagent runtime types are inspected WHEN the package builds THEN the new operation kind and structs do not broaden
    into plugins, dynamic tools, provider marketplaces, or workflow DSLs.
  evidence:
  - internal/runtime/runtime.go adds SubagentRequest, SubagentBudget, SubagentEvidenceLink, SubagentResult, SubagentRun, SubagentStatus,
    OperationSubagent, SubagentSpawnProposed, SpawnSubagentEffect, and typed SubagentProgressed/Completed/Failed/Canceled
    messages.
  - Runtime Update records spawn requests as visible running SubagentRun state and emits SpawnSubagentEffect with parent run,
    purpose, input, tools, budget, and evidence links without changing workflow phase or choosing orchestration policy.
  - Dispatch returns a deterministic SubagentProgressed message for fake spawn effects, while terminal lifecycle messages
    are inert runtime updates rather than orchestration commands.
- number: 3
  name: Preserve observable supervised subagent state
  depends_on:
  - 2
  status: complete
  acceptance:
  - GIVEN a subagent progresses WHEN runtime state is inspected THEN parent run, purpose, status, summary, and evidence links
    remain visible.
  - GIVEN a subagent completes, fails, or is canceled WHEN runtime state is inspected THEN the terminal record remains visible
    instead of disappearing.
  - GIVEN active subagents exist WHEN unrelated runtime messages are processed THEN no active subagent can become unobservable.
  evidence:
  - internal/runtime/runtime.go preserves Subagents across Update cloning, progress updates, terminal completion/failure/cancellation,
    unrelated queued prompts, diagnostics, and parent fake effect completion.
  - internal/runtime/runtime_test.go adds behavior-named coverage for spawn effects, lifecycle observability, terminal failure/cancellation
    visibility, parent-operation preservation, and the invariant that active subagents cannot become unobservable.
