scope:
  included:
  - Narrow safe bash request/result contracts with command argv, working directory metadata, expected effect, exit status, bounded stdout/stderr previews, truncation, duration metadata, and typed errors.
  - 'Command validation for the allowed inspection set: `pwd`, read-only `ls`, `git status`, and read-only `git diff` forms.'
  - Shell execution outside deterministic updates through context-aware tool/app effect handlers with deterministic result shaping, timeout/cancellation behavior, bounded output, and no mutation.
  - Runtime/app wiring for bash proposals, effects, completions, failures, active command state, and permission classification as safe read-only where appropriate.
  - TUI running, success, and failure command result presentation with exact command/status/error lines from injected state only.
  - Command result, command failure, and tool-failed fixtures with plain, ANSI, and semantic snapshots; PTY smoke only if M20 introduces a visible shell prefix or slash command.
  excluded:
  - Arbitrary shell, pipelines, redirection, command chaining, scripts, aliases, environment mutation, file mutation, network commands, process control, `git apply`, `git checkout`, `git commit`, `git reset`, `git clean`, package managers, or non-inspection commands.
  - Fetch, edit, write, mutation history, approval persistence, undo/redo, replay, context compaction, stale checks, source indexing, generic graph engines, provider fallback, plugins, MCP servers, workflow DSLs, marketplaces, hosted control planes, or Milestone 21+ behavior.
  deferred:
  - Fetch/network read boundary for Milestone 21.
  - Full permission/autonomy decision expansion for Milestone 22.
  - Mutation-capable shell commands, approval persistence, mutation history, undo/replay, and context/source indexing until later roadmap slices.
design: Add a small `internal/tools` bash inspection contract beside read/search rather than a generic shell framework. Validation parses command arguments into a typed, bounded, read-only operation record. Execution uses `exec.CommandContext` only after validation, with explicit workspace working directory handling, bounded stdout/stderr capture, timeout/cancellation handling, no shell string evaluation, and no hidden retries. Runtime owns typed proposals/effects/results without importing `internal/tools` or executing commands. App dispatch owns permission classification and guarded IO. TUI renders injected active/completed command state and semantic metadata without parsing, classifying, or executing commands.
