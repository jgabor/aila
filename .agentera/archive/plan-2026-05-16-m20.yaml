overall_acceptance:
- GIVEN allowed safe inspection commands are requested WHEN validation runs THEN only bounded `pwd`, `ls`, `git status`, and `git diff` forms are accepted with typed read-only operation metadata.
- GIVEN safe inspection commands execute WHEN tool effects run THEN Aila returns bounded exact command/status/output/failure results without shell evaluation, hidden retries, or workspace mutation.
- GIVEN bash inspection operations are proposed and completed WHEN app/runtime/TUI paths handle them THEN IO remains outside deterministic updates and the TUI consumes injected display/semantic state only.
- GIVEN unsafe or mutation-shaped command requests occur WHEN validation or dispatch handles them THEN typed bounded failures are surfaced without opening arbitrary shell, mutation approval, or Milestone 21+ behavior.
- GIVEN milestone validation runs WHEN documented gates complete THEN safe bash contract tests, executor tests, permission/app/runtime tests, render and semantic snapshots, optional PTY smoke decision, targeted tests, full `go test ./internal/...`, and `mage check` support closeout.
surprises:
- M20 should not add a general shell. Keep command parsing argv-based and allowlist-shaped, and keep full autonomy expansion deferred to Milestone 22 while still describing read-only operation metadata now.
