  title: Milestone 20 Safe Bash Inspection
what: Deliver ROADMAP.md:879-901 Milestone 20 by adding a narrowly classified read-only `bash` inspection tool. Aila must run only explicitly safe inspection commands such as `pwd`, `ls`, `git status`, and `git diff` through app-owned effects, preserve command/status/error/output lines, bound output, and avoid opening mutation, approval-persistence, provider, fetch, edit/write, history, undo/replay, plugin, MCP, or Milestone 21+ behavior.
why: M18 and M19 established read-only local inspection through typed tool effects. M20 extends that surface to a deliberately small shell-inspection lane so the agent can observe workspace and git state without relying on arbitrary shell execution or silent mutations.
constraints: 'Execute only Milestone 20. Preserve statechart-MVU: deterministic updates may propose and receive typed results, but command execution must remain in guarded app/tool effects. Keep TUI presentation-only and driven by injected command state. Permit only exact safe inspection command families with typed operation metadata; reject mutation-shaped, shell-composed, environment-changing, network, process-control, redirection, pipeline, wildcard, script, alias, and arbitrary executable requests. Final autonomy decisions remain owned by internal/permission in Milestone 22, but M20 must describe safe operation metadata and classify read-only safe inspection consistently with existing read/search behavior. Do not add fetch, edit/write, mutation history, approval persistence, undo/replay, context compaction, stale checks, source indexing, generic shell runner, plugin, MCP, workflow DSL, marketplace, provider fallback, or Milestone 21+ behavior. Do not push.'
