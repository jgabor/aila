  title: 'Milestone 41: Utility Worker Skeleton'
what: Deliver ROADMAP.md Milestone 41 by adding a safe runtime/app slot for idle-only utility jobs, fake utility job execution,
  visible utility status/suggestion output, semantic evidence references, and tests proving utility work cannot mutate files,
  git state, project artifacts, permissions, workflow phase, or final judgment.
why: M40 added foreground manual compaction. M41 creates the safe utility-worker skeleton needed before real background compaction,
  stale-context checks, source ranking, or summary refresh work can be introduced later.
constraints: 'Execute only Milestone 41. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may render app-injected utility state and semantic evidence, but it must not schedule utility work, inspect files, mutate
  state, call providers, persist project artifacts, change permissions, or change workflow phase. Utility jobs must be idle-only,
  fake/deterministic, and read-only. They may report status, suggestions, caveats, and evidence refs, but must not write files,
  mutate git state, write project artifacts, approve permissions, transition workflow phase, make final judgments, run real
  compaction, run stale-context checks, rank/index sources, refresh summaries, call providers/models, add plugins, add MCP,
  add workflow DSLs, add generic graph engines, add hosted control-plane assumptions, or add M42+ behavior. Use behavior-based
  test names; do not introduce new TestM<number> symbols. Do not push.'
