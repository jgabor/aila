scope:
  included:
  - Add internal/utility worker state, fake job definitions, scheduling decisions, result/suggestion/evidence types, and guard
    tests.
  - Add runtime/app-owned utility scheduling/result slot that runs deterministic fake jobs only when the primary runtime is
    idle.
  - Expose utility idle/running/result/suggestion status through app-injected TUI state and existing /status evidence.
  - Add utility fixtures with plain, ANSI, and semantic snapshots showing utility model state, idle/running status, suggestions,
    and evidence refs.
  - Add tests proving utility jobs cannot mutate files, git state, project artifacts, permissions, workflow phase, or final
    judgment.
  - Run PTY smoke for utility visibility through /status because utility status is visible interactively.
  excluded:
  - Real background compaction, stale-context checks, source ranking/indexing, provider/model calls, summary refresh, hidden
    long-running jobs, file writes, git mutations, project artifact writes, permission approval, workflow phase mutation,
    final judgment, plugins, MCP, workflow DSLs, generic graph engines, hosted control planes, and M42+ behavior.
  deferred:
  - Real utility context prep, stale context detection, continuous compaction, summary refresh, source ranking/indexing, provider-assisted
    utility work, and durable utility persistence policy.
design: Add a small internal/utility package that owns fake job specs, eligibility decisions, immutable result/suggestion/evidence
  records, and denial reasons. Runtime/app code owns the explicit start/result slot and only schedules when runtime state
  is idle and no approval/tool/agent work is active. The app maps utility state to TUI view data and /status lines. The TUI
  only renders injected utility state and semantic evidence; it never schedules jobs or mutates anything.
overall_acceptance:
- Utility scheduler tests prove fake jobs run only when idle and are denied while runtime/tool/approval/queued work is active.
- Runtime/app tests prove utility start/result handling is an explicit state slot around the workflow, never a workflow phase,
  and never emits mutation, permission, git, artifact, or final-judgment effects.
- Utility package tests prove fake job results are read-only status/suggestion/evidence records with no mutation operation
  fields.
- TUI render and semantic snapshots show utility idle/running/result state, utility model identity, fake suggestion/status
  output, and evidence references while keeping TUI presentation-only.
- PTY smoke proves utility status is visible through the existing /status command, or documents a precise skip if no interactive
  visibility changed.
- No real compaction, stale-context check, source ranking/indexing, provider/model call, summary refresh, plugin, MCP, workflow
  DSL, generic graph engine, hosted control plane, or M42+ behavior is added.
- Targeted, package, full Mage, Agentera, diff, home-path, and TestM<number> hygiene validation pass before ROADMAP.md is
  updated.
surprises:
- The first /status PTY check showed utility status was visible in the runtime panel while lower status-surface utility lines
  could be below the viewport, so the smoke now asserts visible panel markers.
- The status utility panel initially persisted into /review and pushed review evidence off-screen; command routing now clears
  stale utility display state when leaving /status.
