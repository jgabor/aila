scope:
  included:
  - Make the ordinary interactive prompt path start the bounded fake read-only agent BUILD loop by default, using the existing
    Aila-owned agent runner adapter and read-only tool registry.
  - Preserve app/runtime-owned visible state for active assistant output, read-only tool activity, final summaries, typed
    provider failures, queued input, and interrupts.
  - Refresh behavior-named app/runtime/TUI tests so prompt submission, active queueing, interrupt routing, and focus behavior
    are covered without stale milestone-numbered names in touched tests.
  - Refresh the required build-active, queued-message, tool-running, and tool-failed fixture evidence so the current read-only
    loop is visible in render and semantic snapshots.
  - Add or update PTY smoke to prove interactive read-only prompt submission, queue, interrupt, resize, and quit behavior
    without mutation or approval surfaces.
  excluded:
  - Interactive edit/write tools, approval execution, mutation history changes, real provider credential setup, arbitrary
    shell mutation, source indexing, session replay, plugin/MCP/dynamic workflow behavior, hosted control planes, and M34+
    behavior.
  deferred:
  - Interactive write build loop, guarded approvals plus mutation execution, richer asynchronous streaming mechanics, real
    provider selection from configuration, durable event replay, source indexing, and stale-context validation.
design: Use the existing read-only agent runner and runtime/tool surfaces instead of adding a new loop. The app
  composition root should choose the read-only agent runner for normal interactive prompts, while test-only environment switches
  remain available for provider-failure and hold-active queue/interrupt smokes. Runtime Update remains deterministic and effect-based;
  read tool requests still execute only through app-owned readDispatchContext and permission decisions. The TUI receives TranscriptTurn/ViewState
  data and renders it with no provider, filesystem, permission, or mutation ownership.
overall_acceptance:
- A normal interactive prompt can produce a bounded read-only fake agent answer and README read-tool evidence without requiring
  a test-only read-only flag.
- Read-only tool requests continue to pass through runtime read effects, app-owned permission decisions, and tool result view
  models; unsupported mutation/approval surfaces do not appear in the read-only loop.
- Queued input, interrupt, focus, and resize behavior remain visible and presentation-only while work is active.
- The required build-active, queued-message, tool-running, and tool-failed fixtures have current render and semantic evidence
  for the read-only loop.
- PTY smoke proves submit prompt, queue, interrupt, resize, and quit behavior with fake or read-only work, and full validation
  passes before ROADMAP.md is updated.
surprises:
- The live read-only agent turn needed to use the existing agent evidence surface so chat, final summary, and read-tool details
  stay visible together instead of letting tool details push the conversation below the fold.
- Bounded provider event sanitization collapsed trailing delta whitespace, so runtime now inserts a space between adjacent
  assistant deltas when needed.
