  title: Milestone 33 Interactive Read-Only Build Loop
what: Deliver ROADMAP.md Milestone 33 by making ordinary interactive prompts enter the read-only BUILD loop through the existing
  Aila-owned agent runner, read-only tool effects, runtime state, and presentation-only TUI surfaces.
why: Earlier read-only runner work proved a bounded agent turn behind an explicit environment gate, and M31-M32 made run results inspectable.
  M33 turns the interactive path into useful read-only coding assistance while preserving the same queue, interrupt, tool,
  and final-summary evidence before interactive writes arrive in M34.
constraints: 'Execute only Milestone 33. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may render app-injected prompt, runtime, read-tool, queued, interrupt, diagnostic, and final-summary state, but it must
  not inspect files, run commands, choose tools, decide permissions, mutate files, persist state, or own model prompts. Interactive
  work must stay read-only and route tool requests through the existing runtime read effects and autonomy policy. Keep mutations,
  approval execution, edit/write tools, real provider credential setup, arbitrary shell mutation, session replay, source indexing,
  hosted control planes, plugins, MCP servers, workflow DSLs, and M34+ behavior out of scope. Use behavior-based test names.
  Do not push.'
