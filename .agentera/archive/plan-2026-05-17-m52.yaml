  created: '2026-05-17'
  status: complete
  reviewed: '2026-05-17'
  critic_issues: M52 must add optimize as a BUILD-owned metric capability, not as a new execution framework or orchestration
    layer. It needs locked metric and harness evidence, one exit payload, normal runtime/tool/permission boundary descriptors,
    visible TUI objective/experiment/metric/caveat evidence, and behavior-named tests.
  title: 'Milestone 52: Optimize Capability'
what: Deliver ROADMAP.md Milestone 52 by implementing the optimize capability so Aila can represent metric-driven optimization
  work inside BUILD with a locked harness, measured baseline/result evidence, caveats, and a valid follow-up route.
why: Build can execute a bounded step, but metric work needs a first-class capability that makes the objective, locked measurement
  harness, result evidence, and next action explicit without introducing a separate optimization framework.
constraints: Execute only Milestone 52. Preserve statechart-MVU and explicit effect boundaries. Optimize is BUILD-owned and
  must stay inside normal capability, runtime effect, tool, permission, and state-store paths. Emit exactly one exit payload.
  Do not add orchestration, provider-backed benchmark execution, plugins, MCP, dynamic tools, workflow DSLs, generic graph
  engines, hosted control planes, document/design/M53+ behavior, or pushes. Use behavior-based test names; do not introduce
  new TestM<number> symbols.
