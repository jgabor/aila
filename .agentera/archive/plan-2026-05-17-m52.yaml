scope:
  included:
  - Add deterministic optimize capability metadata and typed output for objective, experiment status, locked harness, metric
    baseline/result/unit/direction, improvement, evidence, caveats, next action, and one exit payload.
  - Mark optimize as BUILD-owned in runnable built-in capability dispatch and prove valid exit routing through the FSM successor
    validator.
  - Wire exact /optimize command routing through policy, runtime CapabilityProposed/CapabilityEffect/CapabilityCompleted,
    and app-owned deterministic measurement evidence.
  - Keep optimize execution inside existing boundaries by describing tool execution, permission check, state access, artifact
    access, and state-store write requests without creating a benchmark runner, graph engine, or framework.
  - Expose optimize display state in the TUI with objective, experiment status, metric name, baseline/result, evidence, caveats,
    locked harness, next action, artifact refs, source refs, display-only state, and transition_claimed=false.
  - Add/update objective, experiment status, metric result, caveat fixtures plus behavior-named capability/runtime/app/policy/TUI/PTY
    coverage because /optimize changes the interactive surface.
  excluded:
  - Provider-backed benchmark execution, real optimization loops, orchestration, automatic source changes, document/design
    capabilities, plugins, MCP, dynamic tools, workflow DSLs, generic graph engines, hosted control planes, M53+ behavior,
    and push operations.
  deferred:
  - Repeated optimization trials, provider-backed experiment analysis, metric dashboards, experiment history browsing, global
    objective stores, and orchestration-owned retry budgets.
design: Keep optimize deterministic and host-owned. internal/capability defines OptimizeCapability and OptimizeOutput over
  app-supplied objective, harness, metric, and result evidence; it emits waiting when objective, harness, or metric evidence
  is missing and complete or flagged when measured evidence exists. internal/runtime reuses CapabilityProposed, CapabilityEffect,
  and CapabilityCompleted. internal/app invokes optimize from the exact /optimize command, uses app-supplied measurement evidence,
  optionally persists objective/experiment summaries through state.Store, maps the payload into tui.OptimizeView, and records
  runtime/session evidence. internal/tui renders injected OptimizeView only; it never runs benchmarks, mutates files, fetches
  provider data, owns permission decisions, or changes workflow phase.
overall_acceptance:
- Capability tests prove optimize emits exactly one payload with deterministic objective, experiment status, locked harness,
  metric baseline/result, evidence, caveats or needed input, artifact/source refs, boundary descriptors, and valid BUILD-owned
  successor behavior.
- Registry/policy/workflow checks prove optimize is BUILD-owned and cannot run as a cross-cutting shortcut or bypass FSM successor
  validation.
- State/app tests prove /optimize routes through typed capability effects and any durable objective/experiment artifacts use
  state.Store as OwnerApp without direct writes or a separate execution framework.
- TUI render and semantic snapshots show objective, experiment status, metric name, baseline/result, evidence, caveats, locked
  harness, next action, display_only=true, and transition_claimed=false.
- PTY smoke proves the interactive /optimize surface shows measured optimization evidence and does not mutate unrelated files
  or git state.
- Targeted, package, full Mage, Agentera, diff, home-path, and added func TestM<number> hygiene validation pass before ROADMAP.md
  is updated.
surprises:
- apply_patch remains unavailable in this environment because the artifact validator hook path is missing, so narrow scripted
  edits are used and verified with formatter, tests, diff checks, and Agentera validation.
