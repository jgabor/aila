    GIVEN this plan is active WHEN work begins THEN only M7 CLI command shape
    stubs are eligible for implementation.
  - >-
    GIVEN M7 is complete WHEN a user invokes the documented command names or
    global flags THEN Aila accepts the shape with bounded deterministic output
    while no-argument execution still opens the TUI.
  - >-
    GIVEN source docs are checked WHEN M7 closes THEN config, provider, model,
    workflow, tool, permission, persistence, and real command behavior remain
    deferred to later milestones.
