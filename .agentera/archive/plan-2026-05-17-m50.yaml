scope:
  included:
  - Add deterministic vision capability request metadata and typed vision output for north star, principles, long-term
    goals, blockers, needed input, artifact refs, source refs, and one exit payload.
  - Validate vision successor recommendations through the existing workflow FSM so ENVISION can route only to valid
    successors and never direct-mutates phase.
  - Extend the state artifact catalog and app wiring so completed vision output is persisted through the state store
    as an app-owned logical vision artifact.
  - Expose vision display state in the TUI with phase, active capability, needed input, blockers, artifact status/path,
    source refs, successor validation, display-only state, and transition_claimed=false.
  - Add or update vision output and waiting-for-input fixtures plus behavior-named capability/runtime/state/app/policy/TUI/PTY
    coverage when interactive /vision behavior is added.
  excluded:
  - Consequential decision discussion, research, optimization, profile, design, orchestration, provider-backed strategy
    generation, automatic plan/build execution, broad capability parity, direct workflow phase mutation, plugins,
    MCP, workflow DSLs, generic graph engines, hosted control planes, M50A+ behavior, and push operations.
  deferred:
  - Discuss/resonera decision capture, research/inspirera source gathering, optimization objectives, provider-backed
    vision synthesis, multi-cycle vision-to-plan orchestration, richer vision imports from Agentera artifacts, and
    full capability command alias activation.
design: Keep vision deterministic and host-owned. internal/capability defines VisionCapability and VisionOutput
  over app-supplied goal/project evidence; it emits waiting when direction input is absent and complete or flagged
  when it can shape a vision document. internal/runtime reuses CapabilityProposed, CapabilityEffect, and CapabilityCompleted.
  internal/state adds a logical vision artifact owned by the app. internal/app invokes vision from the exact /vision
  surface, persists the produced document through state.Store, maps the payload into tui.VisionView, and records
  runtime/session evidence. internal/tui renders injected VisionView state and semantic JSON only; it never reads
  files, writes artifacts, judges transitions, or changes workflow phase.
overall_acceptance:
- Capability tests prove vision emits exactly one payload with deterministic north star, principles, goals, blockers
  or needed input, artifact/source refs, boundary descriptors, and valid ENVISION successor recommendations without
  direct phase mutation.
- State/app tests prove vision artifacts are resolved and written through state.Store as OwnerApp, and that /vision
  routes through typed capability effects without provider calls, tool execution, direct filesystem writes outside
  the store, or workflow phase mutation.
- Policy/workflow checks prove /vision command routing is closed and any vision follow-up recommendation accepts
  only valid ENVISION successors through the existing FSM validation path.
- TUI render and semantic snapshots show phase, active capability, needed input, blockers, vision artifact path/status,
  source refs, successor validation, display_only=true, and transition_claimed=false in vision output and waiting-for-input
  fixtures where visible.
- PTY smoke proves the selected interactive /vision behavior shows vision evidence and, for complete output, persists
  the vision artifact in an isolated temp workspace without mutating unrelated files or git state.
- Targeted, package, full Mage, Agentera, diff, home-path, and added func TestM<number> hygiene validation pass
  before ROADMAP.md is updated.
