  title: 'Milestone 50: Vision Capability'
what: Deliver ROADMAP.md Milestone 50 by implementing the vision capability so Aila can shape project direction
  and long-term goals, persist the resulting vision artifact, and surface waiting or complete vision evidence without
  bypassing workflow authority.
why: M49 can audit current work and route back through valid workflow successors. M50 adds the earlier goal-shaping
  capability needed before broader deliberation or research work, while preserving Aila-owned state, runtime, and
  TUI boundaries.
constraints: Execute only Milestone 50. Preserve statechart-MVU and explicit effect boundaries. Vision may recommend
  only FSM-valid ENVISION successors such as PLAN, DELIBERATE, or BUILD; it must not directly mutate workflow phase.
  Persist vision artifacts through the state.Store logical artifact path, not hardcoded filesystem writes outside
  the store. Keep consequential decision discussion, research, optimization, profile, design, orchestration, provider-backed
  strategy work, plugins, MCP, workflow DSLs, generic graph engines, hosted control planes, M50A+ behavior, and
  pushes out of scope. Use behavior-based test names; do not introduce new TestM<number> symbols.
