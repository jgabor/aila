scope:
  included:
  - Add deterministic document capability metadata and typed output for documentation plan, changed docs, doc diff, source
    refs, caveats, next action, boundary descriptors, artifact refs, and one exit payload.
  - Mark document as BUILD-owned in runnable built-in capability dispatch and prove valid exit routing through the FSM successor
    validator without direct phase mutation.
  - Wire exact /document command routing through policy, runtime CapabilityProposed/CapabilityEffect/CapabilityCompleted,
    app-owned documentation evidence, mutation-tool execution, permission policy, state-store artifact access, and history
    recording.
  - Persist any durable documentation artifact through state.Store or artifact resolver ownership rather than direct bypass
    paths.
  - Expose document display state in the TUI with documentation plan/output, doc diff, caveats, changed docs, source refs,
    next action, artifact refs, display-only state, and transition_claimed=false.
  - Add or update documentation plan/output, doc diff, and caveat fixtures plus behavior-named capability/runtime/state/app/policy/TUI/PTY
    coverage because /document changes the interactive surface.
  excluded:
  - Design/M54 behavior, orchestration, provider-backed documentation generation, automatic broad doc rewrites, direct workflow
    phase mutation, bypass writes, plugins, MCP, dynamic tools, workflow DSLs, generic graph engines, hosted control planes,
    and push operations.
  deferred:
  - Provider-written documentation prose, multi-file doc audits, docs freshness scoring, automated README architecture migrations,
    design capability behavior, and orchestration-owned documentation campaigns.
design: Keep document deterministic and host-owned. internal/capability defines DocumentCapability and DocumentOutput over
  app-supplied documentation alignment evidence; it emits waiting when no target or source behavior is available and complete
  when a bounded doc plan, diff, caveats, and next action are available. internal/runtime reuses CapabilityProposed, CapabilityEffect,
  and CapabilityCompleted. internal/state adds a logical documentation artifact owned by the app. internal/app invokes document
  from the exact /document command, writes the selected documentation file through the existing mutation tool and permission
  path, persists summary artifacts through state.Store, records history/session evidence, and maps the payload into tui.DocumentView.
  internal/tui renders injected DocumentView only; it never reads docs, writes files, owns permission decisions, or changes
  workflow phase.
overall_acceptance:
- Capability tests prove document emits exactly one payload with deterministic documentation plan/output, changed docs, doc
  diff, caveats or needed input, source refs, artifact refs, boundary descriptors, and valid BUILD-owned successor behavior.
- Registry/policy/workflow checks prove document is BUILD-owned, exact-routed by /document, and cannot bypass FSM successor
  validation.
- State/app tests prove /document routes through typed capability effects, mutation tool execution, permission decisions,
  history recording, and state.Store/artifact resolver access without direct bypass writes.
- TUI render and semantic snapshots show documentation plan/output, doc diff, caveats, changed docs, source refs, next action,
  display_only=true, and transition_claimed=false.
- PTY smoke proves the interactive /document surface writes documentation through the normal mutation path in an isolated
  workspace while leaving unrelated tracked files unchanged.
- Targeted, package, full Mage, Agentera, diff, home-path, and added func TestM<number> hygiene validation pass before ROADMAP.md
  is updated.
surprises:
- apply_patch remains unavailable in this environment because the artifact validator hook path is missing, so narrow scripted
  edits are used and verified with formatter, tests, diff checks, and Agentera validation.
