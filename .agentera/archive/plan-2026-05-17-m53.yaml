header:
  level: full
  created: '2026-05-17'
  status: complete
  title: 'Milestone 53: Document Capability'
  reviewed: '2026-05-17'
  critic_issues: M53 must add document as a BUILD-owned documentation alignment capability, not as provider-backed doc generation
    or a bypass write path. It needs one exit payload, normal mutation tool, permission, state-store, and history evidence,
    visible TUI plan/diff/caveat evidence, and behavior-named tests.
what: Deliver ROADMAP.md Milestone 53 by implementing the document capability so Aila can keep documentation aligned with
  actual project behavior from inside BUILD while routing documentation writes through the same runtime, tool, permission,
  state, and history paths used by other mutations.
why: Build can already execute a bounded change and optimize can expose measurement evidence. Aila now needs a first-class
  documentation alignment path that can plan doc changes, show diffs and caveats, and persist documentation through mutation
  safety instead of inventing a side channel.
constraints: Execute only Milestone 53. Preserve statechart-MVU and explicit effect boundaries. Document is BUILD-owned and
  must emit exactly one exit payload. Documentation writes must route through normal tool, permission, state, and history
  paths; docs artifacts must use the state store or artifact resolver. Do not add design/M54 behavior, orchestration loops,
  provider-backed documentation generation, plugins, MCP, dynamic tools, workflow DSLs, generic graph engines, hosted control
  planes, or pushes. Use behavior-based test names; do not introduce new TestM<number> symbols.
