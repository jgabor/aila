scope:
  included:
  - Add a deterministic non-interactive write intent for `aila run <prompt>` that creates or updates one bounded workspace-relative
    note file only when the prompt asks for a write-shaped task.
  - Load configured autonomy for non-interactive runs and route the write through the existing runtime write effect, permission
    decision, write validation/execution, immediate recheck, and mutation result structures.
  - Extend CLI output and stored run memory with changed files, mutation/decision evidence, blockers, caveats, source refs,
    stored-session status, and stored-history status.
  - Persist mutation history and undo metadata through the existing fake history contract so `/history` can inspect the non-interactive
    write result later.
  - Extend TUI run-memory rendering/semantic snapshots and PTY smoke so `aila continue`, `/history`, and `/diff` can inspect
    the stored non-interactive mutation state.
  excluded:
  - Provider-backed code generation, arbitrary prompt interpretation, stdin diff review, interactive approval prompts inside
    non-interactive mode, edit/overwrite restoration beyond existing undo metadata, shell mutation, source indexing, plugins,
    MCP servers, workflow DSLs, model marketplaces, hosted control planes, and Milestone 33+ behavior.
  deferred:
  - Provider-backed non-interactive reasoning, richer task planning from arbitrary prompts, piped diff review, multi-file
    write runs, interactive non-interactive approval handoff, source indexing, and stale-context validation.
design: 'Keep CLI parsing in cmd/aila and route `run` to the app-owned non-interactive runner. The runner remains deterministic:
  read-only inspection still runs first, then a write-shaped prompt proposes one bounded write request to the existing inputRunner/runtime
  write effect under the configured autonomy level. Autonomy write/yolo may proceed automatically through the same dispatchWriteEffect
  -> tools.ValidateWriteRequest -> tools.ExecuteWrite path; autonomy off/read records a denied mutation and a blocker without
  mutating. The run report, current-session snapshot, and fake history then expose changed files, mutation decision evidence,
  blockers, caveats, and source refs. The TUI consumes only injected snapshot/history/diff state.'
overall_acceptance:
- '`aila run <write-shaped prompt>` can create one bounded workspace-relative file through the existing write tool path and
  prints changed files, checks run, blockers, caveats, and stored-state indicators.'
- Autonomy read/off blocks the non-interactive write without mutation and reports the approval-required decision; autonomy
  write/yolo records an automatic allowed decision before mutation.
- Mutation history includes the non-interactive write result and undo metadata through the same fake history schema used by
  interactive writes.
- Current-session run memory and semantic snapshots expose non-interactive mutation state, changed files, mutation/decision
  evidence, blockers, caveats, and source refs through display-only TUI state.
- PTY smoke proves a temp-workspace write run creates a bounded file, then `aila continue`, `/history`, and `/diff` can inspect
  the stored mutation state.
surprises:
- The existing diff view only covered tracked staged/unstaged changes, so M32 added bounded untracked-file diff synthesis
  through app-owned safe bash/read boundaries to make the created run output inspectable without TUI IO.
