  title: Milestone 32 Non-Interactive Write Run
what: Deliver ROADMAP.md Milestone 32 by letting `aila run <prompt>` complete one bounded deterministic workspace write through
  the same runtime write effect, permission, tools, state, history, and TUI inspection paths used by interactive mutation
  flows.
why: M31 made non-interactive runs useful for safe repo inspection. M32 adds the first guarded mutation path so CLI runs can
  create a small inspectable change without inventing a separate safety model.
constraints: 'Execute only Milestone 32. Preserve statechart-MVU and explicit effect boundaries. Keep TUI presentation-only:
  it may render stored app-injected write-run memory, history, approvals/decisions, blockers, and diff state, but it must
  not inspect files, run commands, decide permissions, mutate files, or persist state. Non-interactive write behavior must
  route through existing runtime write effects, permission/autonomy decisions, tools.ValidateWriteRequest/ExecuteWrite, fake
  history mutation records, and current-session snapshot storage. Keep provider-backed reasoning, arbitrary prompt-to-code
  synthesis, stdin diff review, interactive approval prompts, file edits beyond the single bounded write target, shell mutation,
  richer source indexing, hosted control planes, and Milestone 33+ behavior out of scope. Use behavior-based test names. Do
  not push.'
