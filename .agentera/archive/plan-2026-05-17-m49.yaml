header:
  level: full
  created: '2026-05-17'
  status: complete
  reviewed: '2026-05-17'
  critic_issues: M49 must add audit feedback without broadening the capability surface. It should reuse /review for interactive
    display, emit one audit exit payload with findings, source refs, severity, and next actions, validate successors through
    the workflow FSM, keep optimization/design/profile/orchestration out of scope, and use behavior-based test names rather
    than TestM<number> names.
  title: 'Milestone 49: Audit Capability'
what: Deliver ROADMAP.md Milestone 49 by implementing the audit capability so Aila can check current work, surface findings
  with severity and source refs, show next action choices, and route follow-up only through valid workflow successors.
why: M48 can execute one bounded build step and recommends audit as the next quality gate. M49 should make that quality gate
  observable and deterministic without introducing provider-backed review, optimization, design, profile, orchestration, or
  a broader command surface.
constraints: 'Execute only Milestone 49. Preserve statechart-MVU and explicit effect boundaries. Audit may recommend BUILD,
  PLAN, DELIBERATE, or ENVISION only when the FSM validates that successor from AUDIT; it must not directly mutate workflow
  phase. Keep audit read-only and app-supplied: capability code emits findings from supplied evidence and boundary descriptors,
  while app/runtime own inspection, state, and display wiring. Use existing /review for interactive audit display unless a
  narrower existing seam proves safer; do not add broad capability slash parity. Keep optimization, design, profile, orchestration,
  provider-backed code review, file/git mutations, plugins, MCP, workflow DSLs, generic graph engines, hosted control planes,
  M50+ behavior, and pushes out of scope. Use behavior-based test names; do not introduce new TestM<number> symbols.'
