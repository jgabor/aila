scope:
  included:
  - Add deterministic audit capability request metadata and typed audit output for findings, severity, source refs, next action
    choices, caveats, and one exit payload.
  - Validate audit successor recommendations through the existing workflow FSM so AUDIT can route only to BUILD, PLAN, DELIBERATE,
    or ENVISION, and never direct-mutates phase.
  - Wire the existing /review command to surface audit evidence from app-owned diff/history/diagnostic inspection without
    provider calls or workspace mutation.
  - Expose audit display state in the TUI with severity, sources, findings, next actions, successor validation, display-only
    state, and transition_claimed=false.
  - Add or update the required audit-findings fixture plus affected review-command snapshots and behavior-named capability/runtime/app/TUI/PTY
    coverage.
  excluded:
  - Optimization, design, profile, orchestration, provider-backed review, autonomous fix loops, broad capability slash/keybinding
    parity, direct workflow phase mutation, file/git/project mutations from audit, plugins, MCP, workflow DSLs, generic graph
    engines, hosted control planes, M50+ behavior, and push operations.
  deferred:
  - Provider/model-backed audits, dependency scanner integration, automatic fix execution from audit findings, richer audit
    artifact persistence, multi-cycle audit/build orchestration, and full capability command alias activation.
design: Keep audit as a deterministic read-only quality gate. internal/capability defines AuditCapability and AuditOutput
  over app-supplied evidence, with findings carrying ID, severity, title/message, source refs, and recommended next action.
  internal/runtime reuses CapabilityProposed, CapabilityEffect, and CapabilityCompleted. internal/app reuses the current /review
  inspection surface to collect diff/history/diagnostic evidence, proposes the audit capability, maps the payload into tui.AuditView,
  and applies it to the transcript. internal/tui renders injected AuditView state and semantic JSON only; it never reads files,
  judges workflow transitions, mutates files, approves operations, or runs providers.
overall_acceptance:
- Capability tests prove audit emits exactly one payload with deterministic findings, severity, source refs, next action choices,
  concerns, boundary descriptors, and valid successor recommendations without direct phase mutation.
- Runtime/app tests prove audit proposals route through typed capability effects and /review displays audit evidence from
  read-only app-owned inspection while preserving existing review/diff/history behavior.
- Policy/workflow checks prove audit follow-up recommendations accept only valid AUDIT successors and reject invalid routes
  through the existing FSM validation path.
- TUI render and semantic snapshots show severity, source refs, findings, next action choices, successor validation, display_only=true,
  and transition_claimed=false in the required audit-findings fixture and affected review display fixtures.
- PTY smoke proves /review or the selected interactive audit display shows audit findings in an isolated workspace without
  provider calls or workspace mutation.
- Targeted, package, full Mage, Agentera, diff, home-path, and added func TestM<number> hygiene validation pass before ROADMAP.md
  is updated.
surprises:
- The patch hook failed because /hooks/validate_artifact.py is missing, so narrow scripted edits were used after apply_patch
  failed.
- Quiet mage wrapper sessions sometimes stopped reporting output; the final mage check was rerun with an explicit exit print
  and returned exit=0.
