  critic_issues: M51 must make research cross-cutting context evidence, not a new workflow authority. It should emit one typed
    payload, fold results into visible context without direct phase mutation, keep profile, optimization, and build execution
    out of scope, keep the TUI presentation-only, and use behavior-based test names rather than TestM<number> names.
  title: 'Milestone 51: Research Capability'
what: Deliver ROADMAP.md Milestone 51 by implementing the research capability so Aila can adapt external patterns, concepts,
  and solution evidence into context without triggering workflow transitions.
why: M50A separated deliberation and durable decision capture. M51 adds the cross-cutting research path so current work can
  be informed by external-pattern evidence while the workflow FSM remains the only lifecycle authority.
constraints: Execute only Milestone 51. Preserve statechart-MVU and explicit effect boundaries. Research is cross-cutting,
  display-only, and context-folding; it must not recommend or mutate workflow phases. Keep profile, optimization, build execution,
  orchestration, provider-backed live web/library fetching, plugins, MCP, workflow DSLs, generic graph engines, hosted control
  planes, M51A+ behavior, and pushes out of scope. Use behavior-based test names; do not introduce new TestM<number> symbols.
