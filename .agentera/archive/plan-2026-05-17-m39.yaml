scope:
  included:
  - Add an `internal/context` source reference model plus pure context builder for prompts, tool results, diffs, command output,
    and user constraints.
  - Add context budget/meter data, source-backed claims, exact critical detail preservation, and deterministic summaries without
    provider calls.
  - '`!!command` runs through the existing bash validation, permission, effect dispatch, visible result, command/history recording,
    and current snapshot path before building summarized shell context.'
  - Expose app-injected context state in the TUI with source refs supporting rendered claims and summarized shell output when
    visible.
  - Add context builder tests proving source refs survive assembly and exact command/failure details remain available.
  - Add/update render, ANSI, and semantic fixtures for context meter, source-backed claims, and summarized shell output; run
    PTY smoke only for visible terminal behavior changed by `!!`.
  excluded:
  - /compact, ctrl+x k, compaction effects, background continuous compaction, utility context-prep jobs, stale-context checks,
    summary refresh jobs, provider summarization/model reasoning over shell output, source indexing, generic registries, plugins,
    MCP, workflow DSLs, hosted control planes, config writes, and M40+ behavior.
  deferred:
  - Manual `/compact`, compaction persistence, background context prep, stale-context detection, source indexing/ranking,
    provider-assisted summarization, and model prompt optimization beyond deterministic context assembly.
design: Introduce a small pure `internal/context` package that accepts typed input records and returns `BuiltContext` with
  blocks, source refs, source-backed claims, budget/meter fields, and warnings. Add a TUI `ContextView` as app-injected display
  data. For `!!`, reuse the same bash request path as `!`; after the result is visible and history-safe, build deterministic
  summarized shell context from stdout/stderr/error details, attach refs to the command and exact output/failure lines, and
  render the context meter plus claims. The TUI only renders and snapshots this data.
overall_acceptance:
- Pure context builder tests prove prompts, read/tool output, diffs, command output, and user constraints become context blocks
  with stable source refs and budget metadata.
- '`!!git status --short` submitted through the prompt routes through runtime BashToolProposed, dispatchBashEffect, autonomy
  permission, bash result mapping, command/history recording, and current snapshot persistence before context is assembled.'
- Summarized shell context preserves the exact command, stdout/stderr summary, exact failure lines when present, and source
  refs that support each visible claim.
- TUI render and semantic snapshots show context meter, source-backed claims, summarized shell output, and machine-readable
  source refs without TUI-owned context assembly.
- No `/compact`, background utility job, stale-context check, provider summarization, plugin, MCP, workflow DSL, generic graph
  engine, hosted control plane, or M40+ behavior is added.
- Targeted, package, full Mage, Agentera, diff, home-path, and TestM<number> hygiene validation pass before ROADMAP.md is
  updated.
