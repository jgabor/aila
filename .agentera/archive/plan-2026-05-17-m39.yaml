  critic_issues: M39 must implement only the context-builder/source-reference slice. The context package owns structured context
    blocks, source refs, source-backed claims, and budget metadata. `!!command` must now reuse the existing bash permission/history/result
    path before adding summarized command context with exact preserved failure/output references. Keep `/compact`, ctrl+x
    k, background utility jobs, stale-context checks, provider summarization, prompt-provider rewrites, plugins, MCP, workflow
    DSLs, generic graph engines, and M40+ behavior out of scope.
  title: 'Milestone 39: Context Builder With Source Refs'
what: Deliver ROADMAP.md Milestone 39 by adding Aila-owned structured context assembly with exact source references, visible
  context evidence, and completed `!!command` handling that routes through bash permission/history before feeding summarized
  command output into context.
why: M38 made `!!command` a visible deferred shell-prefix path. M39 turns context into a typed product boundary so prompts,
  tool results, diffs, command output, and user constraints can be assembled without losing the references needed for trust,
  while still avoiding manual compaction and background utility work.
constraints: 'Execute only Milestone 39. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may render app-injected context meter, source refs, source-backed claims, and summarized shell context, but it must not
  assemble context, execute shell commands, summarize output, call providers, read files, classify permissions, write history,
  persist sessions, or mutate workflow phase. Use `internal/context` for pure source-ref/context assembly. Route `!!command`
  through the existing runtime BashToolProposed/dispatchBashEffect path and existing permission/history recording before context
  is built. Preserve exact command, output, stderr, failure lines, paths, diffs, and user constraints when correctness may
  depend on them. Do not add `/compact`, ctrl+x k, compaction effects, background utility jobs, stale-context checks, provider
  summarization, model prompt rewrites beyond bounded context data assembly, source indexing, plugins, MCP, workflow DSLs,
  generic graph engines, hosted control planes, or M40+ behavior. Use behavior-based test names; do not introduce new TestM<number>
  symbols. Do not push.'
