header:
  level: full
  created: '2026-05-17'
  status: complete
  title: 'Milestone 56: Orchestration'
  reviewed: '2026-05-17'
  critic_issues: M56 is the last agent-completable milestone and must add bounded orchestration without turning Aila into
    a generic graph engine, hidden actor swarm, plugin host, provider marketplace, or direct source-editing conductor. Visible
    progress, retries, failures, blockers, final summary, subagent supervision, semantic evidence, PTY progress, and cancellation
    must be covered before the roadmap can move to human-only M57.
  completed: '2026-05-17'
what: Deliver ROADMAP.md Milestone 56 by adding a bounded orchestrate command/capability that coordinates multiple existing
  capability-shaped steps and supervised subagents with visible evaluation, retry, blocker, cancellation, and summary evidence.
why: M55 made child work observable. M56 must connect that supervision into a small conductor so Aila can coordinate multiple
  bounded steps before the roadmap enters human-only dogfooding work.
constraints: Execute only Milestone 56. Preserve statechart-MVU and explicit effect boundaries. Orchestrate is a BUILD-phase
  conductor over fixed built-in capabilities and runtime subagent messages/effects, not a source-editing capability. Keep
  provider-backed child execution, real parallel scheduling, hidden background workers, generic graph engines, plugins, MCP,
  dynamic tools, workflow DSLs, hosted control planes, marketplace behavior, direct workflow phase mutation, and pushes out
  of scope. Use behavior-based test names; do not introduce new TestM<number> symbols.
previous_plan_archived: .agentera/archive/plan-2026-05-17-m55.yaml
