overall_acceptance:
- Orchestrate is implemented as a fixed BUILD-owned conductor payload, not as a generic engine or source-editing capability.
- /orchestrate has closed policy/app routing and visible command behavior through existing runtime messages/effects.
- Supervised child work, failures, retries, blockers, decisions, evidence, cancellation, and final summary remain observable
  in app/TUI state.
- TUI fixtures, semantic snapshots, render snapshots, update/keybinding tests, and PTY smoke cover orchestration progress
  and cancellation at the current product state.
- Targeted, package, cmd, full Mage, Agentera, diff, home-path, and added func TestM<number> hygiene validation pass before
  ROADMAP.md is updated.
surprises:
- The apply_patch hook is still unavailable because /hooks/validate_artifact.py is missing, so scripted artifact edits must
  stay narrow, structured, formatted, and validated.
- M56 is explicitly the last agent-completable milestone; ROADMAP closeout must point to human-only M57 without starting it.
- An initial 240s timeout around the full check path was too short for the cmd/aila PTY package; the unbounded reruns passed
  with cmd/aila taking about six and a half minutes.
