scope:
  included:
  - Add a fixed built-in orchestrate capability payload that records bounded cycles, child work, decisions, retry attempts,
    evaluation state, blockers, final summary, source refs, and boundary descriptors.
  - Route /orchestrate through the fixed command surface and app controller into runtime capability/subagent messages while
    preserving BUILD ownership and no direct workflow phase mutation.
  - Use existing subagent request/progress/completion/failure/cancellation state to show supervised child work during orchestration,
    including retry and failure records that remain visible.
  - Render orchestration progress, subagent progress, failures, retries, blockers, decisions, evidence, and final summary
    in deterministic TUI fixtures and semantic snapshots.
  - Add PTY smoke for visible /orchestrate progress and cancellation using fake deterministic runtime paths, without live
    provider calls or hidden source edits.
  - Run targeted, package, full Mage, Agentera, diff, home-path, and added func TestM<number> hygiene validation, then update
    ROADMAP.md and commit the milestone locally.
  excluded:
  - M57 dogfooding, real provider-backed child agents, true parallel worker scheduling, generic DAG/graph execution, plugin/MCP
    surfaces, dynamic capability schemas, model marketplaces, hosted control planes, source incorporation outside existing
    tool/permission/history/state paths, direct source-level checks by orchestrate itself, and push operations.
  deferred:
  - Human-only dogfooding, real model-run child agents, multi-pane terminal management, richer plan artifact automation, distributed
    worker scheduling, and any product decision to broaden Aila beyond fixed built-in capabilities.
design: Keep M56 deterministic and bounded. internal/capability defines OrchestrateOutput as a typed conductor summary over
  fixed capability aliases and child-work evidence. internal/policy exposes /orchestrate as a closed command route. internal/app
  builds one deterministic orchestration run from the current plan/view state, records subagent spawn/progress/failure/completion
  messages through runtime, and maps the capability payload into a display-only TUI view. internal/tui renders orchestration
  cycles and semantic evidence; it never dispatches, cancels, incorporates, evaluates, mutates, or transitions workflow by
  itself.
tasks:
- number: 1
  name: Plan and confirm the M56 orchestration boundary
  depends_on: []
  status: complete
  acceptance:
  - GIVEN Agentera and roadmap state are reviewed WHEN planning finishes THEN the active plan names M56 only, archives the
    completed M55 plan, and records M57 as human-only and out of scope.
  - GIVEN source docs and current seams are inspected WHEN implementation starts THEN the plan keeps orchestrate as a BUILD
    conductor over fixed capabilities, runtime messages/effects, and existing tool/permission/history/state paths.
  - GIVEN tests are named or touched WHEN planning is recorded THEN new coverage uses behavior-based names rather than milestone-number
    names.
  evidence:
  - Installed Agentera CLI hej state showed M55 complete, no active plan, and M56 as the roadmap next milestone.
  - docs/notes/PROMPT.md, AGENTS.md, ROADMAP.md top status and M56 section, README capability table, ARCHITECTURE subagent/orchestration
    and cancellation rules, docs/workflow-architecture orchestrate map and invariants, docs/tui-testing fixture/semantic/PTY
    guidance, and current capability/policy/app/runtime/TUI/cmd seams were reviewed.
  - A read-only explorer confirmed /orchestrate is policy-recognized but not command-bound, RunBuiltIn still rejects orchestrate,
    subagent infrastructure exists, and the smallest safe slice is bounded command/capability/app/TUI/PTy coverage without
    plugins or graph engines.
- number: 2
  name: Add bounded orchestrate capability output
  depends_on:
  - 1
  status: complete
  acceptance:
  - GIVEN an orchestrate request with app-supplied plan/cycle metadata WHEN RunBuiltIn executes it THEN one OrchestrateOutput
    payload records cycles, fixed capability names, child work, decisions, evaluation, retry attempt counts, blockers, final
    summary, source refs, and boundary requests.
  - GIVEN orchestration has retryable failure evidence WHEN the payload is inspected THEN failed work, retry decision, recovery
    action, and final evaluation remain visible instead of being overwritten.
  - GIVEN the package boundary is inspected WHEN tests build THEN orchestrate does not import tools, permission executors,
    workflow mutation code, plugins, graph engines, provider marketplaces, or dynamic capability loaders.
  evidence:
  - internal/capability/orchestrate.go adds a fixed OrchestrateOutput payload with goal, retry budget, cycles, child work,
    decisions, evidence, blockers, caveats, final summary, source refs, and boundary requests.
  - internal/capability/contract.go carries OrchestrateOutput through ExitPayload cloning, and RunBuiltIn dispatches NameOrchestrate
    without importing tools, permission executors, workflow mutation code, plugins, graph engines, provider marketplaces,
    or dynamic loaders.
  - Behavior-named capability tests prove retryable failure evidence, retry decisions, recovery action, completion, blocker
    visibility, and fixed RunBuiltIn dispatch remain observable.
- number: 3
  name: Wire /orchestrate through app-owned runtime supervision
  depends_on:
  - 2
  status: complete
  acceptance:
  - GIVEN /orchestrate is submitted WHEN policy and app routing handle it THEN the command is closed, command history is recorded,
    and app-owned code proposes orchestrate capability/subagent runtime messages without TUI-owned execution.
  - GIVEN the deterministic orchestration run includes a failed child and a retry WHEN runtime/app state is inspected THEN
    subagent progress, failure, retry, completion, and final summary remain visible with parent run and evidence links.
  - GIVEN cancellation is requested during visible orchestration WHEN the fake runtime path handles it THEN cancellation is
    observable and does not claim lower-layer provider/tool cancellation or mutate workflow phase directly.
  evidence:
  - internal/policy/command.go recognizes /orchestrate as a closed command route, while internal/app/orchestrate.go builds
    deterministic app-owned orchestration requests from current plan state and records command/runtime evidence through existing
    paths.
  - The app route records failed, retried, and completed supervised child work using runtime subagent lifecycle messages,
    preserving parent run, evidence links, final summary, and retry counts.
  - The fake held orchestration path supports visible cancellation without claiming lower-layer provider/tool cancellation
    or mutating workflow phase directly.
- number: 4
  name: Render orchestration progress and evidence in TUI snapshots
  depends_on:
  - 2
  - 3
  status: complete
  acceptance:
  - GIVEN orchestration state is injected into ViewState WHEN fixtures render THEN progress, active cycle, subagent progress,
    failures, retries, blockers, decisions, and final summary are visible where space allows.
  - GIVEN semantic snapshots are inspected WHEN orchestration exists THEN machine-readable records include active cycle, child
    work, decisions, evidence, blockers, retry counts, display_only=true, and transition_claimed=false.
  - GIVEN update/keybinding tests run WHEN /orchestrate is typed or selected THEN routing emits app command messages only
    and no TUI-owned spawn/cancel/evaluate action is introduced.
  evidence:
  - internal/tui/model.go and internal/tui/render.go add display-only OrchestrateView rendering and semantic snapshot records
    for active cycle, child work, decisions, evidence, blockers, retry counts, display_only=true, and transition_claimed=false.
  - orchestration-progress and orchestrate-command fixture snapshots were added for deterministic plain, ANSI, and semantic
    coverage; help-command snapshots were refreshed to include /orchestrate.
  - Behavior-named TUI fixture tests prove orchestration progress, retries, blockers, final summary, and command routing without
    adding TUI-owned spawn/cancel/evaluate actions.
- number: 5
  name: Validate PTY progress cancellation and boundaries
  depends_on:
