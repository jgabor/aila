what: Deliver ROADMAP.md Milestone 27 by adding edit and write file mutations through explicit effects, immediate permission
  recheck, and recorded mutation result messages against test workspaces.
why: M26 made write-shaped permission decisions testable. M27 proves file mutation itself can only happen through the effect
  dispatcher, with permission evidence and visible recorded results, before broader diff/history features arrive.
constraints: Execute only Milestone 27. Preserve statechart-MVU and explicit effects. Keep TUI presentation-only. Implement
  edit/write against test workspaces and do not add mutating shell execution, diff view navigation, durable mutation history/undo
  browser, context compaction, stale checks, source indexing, provider fallback, plugins, MCP servers, workflow DSLs, model
  marketplaces, hosted control plane behavior, or Milestone 28+ scope. Do not push.
