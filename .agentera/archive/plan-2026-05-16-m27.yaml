scope:
  included:
  - Edit/write tool request validation and execution against caller-provided workspace roots, including path safety, target
    version recheck, changed path reporting, and bounded result metadata.
  - Runtime edit/write proposed/effect/completed messages and result records that carry permission decision evidence and mutation
    result details.
  - App dispatcher integration that validates proposals, rechecks permission immediately before mutation, executes only allowed
    edit/write effects, and returns denial/failure records without mutating when blocked.
  - TUI mutation success and mutation failure fixtures plus render/semantic snapshots at 80x24 and 120x32 showing changed
    paths and recorded results.
  - A fake or temp-workspace approval-to-write PTY smoke that proves mutation happens only through the explicit effect/permission
    path.
  excluded:
  - Mutating shell command execution, diff view navigation, durable history browser, durable approval persistence, undo/replay
    UI, provider fallback, context compaction, stale checks, source indexing, plugins, MCP servers, workflow DSLs, model marketplaces,
    hosted control planes, or Milestone 28+ behavior.
  deferred:
  - Diff view, mutation history browsing, full undo metadata workflow, mutating shell commands, and any richer approval persistence
    beyond the result data needed for this slice.
design: 'Mirror the existing read/search/bash/fetch pipeline: runtime Update emits typed edit/write effects, app-owned dispatch
  validates workspace paths, builds exact permission proposals, rechecks autonomy immediately before execution, internal/tools
  performs the filesystem mutation, and runtime/app/TUI copy recorded results back as display-only state. Keep the executor
  small and test-heavy, with temp directories as the mutation surface.'
tasks:
- number: 1
  name: Implement edit/write tool contracts and executors
  depends_on: []
  status: completed
  acceptance:
  - GIVEN edit/write requests target a temp workspace WHEN validation runs THEN paths are normalized inside the workspace
    and reserved/traversal/home/XDG/directory-like paths are rejected.
  - GIVEN write executes WHEN the target version still matches the proposal THEN the file is created or overwritten and the
    result records changed path, previous existence/version, new version, bytes written, and expected effect.
  - GIVEN edit executes WHEN the target version and expected old text match THEN the file is updated and the result records
    changed path, old/new version, bytes written, and expected effect.
  - GIVEN version or old-text checks fail WHEN execution runs THEN no file mutation occurs and the result is a bounded failure.
  evidence:
  - internal/tools/mutation.go defines validated edit/write request contracts, bounded mutation errors, path/version safety,
    symlink escape checks, and ExecuteEdit/ExecuteWrite result recording.
  - internal/tools/mutation_test.go covers workspace path rejection, reserved/path traversal/home/XDG/directory-like rejects,
    write create/overwrite versions, edit old-text replacement, mismatch failures, and no mutation on failure.
  - go test ./internal/tools -count=1 passed.
- number: 2
  name: Add runtime edit/write effects and recorded results
  depends_on:
  - 1
  status: completed
  acceptance:
  - GIVEN EditToolProposed or WriteToolProposed messages reach runtime Update WHEN no operation is active THEN typed effects
    are emitted and active operation state records the correct tool.
  - GIVEN edit/write completion messages arrive WHEN Update handles them THEN LastMutation/result status is recorded and runtime
    returns to idle without deterministic IO.
  - GIVEN denied or failed mutation results are recorded WHEN app/TUI consume them THEN they include permission decision and
    error metadata rather than disappearing.
  evidence:
  - internal/runtime/runtime.go adds EditToolProposed, WriteToolProposed, MutationToolCompleted, typed edit/write effects,
    OperationEdit/OperationWrite, ActiveMutation, and LastMutation result state.
  - internal/runtime/runtime_test.go covers deterministic edit/write proposal effects and mutation completion/failure result
    recording without deterministic IO.
  - go test ./internal/runtime ./internal/app -count=1 passed.
- number: 3
  name: Dispatch edit/write with immediate permission recheck
  depends_on:
  - 1
  - 2
  status: completed
  acceptance:
  - GIVEN autonomy read/off blocks a mutation WHEN dispatch handles edit/write effects THEN no file changes occur and a denied
    recorded result is returned.
  - GIVEN autonomy write/yolo allows a mutation WHEN dispatch handles edit/write effects THEN permission is checked before
    validation and rechecked immediately before execution.
  - GIVEN validation or recheck fails WHEN dispatch handles edit/write effects THEN the returned result includes bounded failure
    metadata and no mutation is performed.
  - GIVEN mutating shell proposals exist WHEN M27 dispatch is inspected THEN no mutating shell executor path is added.
  evidence:
  - internal/app/shutdown.go dispatches edit/write effects by building permission proposals, checking autonomy before validation,
    validating request paths/content, rechecking permission immediately before ExecuteEdit/ExecuteWrite, and returning denied/failed
    results without mutation.
  - internal/app/prompt_test.go covers write success, edit success, read-autonomy denial without mutation, target-version
    mismatch without mutation, and approval-to-write approve/deny behavior.
  - Inspection confirms M27 added no mutating shell executor path.
- number: 4
  name: Expose mutation result state in TUI fixtures and PTY smoke
  depends_on:
  - 2
  - 3
  status: completed
  acceptance:
  - GIVEN mutation success and mutation failure fixtures render WHEN snapshot tests run THEN changed file paths, status, recorded
    result, decision source, autonomy, approval requirement, and error details are visible at 80x24 and 120x32.
  - GIVEN semantic snapshots are inspected WHEN mutation fixtures render THEN mutation result fields are machine-readable
    and marked display-only.
  - GIVEN a fake or temp-workspace approval-to-write PTY smoke runs WHEN approval is selected THEN the target file changes
    only through the explicit effect/permission path and clean quit still works.
  evidence:
  - internal/tui/model.go and internal/tui/render.go expose app-injected MutationView render and semantic state marked app-owned/display-only.
  - mutation-success and mutation-failure fixtures include 80x24 and 120x32 plain/ANSI/semantic snapshots showing changed
