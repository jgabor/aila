overall_acceptance:
- Edit/write file mutations execute only through explicit runtime effects and app-owned dispatch.
- Permission is checked and rechecked immediately before mutation, with denial/failure results returned without mutation.
- Mutation results are recorded in runtime/app/TUI-visible data with changed paths, versions, status, and decision evidence.
- Mutation success/failure fixtures and PTY smoke prove user-visible behavior at the required sizes.
- No mutating shell command execution, diff view, history browser, undo workflow, or M28+ behavior is introduced.
surprises:
- Behavior-first test names replaced milestone-number-only names so mutation render and approval-to-write smoke tests remain
  understandable after M27 is no longer current.
- The 80x24 mutation snapshot forced changed paths and decision/error evidence to be front-loaded in the render block.
