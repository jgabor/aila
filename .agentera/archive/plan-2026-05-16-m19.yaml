  title: Milestone 19 Find And Grep Tools
what: >-
  Deliver ROADMAP.md:837-857 Milestone 19 by adding `find` and `grep` as
  read-only project discovery effects. Aila must be able to discover matching
  workspace paths and content matches with exact file paths, line numbers,
  deterministic ordering, bounds, and omitted-result metadata while keeping all
  filesystem IO outside deterministic updates and TUI rendering.
why: >-
  M18 proved the first read-only file inspection seam. M19 extends that same seam
  from one known file to project discovery and content search, which future model
  turns need before safe bash, fetch, edits, context compaction, and source
  provenance can be useful without drifting into shell-driven or hidden search.
constraints: >-
  Execute only Milestone 19. Preserve the statechart-MVU rule that updates decide
  and effects do. `find` and `grep` must run through explicit app/runtime/tool
  effects, not deterministic updates or TUI rendering. Treat both tools as
  read-only operations under permission/autonomy policy without opening mutation
  approval, shell, network, or indexing paths. Keep result shapes bounded,
  deterministic, path-safe, and precise about matching paths, line numbers, and
  omitted results. Do not add bash, fetch, edit, write, mutation history,
  undo/redo, replay, context compaction, stale checks, source index building,
  real provider fallback, plugins, MCP, workflow DSLs, marketplace behavior, or
  Milestone 20+ behavior. Do not push. Do not commit M19 work unless the user
  explicitly requests it.
