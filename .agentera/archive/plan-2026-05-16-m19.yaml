overall_acceptance:
  - GIVEN a valid workspace path pattern is searched WHEN the find tool executes THEN Aila returns bounded deterministic matching paths with omitted-result metadata and no workspace mutation.
  - GIVEN valid workspace content is searched WHEN the grep tool executes THEN Aila returns bounded deterministic matches with exact paths, 1-based line numbers, previews, and omitted-result metadata without mutating the workspace.
  - GIVEN invalid, unsafe, binary, oversized, missing, permission-denied, symlink-escaping, or canceled search cases occur WHEN results are surfaced THEN errors or skip metadata are typed, bounded, path-safe, and non-destructive.
  - GIVEN find and grep operations are proposed and completed WHEN app/runtime/TUI paths handle them THEN IO remains outside deterministic updates and the TUI consumes injected display/semantic state only.
  - GIVEN milestone validation runs WHEN documented gates complete THEN tool bounds tests, app/effect tests, render and semantic snapshots, tool-running evidence, optional PTY smoke decision, targeted tests, full `go test ./internal/...`, and `mage check` support closeout.
surprises:
  - M19 should not shell out to `rg`, add source indexing, or create a generic tool framework. Implement small Go-native read-only executors behind the same effect boundary established by M18.
