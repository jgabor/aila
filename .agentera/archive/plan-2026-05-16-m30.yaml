  title: Milestone 30 Undo And Redo Commands
what: Deliver ROADMAP.md Milestone 30 by routing /undo and /redo plus shortcuts through shared command handlers, applying supported recovery through
  app-owned explicit effects and permission checks, recording recovery results, and exposing undoable, undone, and redone states in TUI/history
  evidence.
why: M29 made mutations auditable and added descriptive undo metadata. M30 turns the supported recovery metadata into user-facing recovery commands
  while preserving trust, permission, and history boundaries.
constraints: 'Execute only Milestone 30. Preserve statechart-MVU and explicit effect boundaries. Keep TUI presentation-only: it may route command
  intents, render app-injected recovery/history state, and handle focus/navigation, but it must not read history files, mutate workspace files,
  decide permissions, or execute recovery. Support only records with enough safe metadata; unsupported records must produce bounded, auditable
  no-op results. Keep provider review, conversation rewind beyond file recovery, richer edit/overwrite content restoration, context compaction,
  stale checks, source indexing, plugins, MCP servers, workflow DSLs, model marketplaces, hosted control plane behavior, non-interactive run behavior,
  and Milestone 31+ behavior out of scope. Use behavior-based test names. Do not push.'
