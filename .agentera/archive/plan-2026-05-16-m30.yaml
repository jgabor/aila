tasks:
- number: 1
  name: Add closed undo and redo command routes
  depends_on: []
  status: completed
  acceptance:
  - GIVEN /undo and /redo are submitted WHEN policy recommends command routes THEN both map to closed undo/redo routes without falling through
    to prompt execution.
  - GIVEN ctrl+x u and ctrl+x r are pressed WHEN shortcut routing runs THEN they produce the same command routes as /undo and /redo.
  - GIVEN help snapshots render WHEN command help is visible THEN undo and redo slash commands and shortcuts appear alongside existing fixed commands.
  evidence:
  - internal/policy now exposes closed CommandRouteUndo and CommandRouteRedo recommendations for /undo and /redo.
  - ctrl+x u and ctrl+x r map to the same undo/redo routes through the existing shortcut boundary, with policy and TUI parity tests covering slash/shortcut
    behavior.
  - help-command render and semantic snapshots were updated to show /undo, /redo, ctrl+x u, and ctrl+x r alongside the existing fixed commands.
- number: 2
  name: Extend history contract for recovery records
  depends_on:
  - 1
  status: completed
  acceptance:
  - GIVEN recovery results are persisted WHEN they reference a target mutation event THEN bounded event validation accepts target ID, command,
    action, path, status, and version metadata.
  - GIVEN unsafe or incomplete recovery metadata is decoded WHEN validation runs THEN the event is rejected before history append.
  - GIVEN existing prompt/response/command/runtime/mutation history events are read WHEN the contract expands THEN older event kinds remain valid
    and display-stable.
  evidence:
  - internal/history now defines a closed recovery event kind plus bounded RecoveryRecord metadata for undo/redo command, status, target event ID,
    action, paths, versions, redo availability/action/content, reason, error, and permission-decision provenance.
  - NormalizeFakeEvent rejects recovery metadata on non-recovery events, rejects mutation/undo metadata on recovery events, rejects unsafe/incomplete
    recovery records, and redacts/bounds display and redo content before append.
  - internal/state JSONL append/read tests round-trip recovery records with markers for kind, command, target event ID, and redo availability while
    proving secret-shaped recovery text is redacted.
- number: 3
  name: Execute supported undo and redo through app-owned effects
  depends_on:
  - 2
  status: completed
  acceptance:
  - GIVEN the latest supported create-file mutation is undoable WHEN /undo runs THEN the app selects it from history, classifies the recovery
    mutation, rechecks the target version, deletes only that workspace-relative file, and records a completed undo result.
  - GIVEN a completed undo has safe redo metadata WHEN /redo runs THEN the app restores the file through the same explicit guarded path and records
    a completed redo result.
  - GIVEN no supported target, stale target version, denied permission, or unsafe path exists WHEN undo/redo runs THEN the command records a bounded
    unsupported/failed recovery result without mutating files.
  evidence:
  - internal/app now selects the latest supported create-file mutation for undo, skips already-undone mutations, and selects the latest unredone
    completed undo with safe redo content for redo.
  - internal/tools now exposes explicit recovery delete validation/execution with workspace-relative path checks, target-version recheck, symlink
    escape protection, exact file removal, and bounded redo content capture.
  - Recovery execution records completed, unsupported, permission-denied, and stale-target failure results through bounded history events while keeping
    the TUI display-only over app-injected RecoveryView data.
- number: 4
  name: Render undoable, undone, and redone states
  depends_on:
  - 2
  - 3
  status: completed
  acceptance:
  - GIVEN history view includes undoable, undone, and redone records WHEN rendered THEN rows and selected details show command, status, target
    path, target event ID, action, and undo/redo availability.
  - GIVEN semantic snapshots are generated WHEN recovery records are visible THEN command, status, target_event_id, paths, undo_available, redo_available,
    and selected state are machine-readable.
  - GIVEN recovery result state is rendered outside history WHEN a command completes THEN the visible surface names undo/redo status and remains
    app-injected display data.
  evidence:
  - history-view fixtures now include an undoable mutation, a completed undo recovery with redo available, and a completed redo recovery with redo
    unavailable, with selected-row render evidence and semantic recovery metadata.
  - Semantic history snapshots now expose recovery command, status, target_event_id, action, paths, redo_available, redo_action, selected state,
    and aggregate redo_enabled alongside existing undo metadata.
  - recovery-result plain/ANSI/semantic fixtures render app-injected RecoveryView command/status/action/target/path/version/redo/decision data outside
    the history surface while keeping the TUI display-only.
