scope:
  included:
  - Add closed policy command routes for /undo, /redo, ctrl+x u, and ctrl+x r with slash/shortcut parity and help-command visibility.
  - Extend the bounded history/recovery contract so app-owned recovery results can reference target mutation records and expose undoable, undone,
    and redone state without leaking unsafe paths or content.
  - Implement app-owned recovery selection and execution for supported records, with permission classification, immediate recheck, exact target-version
    guards, and bounded unsupported/failure results.
  - Render recovery results and history states in deterministic TUI fixtures and semantic snapshots while keeping the TUI display-only.
  - Add PTY smoke in a temp workspace proving a supported mutation can be undone and redone through the command surface and recorded in history.
  excluded:
  - Provider review, conversation rewind beyond supported file recovery, general edit/overwrite content restoration, shell mutation recovery,
    background recovery, context compaction, stale checks, source indexing, plugins, MCP servers, workflow DSLs, model marketplaces, hosted control
    planes, non-interactive run behavior, and Milestone 31+ behavior.
  deferred:
  - Recovering arbitrary edits/overwrites with previous-content storage, provider-assisted review/recovery, conversation rewind, and broader redo
    stack behavior after richer durable mutation records exist.
design: 'Keep command recognition in internal/policy, deterministic input routing in internal/tui, recovery selection/orchestration in internal/app,
  filesystem mutation in app-owned explicit recovery/tool effects, durable records in internal/history/internal/state, and display-only recovery/history
  rendering in internal/tui. M30 should recover only the safest already-described mutation shape first: create-file writes whose undo metadata
  can be guarded by path and target version. Undo may delete that created file after permission and version recheck; redo may restore only when
  bounded redo metadata is available from a prior recorded undo result. Unsupported records must be visible and auditable, not silently ignored.'
overall_acceptance:
- /undo and /redo slash commands and ctrl+x u/r shortcuts route through the same closed command recommendation path and are visible in help snapshots.
- Supported create-file mutation history can be undone through app-owned recovery execution with permission classification, target-version recheck,
  history recording, and no TUI filesystem ownership.
- A recorded undo result can be redone when safe bounded redo metadata is available; unsupported redo/undo attempts return bounded auditable results.
- Render and semantic snapshots show undoable, undone, and redone states plus recovery result metadata without exposing unsafe paths or hidden
  execution.
- PTY smoke proves undo and redo mutate only a temp workspace file through the command surface and leave durable history evidence.
