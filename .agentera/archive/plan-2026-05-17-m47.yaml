scope:
  included:
  - Add a state-store logical plan artifact with resolver/write ownership tests and atomic store persistence for
    M47 plan output.
  - Add deterministic plan capability behavior in internal/capability that turns app-supplied project/session evidence
    and requested scope into plan items with behavioral acceptance criteria, blockers, next action, artifact refs,
    source refs, and one exit payload.
  - Wire plan through existing runtime capability messages/effects and app-owned invocation/persistence seams so
    plan output is persisted through the state store and displayed without executing build work.
  - Render plan capability output in TUI display state and semantic snapshots with active plan, pending/done items,
    blockers, next action, artifact refs, source refs, and valid FSM successor recommendation evidence.
  - Add behavior-named state/capability/runtime/app/TUI/PTY coverage proving one exit payload, valid successor recommendation,
    store-owned artifact persistence, visible display, and no build/audit execution.
  excluded:
  - Build execution, audit behavior, provider/model planning loops, tool execution, workspace file mutation, permission
    approvals, broad capability slash/keybinding parity, multi-agent orchestration, optimization/document/design
    behavior, plugins, MCP, workflow DSLs, generic graph engines, hosted control planes, and M48+ behavior.
  deferred:
  - Provider-backed plan generation, richer dependency planning, editing an existing plan interactively, full capability
    command alias activation, build execution from plan items, audit feedback loops, and durable progress updates
    beyond the initial plan artifact.
design: Keep plan deterministic and state-primary. internal/capability owns PlanCapability request metadata, item/blocker/next-action
  composition, artifact/source refs, boundary descriptors, one ExitPayload, and a PLAN successor recommendation.
  internal/state owns a logical plan artifact path and write authorization. internal/runtime reuses CapabilityProposed/Effect/Completed
  and records LastCapability. internal/app builds a bounded plan request from current view/runtime/session/store
  evidence, asks runtime to run the capability, persists the plan artifact through state.Store, and injects PlanView
  display state. internal/tui renders only app-injected PlanView data and semantic snapshots; it never creates plans,
  writes artifacts, executes build work, or changes workflow phase.
overall_acceptance:
- State tests prove the plan logical artifact resolves inside .aila/artifacts, rejects unsafe/unknown names, requires
  an owning writer, and writes atomically through the state store.
- Plan capability tests prove one complete exit payload, scoped plan items with behavioral acceptance criteria,
  pending/done state, blockers when evidence is missing, artifact refs, source refs, and a valid PLAN successor
  recommendation without direct phase mutation.
- Runtime/app tests prove plan uses typed capability update/effect/completion messages, app persists the plan artifact
  through the store, and plan display does not execute build/audit/provider/tool behavior.
- TUI fixtures and semantic snapshots show active plan, pending items, blockers, done state, next action, artifact
  refs, source refs, successor recommendation, transition_claimed=false, and display-only semantics.
- PTY smoke covers plan display if interactive status/plan display changes; otherwise the skip is documented with
  unchanged interactive behavior.
- Targeted, package, full Mage, Agentera, diff, home-path, and added func TestM<number> hygiene validation pass
  before ROADMAP.md is updated.
