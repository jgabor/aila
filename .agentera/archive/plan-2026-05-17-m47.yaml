header:
  level: full
  created: '2026-05-17'
  status: complete
  reviewed: '2026-05-17'
  critic_issues: M47 must add only the plan capability. It should create and display scoped work with behavioral
    acceptance criteria, persist a plan artifact through Aila state-store/resolver ownership, prove one exit payload
    and valid FSM recommendation, and keep build execution, audit, provider execution, broad slash-command parity,
    plugins, MCP, workflow DSLs, hosted control planes, and M48+ behavior out of scope.
  title: 'Milestone 47: Plan Capability'
what: Deliver ROADMAP.md Milestone 47 by implementing a smallest useful plan capability over project/session state,
  persisting a scoped plan artifact through the state store, rendering active plan/pending/blocker/next-action evidence
  in the TUI, and validating that Aila can create and display scoped work without executing it.
why: M46 proved one concrete capability can run through runtime/app/TUI boundaries. M47 should use those same boundaries
  for the first state-primary capability that creates durable scoped work while still leaving build execution and
  audit to later milestones.
constraints: Execute only Milestone 47. Preserve statechart-MVU and explicit effect boundaries. Plan may recommend
  the PLAN successor through the exit payload and the FSM validator, but it must not directly mutate workflow phase.
  Plan artifact reads and writes must go through state-store/resolver ownership and app/runtime effects, not direct
  capability file IO. Use deterministic app-supplied project/session evidence; no provider/model call is required
  for this slice. Keep build execution, audit, tool execution, permission approval for workspace mutation, plugin/MCP/workflow
  DSL/generic graph/hosted control-plane behavior, broad capability command parity, and M48+ behavior out of scope.
  Use behavior-based test names; do not introduce new TestM<number> symbols. Do not push.
