header:
  level: full
  created: '2026-05-17'
  status: complete
  reviewed: '2026-05-17'
  critic_issues: M43 must add only an idle-only stale-context check that surfaces stale/fresh status with evidence and a suggested
    next action. It must preserve the existing utility scheduling and explicit runtime/app effect path, keep the TUI presentation-only,
    and avoid refresh, compaction, context rewriting, file writes, git mutations, project artifact writes, permission approvals,
    workflow phase transitions, final judgment, provider/model calls, plugins, MCP, workflow DSLs, generic graph engines,
    hosted control planes, and M44+ behavior.
  title: 'Milestone 43: Utility Stale-Context Check'
what: Deliver ROADMAP.md Milestone 43 by adding a deterministic idle-only utility stale-context check that returns stale,
  fresh, or unknown saved-context status with evidence, caveats, and suggested next action as runtime-visible data.
why: M42 made prepared context visible and non-authoritative. M43 adds the next utility safety signal so Aila can warn when
  saved context should not be silently trusted, while deferring refresh, compaction, and rewriting to later milestones.
constraints: 'Execute only Milestone 43. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may render app-injected stale-context state and semantic evidence, but it must not schedule utility work, inspect files,
  mutate state, call providers, persist project artifacts, change permissions, refresh context, compact context, or change
  workflow phase. Stale-context checks must run only when the primary runtime is idle and no active operation, approval, or
  queued user input exists. The check may report stale/fresh/unknown status, evidence, caveats, and a suggested next action,
  but foreground capabilities decide whether to act. Do not write files, mutate git state, write project artifacts, approve
  permissions, transition workflow phase, make final judgments, refresh context, compact context, call providers/models, add
  plugins, add MCP, add workflow DSLs, add generic graph engines, add hosted control-plane assumptions, or add M44+ behavior.
  Use behavior-based test names; do not introduce new TestM<number> symbols. Do not push.'
