scope:
  included:
  - Add a typed stale-context result to internal/utility for a fixed stale-context check job, including stale/fresh/unknown
    status, evidence refs, caveats, and suggested next action.
  - Reuse the idle-only scheduler and runtime/app UtilityJob effect path so stale checks run only while the primary runtime
    can yield.
  - Expose stale-context output through app-injected /status utility state and inspection lines without refreshing, compacting,
    rewriting, or changing workflow phase.
  - Add a stale-context fixture with plain, ANSI, and semantic snapshots showing job status, stale/fresh status, evidence,
    caveats, and suggested next action.
  - Add tests proving stale checks are read-only, non-authoritative, visible, and blocked when runtime, operation, approval,
    or queued input prevents utility work.
  - Run PTY smoke if /status visible behavior changes for stale-context output.
  excluded:
  - Context refresh, context compaction, context rewriting, summary refresh, provider/model utility calls, durable stale-status
    persistence, file writes, git mutations, project artifact writes, permission approval, workflow phase mutation, final
    judgment, plugins, MCP, workflow DSLs, generic graph engines, hosted control planes, and M44+ behavior.
  deferred:
  - Continuous compaction, summary refresh, provider-assisted stale analysis, durable stale-status persistence policy, automatic
    context refresh, and any automatic action based on stale status.
design: Extend the existing utility result shape with a stale-context payload and add a fixed stale_context_check job kind.
  The utility package stays pure and deterministic by comparing explicit saved/current context fingerprints supplied in the
  request. Runtime continues to emit UtilityJobEffect only after CanRun allows idle work. App code supplies bounded status
  fingerprints, maps the result into TUI UtilityView/status lines, and the TUI renders injected stale-context state only.
overall_acceptance:
- Utility tests prove stale-context jobs run only when primary runtime is idle and are denied while runtime/tool/approval/queued
  work is active.
- Utility package tests prove stale, fresh, and unknown outputs contain status, evidence refs, caveats, suggested next action,
  and all safety boundary fields false.
- Runtime/app tests prove stale-context start/result handling reuses the explicit utility state slot and does not mutate primary
  runtime status, transcript, workflow phase, files, git state, project artifacts, permissions, context content, or final
  judgment.
- TUI render and semantic snapshots show stale-context job status, stale/fresh/unknown status, evidence, caveats, suggested
  next action, utility model identity, read-only state, and safety evidence while keeping TUI presentation-only.
- PTY smoke runs if /status visible behavior changes, or the skip reason is documented if behavior remains snapshot-only.
- No refresh, compaction, context rewriting, summary refresh, provider/model call, durable stale-status persistence, plugin,
  MCP, workflow DSL, generic graph engine, hosted control plane, or M44+ behavior is added.
- Targeted, package, full Mage, Agentera, diff, home-path, and TestM<number> hygiene validation pass before ROADMAP.md is
  updated.
surprises:
- The existing /status utility slot could be retargeted from context prep to stale-context checks without adding a new scheduler
  or TUI-owned behavior.
- Adding explicit context refresh, compaction, and rewrite safety fields updated all utility snapshots, not only the new stale-context
  fixture.
