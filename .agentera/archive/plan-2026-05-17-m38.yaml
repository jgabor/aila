scope:
  included:
  - Add policy-owned shell prefix parsing for exact `!command` and reserved `!!command` inputs without expanding slash commands
    or generic registries.
  - 'Add app-owned shell prefix handling from submitted prompt text: `!command` parses argv, proposes a runtime bash tool
    request, applies visible result state, records command/history evidence, and persists the current snapshot.'
  - Add app-owned reserved summarized-shell handling for `!!command` that preserves the exact command, displays a clear M39-deferred
    result, records command/history evidence, and performs no shell execution, provider call, or context assembly.
  - Preserve existing bash validation, permission decisions, safe read-only allowlist, and denial/failure rendering for unsafe
    or mutating commands.
  - Add shell-result, shell-failure, and summarized-shell-deferred fixtures with render and semantic snapshots that expose
    command, status, output summary, and exact preserved failure lines.
  - Add prefix routing, history, semantic, key/update, and PTY smoke coverage for a safe temp command such as `!git status
    --short`.
  excluded:
  - Context builder/source references, actual summarized-shell context feeding, provider reasoning over command output, /compact,
    ctrl+x k, expanded shell grammar, shell pipelines, mutating-shell execution bypasses, config editing, plugins, MCP, workflow
    DSLs, generic command registries, hosted control planes, and M39+ behavior.
  deferred:
  - Feeding `!!command` output into the context builder, source-ref preservation for summarized command output, richer shell
    parsing, command result summarization, and model reasoning over shell output.
design: Keep the single prompt submit path and add a small app-owned shell-prefix router in front of ordinary prompt submission.
  Policy parses only leading `!` and `!!` forms into typed prefix recommendations. For `!`, the app converts the command into
  argv without shell evaluation, calls the existing inputRunner.proposeBashTool path, and reuses dispatchBashEffect for validation,
  autonomy policy, effect execution, and result mapping. The controller then records command/history evidence and persists
  the visible snapshot. For `!!`, the app injects a display-only deferred CommandView with the parsed argv and exact command
  metadata, records history, and skips runtime effects. The TUI remains display-only for command result/deferred state.
overall_acceptance:
- '`!git status --short` submitted through the prompt routes to runtime BashToolProposed, dispatchBashEffect, autonomy permission,
  safe bash execution, visible command output, command/history recording, and current snapshot persistence.'
- Unsafe or unsupported `!` commands return visible validation or permission failures through the same bash result surface,
  preserving exact failure lines and decision evidence without executing rejected shell syntax.
- '`!!git status --short` is recognized as reserved summarized-shell syntax, shows a clear deferred-to-M39 message, preserves
  the exact command, records command/history evidence, and does not execute shell, assemble context, summarize output, or
  call providers.'
- Fixtures for shell-result, shell-failure, and summarized-shell-deferred have deterministic plain, ANSI, and semantic snapshots
  exposing command, status, stdout/stderr summary, exact preserved failure lines, decision/source markers, and app-owned/display-only
  markers.
- Prefix routing tests prove `!` and `!!` are app/policy-owned input paths and do not bypass command routing, permission checks,
  runtime bash effects, history recording, or TUI presentation-only boundaries.
- Representative PTY smoke runs `!git status --short` in an isolated temp workspace and verifies visible shell output, clean
  quit, no provider/context behavior, and no hidden workspace mutation.
