  title: 'Milestone 38: Shell Prefixes'
what: 'Deliver ROADMAP.md Milestone 38 by adding README-promised shell input prefixes: `!command` executes through Aila''s
  existing safe bash runtime effect and permission/history path, while `!!command` is recognized as summarized-shell syntax
  and visibly deferred until the context builder lands in Milestone 39.'
why: M20 established the safe bash tool, M22/M26 established permission decisions, M28-M30 made command/history state visible,
  and M33-M37A stabilized interactive prompt command routing. M38 turns shell-like user input into typed runtime work instead
  of a hidden TUI or raw shell bypass.
constraints: 'Execute only Milestone 38. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may submit exact prompt text and render app-injected shell result/deferred state, but it must not parse shell syntax
  for execution, run shell commands, classify permissions, write history, persist sessions, assemble model context, call providers,
  or mutate workflow phase. Use app-owned prefix routing backed by policy parsing and the existing runtime BashToolProposed
  path. Route `!command` through validation, permission, bash effect dispatch, visible result, current snapshot persistence,
  and history. Route `!!command` to a reserved/deferred visible result and command history only; do not execute the command
  or build context. Keep mutating shell commands guarded by existing permission rules. Do not add /compact, ctrl+x k, context
  builder/source refs, summarized-shell provider behavior, generic command registries, plugins, MCP, workflow DSLs, hosted
  control planes, or M39+ behavior. Use behavior-based test names; do not introduce new TestM<number> symbols. Do not push.'
