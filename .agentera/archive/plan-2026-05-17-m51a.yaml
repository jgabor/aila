  title: 'Milestone 51A: Profile Capability'
what: Deliver ROADMAP.md Milestone 51A by implementing the profile capability so Aila can derive decision-profile context
  from app-supplied session evidence, optionally persist a durable profile artifact, and fold profile output into context
  without triggering workflow transitions.
why: M51 added cross-cutting research context. M51A adds the separate profile path so decision-pattern context can inform
  later work while remaining independent from research and outside workflow phase authority.
constraints: Execute only Milestone 51A. Preserve statechart-MVU and explicit effect boundaries. Profile is cross-cutting,
  display-only, and context-folding; it must not recommend or mutate workflow phases. Persist profile output only through
  the state store when intentionally durable. Keep research behavior changes, optimization, build execution, orchestration,
  provider-backed corpus analysis, plugins, MCP, workflow DSLs, generic graph engines, hosted control planes, M52+ behavior,
  and pushes out of scope. Use behavior-based test names; do not introduce new TestM<number> symbols.
