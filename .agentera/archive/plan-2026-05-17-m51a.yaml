scope:
  included:
  - Add deterministic profile capability request metadata and typed output for subject, current context, decision signals,
    update suggestions, evidence, confidence, caveats, source refs, artifact refs, boundary descriptors, next action, context
    summary, and one exit payload.
  - Mark profile as cross-cutting in the fixed built-in capability registry and ensure profile completion never recommends,
    claims, or mutates a workflow phase.
  - Extend the state artifact catalog and app wiring so intentionally durable profile output is persisted through state.Store
    as an app-owned logical profile artifact.
  - Wire an exact /profile command through policy, runtime capability effects, app-owned profile persistence, and context
    folding so profile results become visible context evidence.
  - Expose profile display state in the TUI with cross-cutting status, update suggestions, evidence, confidence, caveats,
    artifact refs, context-folding state, source refs, display-only state, and transition_claimed=false.
  - Add or update profile context/update/evidence/caveat fixtures plus behavior-named state/capability/runtime/app/policy/TUI/PTY
    coverage because /profile changes the interactive surface.
  excluded:
  - Research behavior changes, optimization, build execution, orchestration, provider-backed corpus analysis, automatic context
    authority, direct workflow phase mutation, writes outside state.Store, plugins, MCP, workflow DSLs, generic graph engines,
    hosted control planes, M52+ behavior, and push operations.
  deferred:
  - Provider-backed session-corpus analysis, global XDG profile storage, richer profile merge/conflict behavior, profile-driven
    policy personalization, optimera objectives, and multi-cycle orchestration.
design: Keep profile deterministic and host-owned. internal/capability defines ProfileCapability and ProfileOutput over app-supplied
  session and decision evidence; it emits waiting when no profile subject/evidence is available and complete or flagged when
  it can contribute caveated profile context. internal/runtime reuses CapabilityProposed, CapabilityEffect, and CapabilityCompleted.
  internal/state adds a logical profile artifact owned by the app. internal/app invokes profile from the exact /profile surface,
  persists the produced document through state.Store only when present, folds the produced claims/source refs into tui.ContextView,
  maps the payload into tui.ProfileView, and records runtime/session evidence. internal/tui renders injected ProfileView and
  ContextView state only; it never reads files, fetches corpus data, writes artifacts, judges transitions, or changes workflow
  phase.
overall_acceptance:
- Capability tests prove profile emits exactly one payload with deterministic subject, decision signals, update suggestions,
  evidence, confidence, caveats or needed input, artifact/source refs, boundary descriptors, context summary, and no recommended
  successor.
- Registry/policy/workflow checks prove profile is cross-cutting and cannot claim or trigger direct phase transitions.
- State/app tests prove durable profile artifacts are resolved and written through state.Store as OwnerApp only when intentionally
  present, and that /profile routes through typed capability effects without provider calls, tool execution, bypass writes,
  or workflow phase mutation.
- TUI render and semantic snapshots show cross-cutting status, update suggestions, evidence, confidence, caveats, profile
  artifact refs, source refs, context-folded state, display_only=true, and transition_claimed=false in profile fixtures where
  visible.
- PTY smoke proves the interactive /profile surface shows profile evidence, writes the profile artifact through the state
  store, and folds context in an isolated temp workspace without mutating unrelated files or git state.
- Targeted, package, full Mage, Agentera, diff, home-path, and added func TestM<number> hygiene validation pass before ROADMAP.md
  is updated.
surprises:
- apply_patch was unavailable in this environment because the artifact validator hook path was missing, so narrow scripted edits were used and verified with Mage formatting and tests.
