  title: Milestone 31 Non-Interactive Read-Only Run
what: Deliver ROADMAP.md Milestone 31 by turning `aila run <prompt>` from a stub into a bounded deterministic read-only CLI
  task that inspects the repository through app-owned read-only tool paths, prints inspected files, checks/commands, blockers,
  caveats, and source refs, and stores session state that the interactive TUI can inspect later.
why: M30 made interactive recovery auditable. M31 makes the documented non-interactive `run` command useful for safe repo
  inspection before write-mode run behavior arrives in M32.
constraints: 'Execute only Milestone 31. Preserve statechart-MVU and explicit effect boundaries. Keep TUI presentation-only:
  it may render stored app-injected run memory/history state, but it must not inspect files, run commands, decide permissions,
  or persist session state. `aila run <prompt>` is read-only for this slice and may use deterministic app-owned read/search/bash
  inspection through existing permission/tool boundaries. Keep real provider/model execution, stdin diff review, arbitrary
  shell commands, file mutation, approval UI changes, write-run behavior, context compaction, stale checks, source indexing,
  plugins, MCP servers, workflow DSLs, model marketplaces, hosted control plane behavior, and Milestone 32+ behavior out of
  scope. Use behavior-based test names. Do not push.'
