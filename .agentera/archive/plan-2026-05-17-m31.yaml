scope:
  included:
  - Replace the `aila run` stub with a bounded read-only CLI report for `run <prompt>` that does not start the interactive
    TUI path.
  - Inspect a small deterministic repo context through app-owned read-only tool paths, including inspected files and safe
    check/command summaries.
  - Persist non-interactive run session state and bounded history evidence for later inspection through existing project-store
    surfaces.
  - Extend the interactive TUI session/history rendering and semantic snapshots so stored run memory exposes inspected files,
    commands, blockers, caveats, and source refs.
  - Add PTY smoke proving a temp-workspace non-interactive run writes inspectable state and interactive startup/continue can
    render it afterward.
  excluded:
  - Real provider/model execution, stdin diff review, arbitrary user-selected shell commands, file mutation, approval UI changes,
    write-run behavior, context compaction, stale checks, source indexing, plugins, MCP servers, workflow DSLs, model marketplaces,
    hosted control planes, and Milestone 32+ behavior.
  deferred:
  - Provider-backed non-interactive reasoning, piped diff review, write-mode runs, richer per-run session directories, source
    indexing, and stale-context validation.
design: 'Keep CLI parsing in cmd/aila and route `run` to an app-owned non-interactive read-only runner. The app runner builds
  a deterministic run report from existing permission/tool/state boundaries: read selected repo files through read validation/execution,
  run only fixed safe inspection commands through the bash read-only path, summarize blockers and caveats, persist current-session
  memory plus bounded fake history records, and return plain CLI output without terminal UI startup. The TUI consumes injected
  snapshot/history state only; it does not perform inspection IO or infer run state from files.'
overall_acceptance:
- '`aila run <prompt>` returns a bounded plain-text report that includes prompt, inspected files, checks/commands run, blockers,
  caveats, source refs, and a stored-session indicator without starting the interactive TUI.'
- Repo inspection uses only app-owned read-only tool paths with permission decisions and safe fixed commands; no file mutation,
  approval flow, provider execution, or arbitrary shell is introduced.
- Current-session state and fake history capture the non-interactive run enough for `aila continue` and `/history` to show
  it later without leaking absolute workspace paths or secrets.
- TUI render and semantic snapshots expose stored run inspected files, commands, blockers, caveats, and source refs through
  display-only state.
- PTY smoke proves a temp-workspace `aila run <prompt>` completes, persists inspectable state, and a following interactive
  startup/continue can render the stored non-interactive run.
