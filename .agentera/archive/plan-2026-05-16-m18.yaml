        plain, ANSI, and semantic snapshots for `internal/tui/render.go` lines 18-19, preserving the exact target path,
        requested/effective ranges, preview lines, truncation marker, and read-only status.
      - >-
        Added checked-in canonical `tool-running` fixture evidence under `internal/tui/testdata/fixtures/tool-running/`
