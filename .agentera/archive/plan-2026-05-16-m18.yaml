overall_acceptance:
  - GIVEN a valid workspace file is read WHEN the read tool executes THEN Aila returns bounded content with exact path and line-range references without mutating the workspace.
  - GIVEN invalid, unsafe, binary, oversized, missing, directory, permission-denied, or canceled reads occur WHEN results are surfaced THEN errors are typed, bounded, path-safe, and non-destructive.
  - GIVEN read operations are proposed and completed WHEN app/runtime/TUI paths handle them THEN IO remains outside deterministic updates and the TUI consumes injected display/semantic state only.
  - GIVEN milestone validation runs WHEN documented gates complete THEN tool bounds tests, app/effect tests, render and semantic snapshots, tool-running evidence, optional PTY smoke decision, targeted tests, and mage check support closeout.
surprises:
  - The read tool is the first real workspace tool seam, so this plan keeps the contract narrow and explicitly rejects turning M18 into a generic plugin/tool framework or implementing M19 search tools early.
