        M18; `TestM18ReadPTYSmokeDecision` proves `/read`, `/read internal/tui/render.go`, and prompt-like read input do
        not produce visible read state.
      - >-
        Validation passed after `mage fmt`, `go test ./internal/tui ./internal/app ./internal/runtime -count=1`,
        `go test ./internal/... -count=1`, `git diff --check -- internal/tui internal/app internal/runtime
