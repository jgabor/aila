scope:
  included:
  - Add a typed prepared-context result to internal/utility for the fixed context-prep job, including summary, suggestions,
    evidence refs, caveats, and non-authoritative/read-only safety fields.
  - Reuse the M41 idle-only scheduler and runtime/app utility effect path so context prep runs only while the primary runtime
    can yield.
  - Expose context-prep output through app-injected /status utility state and inspection lines without changing workflow phase
    or final judgment.
  - Add or update a utility context-prep fixture with plain, ANSI, and semantic snapshots showing job status, prepared-context
    summary, evidence, and caveats.
  - Add tests proving context prep is read-only, non-authoritative, visible, and blocked when runtime, operation, approval,
    or queued input prevents utility work.
  - Run PTY smoke if /status visible behavior changes for context-prep output.
  excluded:
  - Stale-context checks, continuous/background compaction, summary refresh, provider/model utility calls, durable utility
    persistence, file writes, git mutations, project artifact writes, permission approval, workflow phase mutation, final
    judgment, plugins, MCP, workflow DSLs, generic graph engines, hosted control planes, and M43+ behavior.
  deferred:
  - Stale context detection, continuous compaction, summary refresh, source indexing beyond deterministic evidence refs, provider-assisted
    utility work, and durable prepared-context persistence policy.
design: Extend the existing utility result shape with a prepared-context payload rather than creating a new background system.
  The utility package remains pure and deterministic; runtime continues to emit an explicit UtilityJobEffect only after CanRun
  allows idle work; dispatch returns a typed read-only context-prep result; app maps it into TUI UtilityView/status lines;
  TUI renders injected state and semantic snapshots only.
overall_acceptance:
- Utility tests prove context-prep jobs run only when the primary runtime is idle and are denied while runtime/tool/approval/queued
  work is active.
- Utility package tests prove context-prep results contain prepared-context summary, evidence refs, caveats, non-authoritative
  wording, and all safety boundary fields false.
- Runtime/app tests prove context-prep start/result handling reuses the explicit utility state slot and does not mutate primary
  runtime status, transcript, workflow phase, files, git state, project artifacts, permissions, or final judgment.
- TUI render and semantic snapshots show context-prep job status, prepared-context summary, evidence, caveats, utility model
  identity, read-only state, and non-authoritative safety evidence while keeping TUI presentation-only.
- PTY smoke runs if /status visible behavior changes, or the skip reason is documented if behavior remains snapshot-only.
- No stale-context check, continuous compaction, summary refresh, provider/model call, durable prepared-context persistence,
  plugin, MCP, workflow DSL, generic graph engine, hosted control plane, or M43+ behavior is added.
- Targeted, package, full Mage, Agentera, diff, home-path, and TestM<number> hygiene validation pass before ROADMAP.md is
  updated.
surprises:
- The /status PTY smoke needed a taller 160x60 viewport after prepared-context lines made the evidence fall below the previous
  45-row capture.
- The utility executor name was changed from RunFakeJob to RunJob because M42 adds real deterministic context-prep work and
  stale historical naming would age poorly.
