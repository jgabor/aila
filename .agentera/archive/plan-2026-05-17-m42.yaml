header:
  level: full
  created: '2026-05-17'
  status: complete
  reviewed: '2026-05-17'
  critic_issues: M42 must add only visible, non-authoritative utility context prep. It must preserve the M41 idle-only scheduler
    and explicit runtime/app utility effect path, keep the TUI presentation-only, avoid file writes, git mutations, project
    artifact writes, permission approvals, workflow phase transitions, final judgment, provider/model calls, stale-context
    checks, continuous compaction, summary refresh, plugins, MCP, workflow DSLs, generic graph engines, hosted control planes,
    and M43+ behavior.
  title: 'Milestone 42: Utility Context Prep'
what: 'Deliver ROADMAP.md Milestone 42 by turning the utility worker skeleton into the first real read-only utility job: deterministic
  context-prep output with prepared-context summaries, suggestions, evidence refs, caveats, and visible non-authoritative
  status while the primary runtime is idle.'
why: M41 proved a safe idle-only utility slot. M42 uses that slot for context preparation so later stale-context checks, continuous
  compaction, and summary refresh work have a visible, evidence-backed prepared-context surface without letting background
  work decide or mutate anything.
constraints: 'Execute only Milestone 42. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may render app-injected prepared-context state and semantic evidence, but it must not schedule utility work, inspect
  files, mutate state, call providers, persist project artifacts, change permissions, or change workflow phase. Context prep
  must run only when the primary runtime is idle and no active operation, approval, or queued user input exists. Context prep
  may prepare visible suggestions with evidence and caveats, but foreground capabilities decide whether to use them. Do not
  write files, mutate git state, write project artifacts, approve permissions, transition workflow phase, make final judgments,
  run stale-context checks, run continuous compaction, refresh summaries, call providers/models, add plugins, add MCP, add
  workflow DSLs, add generic graph engines, add hosted control-plane assumptions, or add M43+ behavior. Use behavior-based
  test names; do not introduce new TestM<number> symbols. Do not push.'
