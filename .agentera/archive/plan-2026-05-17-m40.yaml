  title: 'Milestone 40: Manual Compact Command'
what: Deliver ROADMAP.md Milestone 40 by adding /compact and ctrl+x k as user-triggered manual context compaction with explicit
  effects, preserved source refs, exact critical details, visible TUI state, and validated command parity.
why: M39 introduced source-backed context assembly. M40 lets users intentionally compact the current conversation before any
  background utility worker exists, while keeping compaction visible, inspectable, and bounded by existing runtime/app/TUI
  architecture.
constraints: 'Execute only Milestone 40. Preserve statechart-MVU and explicit effect boundaries. Keep the TUI presentation-only:
  it may route the closed command, render injected compact running/result/caveat state, and expose semantic compact evidence,
  but it must not assemble or compact context, call providers, persist state, inspect files, mutate workflow phase, or start
  utility work. Manual compaction must run through a typed explicit effect path owned by runtime/app code and deterministic
  internal/context compaction. Preserve source refs and exact paths, diffs, commands, errors, and user constraints when correctness
  may depend on them. Do not add background continuous compaction, utility worker scheduling, stale-context checks, summary
  refresh jobs, provider/model summarization, source indexing/ranking, plugins, MCP, workflow DSLs, generic graph engines,
  hosted control planes, config writes, or M41+ behavior. Use behavior-based test names; do not introduce new TestM<number>
  symbols. Do not push.'
