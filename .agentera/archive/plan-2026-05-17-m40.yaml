scope:
  included:
  - Add closed policy routing for /compact and ctrl+x k with help and shortcut parity.
  - Add explicit runtime/app manual compaction request/effect/result state that is not a workflow phase and does not run in
    the TUI.
  - Add deterministic internal/context compaction over current visible context/transcript evidence while preserving source
    refs and exact critical details.
  - Expose app-injected compact running/result/caveat view state, context meter updates, and semantic source-ref evidence.
  - Add compact command/keybinding tests plus render, ANSI, and semantic fixtures for compact-running and compact result/caveat
    state.
  - Run PTY smoke for /compact and ctrl+x k if interactive terminal behavior changes.
  excluded:
  - Background continuous compaction, utility worker scheduling, stale-context checks, summary refresh jobs, provider/model
    summarization, source indexing/ranking, generic registries, plugins, MCP, workflow DSLs, hosted control planes, config
    writes, and M41+ behavior.
  deferred:
  - Idle utility worker integration, background compaction, stale context detection, source ranking/indexing, provider-assisted
    summarization, and durable compaction policy tuning.
design: Extend the fixed command policy with /compact and ctrl+x k. Add a compact request/result/effect path in runtime/app
  so manual compaction is explicit state around the workflow rather than a phase. Implement internal/context deterministic
  compaction that condenses blocks/claims, carries every supporting SourceRef forward, and keeps exact critical excerpts.
  The app builds a CompactView/ContextView from the result and persists the current snapshot; the TUI only renders and snapshots
  that injected state.
overall_acceptance:
- Policy tests prove /compact and ctrl+x k route to the same closed compact command, and help/keybinding text includes both
  without exposing background utility behavior.
- Runtime/app tests prove manual compaction runs through an explicit effect/result path, updates visible compact state, records
  command/history/snapshot state where existing command surfaces do, and never mutates workflow phase.
- Context tests prove compacted context preserves source refs and exact critical details for prompts, tool results, diffs,
  commands, errors, and user constraints.
- TUI render and semantic snapshots show compact-running plus compact result/caveat state with machine-readable source refs
  and context meter information while keeping TUI presentation-only.
- PTY smoke covers manual /compact and shortcut parity if terminal behavior changes.
- No background continuous compaction, utility worker scheduling, stale-context check, provider/model summarization, source
  indexing/ranking, plugin, MCP, workflow DSL, generic graph engine, hosted control plane, or M41+ behavior is added.
- Targeted, package, full Mage, Agentera, diff, home-path, and TestM<number> hygiene validation pass before ROADMAP.md is
  updated.
