scope:
  included:
  - Add deterministic design capability metadata and typed output for design artifact refs, design decisions, review prompts,
    caveats, next action, boundary descriptors, source refs, and one exit payload.
  - Correct design ownership to BUILD in the fixed registry and runnable built-in dispatch, and prove valid BUILD successor
    handling without direct phase mutation.
  - Wire exact /design command routing through policy, runtime CapabilityProposed/CapabilityEffect/CapabilityCompleted, app-owned
    design evidence, state-store artifact persistence, and history/session visibility.
  - Persist durable design-system output through state.Store or artifact resolver ownership rather than direct bypass paths.
  - Expose design display state in the TUI with decisions, visual review prompts, caveats, artifact/source refs, next action,
    display-only state, and transition_claimed=false.
  - Add or update design output, visual-review-prompt, and design-caveat fixtures plus behavior-named capability/runtime/state/app/policy/TUI/PTY
    coverage because /design changes the interactive surface.
  excluded:
  - M55 subagent behavior, orchestration, provider-backed visual generation, image generation, screenshots as correctness
    contract, direct workflow phase mutation, bypass writes, broad layout/color/typography redesigns, plugins, MCP, dynamic
    tools, workflow DSLs, generic graph engines, hosted control planes, and push operations.
  deferred:
  - Provider-written design proposals, screenshot capture/evaluation, generated design assets, whole-app visual refresh, design
    token theming, visual regression scoring, and orchestration-owned design campaigns.
design: Keep design deterministic and host-owned. internal/capability defines DesignCapability and DesignOutput over app-supplied
  visual identity and UI-system evidence; it emits waiting when no design goal or decisions are available and complete when
  bounded design decisions, review prompts, caveats, artifact refs, and next action are available. internal/runtime reuses
  CapabilityProposed, CapabilityEffect, and CapabilityCompleted. internal/state adds a logical design artifact owned by the
  app. internal/app invokes design from the exact /design command, persists the design-system artifact through state.Store,
  records command/runtime/session evidence, and maps the payload into tui.DesignView. internal/tui renders injected DesignView
  only; it never reads screenshots, writes files, owns permission decisions, or changes workflow phase.
overall_acceptance:
- Capability tests prove design emits exactly one payload with deterministic design goal, decisions, review prompts, caveats
  or needed input, artifact refs, source refs, boundary descriptors, and valid BUILD-owned successor behavior.
- Registry/policy/workflow checks prove design is BUILD-owned, exact-routed by /design, and cannot bypass FSM successor validation.
- State/app tests prove /design routes through typed capability effects and state.Store/artifact resolver access without direct
  bypass writes or screenshot correctness claims.
- TUI render and semantic snapshots show design artifact refs, decisions, review prompts, caveats, next action, display_only=true,
  and transition_claimed=false.
- PTY smoke proves the interactive /design surface displays design evidence and persists the design artifact in an isolated
  workspace without changing unrelated tracked files.
- Targeted, package, full Mage, Agentera, diff, home-path, and added func TestM<number> hygiene validation pass before ROADMAP.md
  is updated.
surprises:
- apply_patch was blocked by the missing local validate_artifact hook, so narrow scripted edits were used and then formatted/tested.
