header:
  level: full
  created: '2026-05-17'
  status: complete
  title: 'Milestone 54: Design Capability'
  reviewed: '2026-05-17'
  critic_issues: M54 must make design a BUILD-owned visual identity and UI-system capability, not an ENVISION phase shortcut
    or screenshot-driven test proxy. It needs one exit payload, durable state-store artifact refs, visible decisions/review
    prompts/caveats, and behavior-named validation.
  completed: '2026-05-17'
what: Deliver ROADMAP.md Milestone 54 by implementing the design capability so Aila can handle visual identity and UI-system
  work from inside BUILD while preserving durable design artifacts through the state/artifact boundary.
why: Build can now implement, optimize, and document bounded work. Aila also needs a first-class design path that records
  durable design decisions, review prompts, caveats, and next action without making screenshots the correctness contract.
constraints: Execute only Milestone 54. Preserve statechart-MVU and explicit effect boundaries. Design is BUILD-owned and
  must emit exactly one exit payload. Design artifacts must use the state store or artifact resolver. TUI remains presentation-only.
  Do not add M55 subagent behavior, orchestration loops, provider-backed visual generation, screenshots as correctness contract,
  broad visual language changes, plugins, MCP, dynamic tools, workflow DSLs, generic graph engines, hosted control planes,
  or pushes. Use behavior-based test names; do not introduce new TestM<number> symbols.
